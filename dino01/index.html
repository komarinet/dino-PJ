<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO-ROGUE DX</title>
    <style>
        :root {
            --bg-color: #000; --panel-bg: #1a1a1a;
            --text-color: #e0e0e0; --accent-color: #ff8c00; --danger-color: #ff4444; --border-color: #444;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'Meiryo', sans-serif;
            display: flex; justify-content: center; height: 100vh; height: 100dvh;
            overflow: hidden; touch-action: none;
        }
        #game-wrapper {
            display: flex; flex-direction: column; width: 100%; max-width: 600px;
            height: 100%; background-color: var(--bg-color);
        }
        /* ステータスバー（2段構成に強化） */
        #status-bar {
            display: grid; grid-template-columns: repeat(3, 1fr);
            padding: 8px 12px; background-color: var(--panel-bg);
            border-bottom: 2px solid var(--border-color); font-size: 13px;
            font-weight: bold; flex-shrink: 0; display: none; gap: 4px;
        }
        .status-item span.value { color: #ffaaaa; }
        .status-item.food span.value { color: #aaffaa; }
        .status-item.lv span.value { color: #ffffaa; }
        .status-item.equip { grid-column: span 3; color: #aaaaff; border-top: 1px solid #333; padding-top: 4px; font-size: 12px; }

        #canvas-container {
            position: relative; width: 100%; aspect-ratio: 4 / 3;
            background-color: #000; flex-shrink: 0; overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
            box-sizing: border-box; text-align: center; z-index: 10;
        }
        #overlay h1 { color: var(--accent-color); font-size: 32px; margin: 0 0 20px 0; text-shadow: 2px 2px 4px #8b0000; }
        
        #story-area { display: none; flex-direction: column; align-items: center; width: 100%; }
        #story-img { 
            max-width: 90%; max-height: 55%; border: 3px solid var(--border-color); 
            margin-bottom: 15px; object-fit: contain;
        }
        #story-text { font-size: 14px; color: #fff; max-width: 90%; min-height: 60px; line-height: 1.6; }

        .game-btn {
            margin-top: 20px; padding: 12px 35px; font-size: 18px; background-color: var(--accent-color);
            color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 0 #b36200;
        }

        #bottom-area {
            display: none; flex: 1; flex-direction: row; background-color: var(--panel-bg);
            border-top: 2px solid var(--border-color); overflow: hidden;
        }
        #controls-container {
            width: 170px; padding: 10px 5px; display: flex; flex-shrink: 0;
            justify-content: center; align-items: center; border-right: 2px solid var(--border-color);
        }
        #controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 100%; }
        .btn {
            background-color: #333; border: 1px solid #444; border-radius: 8px; color: white;
            font-size: 20px; aspect-ratio: 1/1; cursor: pointer; display: flex; justify-content: center; align-items: center;
        }
        .btn-wait { font-size: 11px; background-color: #4a3b2f; }

        #message-log {
            flex: 1; padding: 10px; background-color: #0d0d0d; overflow-y: auto;
            font-size: 11px; line-height: 1.5;
        }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #222; }
        .log-entry.system { color: #88ccff; } .log-entry.danger { color: var(--danger-color); }
        .log-entry.heal { color: #88ff88; } .log-entry.lvup { color: #ffff00; font-weight: bold; }
    </style>
</head>
<body>
<div id="game-wrapper">
    <div id="status-bar">
        <div class="status-item lv">Lv <span id="lv-val" class="value">1</span></div>
        <div class="status-item hp">HP <span id="hp-val" class="value">20/20</span></div>
        <div class="status-item food">腹 <span id="food-val" class="value">100/100</span></div>
        <div class="status-item">攻 <span id="atk-val" class="value">5</span></div>
        <div class="status-item">防 <span id="def-val" class="value">2</span></div>
        <div class="status-item">速 <span id="spd-val" class="value">5</span></div>
        <div id="equip-info" class="status-item equip">装備: なし</div>
    </div>
    <div id="canvas-container">
        <canvas id="gameCanvas" width="400" height="300"></canvas>
        <div id="overlay">
            <div id="title-area">
                <h1>DINO-ROGUE DX</h1>
                <p>最強の化石を見つけ出し、楽園へ！</p>
                <button id="start-btn" class="game-btn">冒険を始める</button>
            </div>
            <div id="story-area">
                <img id="story-img" src="">
                <p id="story-text"></p>
                <button id="next-story-btn" class="game-btn">次へ</button>
            </div>
        </div>
    </div>
    <div id="bottom-area">
        <div id="controls-container">
            <div id="controls">
                <div class="btn" onmousedown="handleMove(-1, -1)" ontouchstart="handleMove(-1,-1);event.preventDefault();">↖</div>
                <div class="btn" onmousedown="handleMove(0, -1)" ontouchstart="handleMove(0,-1);event.preventDefault();">⬆</div>
                <div class="btn" onmousedown="handleMove(1, -1)" ontouchstart="handleMove(1,-1);event.preventDefault();">↗</div>
                <div class="btn" onmousedown="handleMove(-1, 0)" ontouchstart="handleMove(-1,0);event.preventDefault();">⬅</div>
                <div class="btn btn-wait" onmousedown="handleMove(0, 0)" ontouchstart="handleMove(0,0);event.preventDefault();">待機</div>
                <div class="btn" onmousedown="handleMove(1, 0)" ontouchstart="handleMove(1,0);event.preventDefault();">➡</div>
                <div class="btn" onmousedown="handleMove(-1, 1)" ontouchstart="handleMove(-1,1);event.preventDefault();">↙</div>
                <div class="btn" onmousedown="handleMove(0, 1)" ontouchstart="handleMove(0,1);event.preventDefault();">⬇</div>
                <div class="btn" onmousedown="handleMove(1, 1)" ontouchstart="handleMove(1,1);event.preventDefault();">↘</div>
            </div>
        </div>
        <div id="message-log"></div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
const elOverlay = document.getElementById('overlay'), elStatusBar = document.getElementById('status-bar');
const elBottomArea = document.getElementById('bottom-area'), elMessageLog = document.getElementById('message-log');
const elStoryArea = document.getElementById('story-area'), elStoryImg = document.getElementById('story-img'), elStoryText = document.getElementById('story-text');

const MAP_WIDTH = 30, MAP_HEIGHT = 20, VIEW_WIDTH = 10, VIEW_HEIGHT = 8, MAX_FLOOR = 5;
const TILE_WALL = 0, TILE_FLOOR = 1, TILE_STAIRS = 2, TILE_MEAT = 3;

let gameState = 'title', currentFloor = 1, turnCount = 0, map = [], enemies = [];

// プレイヤーの初期ステータス（spd追加）
let player = { 
    x: 0, y: 0, lv: 1, exp: 0, nextExp: 10,
    hp: 20, maxHp: 20, food: 100, maxFood: 100, 
    atk: 5, def: 2, spd: 5,
    fossil: null // 装備中化石データ
};

const playerImg = new Image(); playerImg.src = 'img/tyrano01.png';
const SPRITE_SIZE = 64; let playerDir = 4, animFrame = 0, lastAnimTime = 0;

// ストーリーデータ
const introScenes = [
    { img: 'img/intro01.png', text: 'ここは恐竜たちの世界。ティラノは仲間と平和に暮らしていました。' },
    { img: 'img/intro02.png', text: 'ところがある日、空から巨大な隕石が。世界は炎と灰に包まれました……。' },
    { img: 'img/intro03.png', text: '「僕ももうだめなのかな……」絶望するティラノの前に、怪しく光る洞窟が現れました。' },
    { img: 'img/intro04.png', text: '「この先には、きっと希望があるはずだ！」ティラノは勇気を出して洞窟へ入りました。' }
];
const outroScenes = [
    { img: 'img/outro01.png', text: 'ついに洞窟を抜けた！眩しい光の先に見えたのは……' },
    { img: 'img/outro02.png', text: '隕石の被害がない、緑豊かな楽園！別の地球に辿り着いたのです。' },
    { img: 'img/outro03.png', text: 'ティラノは仲間と再会し、いつまでも幸せに暮らしました。完！' }
];
let currentStoryIndex = 0, storyType = 'intro';
// --- システム：ログとステータス更新 ---
function logMessage(msgHtml, type = 'normal') {
    const entry = document.createElement('div'); entry.className = `log-entry ${type}`;
    entry.innerHTML = msgHtml; elMessageLog.appendChild(entry);
    elMessageLog.scrollTop = elMessageLog.scrollHeight;
}

function updateStatus() {
    const f = player.fossil;
    // 装備補正の計算
    const plusAtk = f ? f.atk : 0;
    const plusDef = f ? f.def : 0;
    const plusSpd = f ? f.spd : 0;

    document.getElementById('lv-val').innerText = player.lv;
    document.getElementById('hp-val').innerText = `${Math.ceil(player.hp)}/${player.maxHp}`;
    document.getElementById('food-val').innerText = `${player.food}/${player.maxFood}`;
    
    // 表示形式： 基礎値 (+補正値)
    document.getElementById('atk-val').innerText = `${player.atk} (+${plusAtk})`;
    document.getElementById('def-val').innerText = `${player.def} (+${plusDef})`;
    document.getElementById('spd-val').innerText = `${player.spd} (+${plusSpd})`;
    
    const equipInfo = document.getElementById('equip-info');
    if (f) {
        equipInfo.innerText = `装備: ${f.name} (計:${f.atk + f.def + f.spd})`;
        equipInfo.style.color = "#aaaaff";
    } else {
        equipInfo.innerText = "装備: なし";
        equipInfo.style.color = "#888";
    }
}

// --- レベルアップ処理 ---
function gainExp(amount) {
    player.exp += amount;
    while (player.exp >= player.nextExp) {
        player.exp -= player.nextExp;
        player.lv++;
        player.nextExp = Math.floor(player.nextExp * 1.5);
        
        // ステータス上昇
        const hpUp = 5, atkUp = 2, defUp = 1, spdUp = 1;
        player.maxHp += hpUp;
        player.hp = player.maxHp;
        player.atk += atkUp;
        player.def += defUp;
        player.spd += spdUp;
        
        logMessage(`レベルアップ！ Lv${player.lv} になった！`, 'lvup');
        logMessage(`HP+${hpUp} 攻+${atkUp} 防+${defUp} 速+${spdUp}`, 'lvup');
    }
}

// --- 化石装備システム：自動判別更新 ---
function tryEquipFossil(newF) {
    const newVal = newF.atk + newF.def + newF.spd;
    const currentF = player.fossil;
    const currentVal = currentF ? (currentF.atk + currentF.def + currentF.spd) : -1;

    if (newVal > currentVal) {
        player.fossil = newF;
        logMessage(`【装備更新】${newF.name} を装備した！`, 'system');
    } else {
        logMessage(`${newF.name} を見つけたが、今の装備の方が強いので捨てた。`);
    }
}

// --- ダンジョン生成：部屋と通路 ---
function generateMap() {
    map = Array.from({length: MAP_HEIGHT}, () => Array(MAP_WIDTH).fill(TILE_WALL));
    let rooms = [];
    const splitX = Math.floor(MAP_WIDTH / 2), splitY = Math.floor(MAP_HEIGHT / 2);
    const zones = [
        {x1: 2, y1: 2, x2: splitX-2, y2: splitY-2},
        {x1: splitX+2, y1: 2, x2: MAP_WIDTH-3, y2: splitY-2},
        {x1: 2, y1: splitY+2, x2: splitX-2, y2: MAP_HEIGHT-3},
        {x1: splitX+2, y1: splitY+2, x2: MAP_WIDTH-3, y2: MAP_HEIGHT-3}
    ];

    zones.forEach(z => {
        let w = Math.floor(Math.random() * (z.x2 - z.x1 - 2)) + 4;
        let h = Math.floor(Math.random() * (z.y2 - z.y1 - 2)) + 4;
        let rx = Math.floor(Math.random() * (z.x2 - z.x1 - w)) + z.x1;
        let ry = Math.floor(Math.random() * (z.y2 - z.y1 - h)) + z.y1;
        for(let y=ry; y<ry+h; y++) for(let x=rx; x<rx+w; x++) map[y][x] = TILE_FLOOR;
        rooms.push({x: Math.floor(rx + w/2), y: Math.floor(ry + h/2)});
    });

    for(let i=0; i<rooms.length-1; i++) {
        let s = rooms[i], e = rooms[i+1];
        let cx = s.x, cy = s.y;
        while(cx !== e.x) { map[cy][cx] = TILE_FLOOR; cx += Math.sign(e.x - cx); }
        while(cy !== e.y) { map[cy][cx] = TILE_FLOOR; cy += Math.sign(e.y - cy); }
    }

    player.x = rooms[0].x; player.y = rooms[0].y;
    map[rooms[3].y][rooms[3].x] = TILE_STAIRS;

    // お肉の配置
    for(let i=0; i<3; i++) {
        let rx, ry; do { rx = Math.floor(Math.random()*MAP_WIDTH); ry = Math.floor(Math.random()*MAP_HEIGHT); } while(map[ry][rx] !== TILE_FLOOR);
        map[ry][rx] = TILE_MEAT;
    }

    // --- 敵の出現テーブル（階層別） ---
    enemies = [];
    const allTypes = [
        {name: 'コンプソグナトゥス', icon: '🦎', hp: 8, atk: 4, def: 2, spd: 4, exp: 5, minF: 1, maxF: 5},
        {name: 'プテラノドン', icon: '🦇', hp: 6, atk: 8, def: 1, spd: 10, exp: 8, minF: 1, maxF: 5},
        {name: 'トリケラトプス', icon: '🦏', hp: 22, atk: 8, def: 10, spd: 3, exp: 20, minF: 3, maxF: 5},
        {name: 'アロサウルス', icon: '🦖', hp: 35, atk: 15, def: 6, spd: 8, exp: 45, minF: 4, maxF: 5},
        {name: 'ギガノトサウルス', icon: '🐉', hp: 70, atk: 25, def: 12, spd: 12, exp: 120, minF: 5, maxF: 5}
    ];

    // その階に出現可能な敵をフィルタリング
    const available = allTypes.filter(t => t.minF <= currentFloor && t.maxF >= currentFloor);
    let eCount = 3 + currentFloor;
    for(let i=0; i<eCount; i++) {
        let ex, ey; do { ex = Math.floor(Math.random()*MAP_WIDTH); ey = Math.floor(Math.random()*MAP_HEIGHT); } 
        while(map[ey][ex] !== TILE_FLOOR || (ex === player.x && ey === player.y));
        let type = available[Math.floor(Math.random() * available.length)];
        enemies.push({...type, x: ex, y: ey, maxHp: type.hp});
    }
}
// --- 描画処理：戦場の様子を映し出すわ ---
function draw() {
    if (gameState !== 'play') return;
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    let camX = Math.max(0, Math.min(player.x - Math.floor(VIEW_WIDTH / 2), MAP_WIDTH - VIEW_WIDTH));
    let camY = Math.max(0, Math.min(player.y - Math.floor(VIEW_HEIGHT / 2), MAP_HEIGHT - VIEW_HEIGHT));
    let ts = canvas.width / VIEW_WIDTH;

    for (let y = 0; y < VIEW_HEIGHT; y++) {
        for (let x = 0; x < VIEW_WIDTH; x++) {
            let mx = camX + x, my = camY + y;
            if (my < 0 || my >= MAP_HEIGHT || mx < 0 || mx >= MAP_WIDTH) continue;
            let dx = x * ts, dy = y * ts;
            if (map[my][mx] === TILE_WALL) { ctx.fillStyle = '#2c2c3a'; ctx.fillRect(dx, dy, ts, ts); }
            else {
                ctx.fillStyle = '#3d2b1f'; ctx.fillRect(dx, dy, ts, ts);
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = `${ts * 0.6}px sans-serif`;
                if (map[my][mx] === TILE_STAIRS) ctx.fillText('🚪', dx + ts / 2, dy + ts / 2);
                else if (map[my][mx] === TILE_MEAT) ctx.fillText('🍖', dx + ts / 2, dy + ts / 2);
            }
        }
    }

    enemies.forEach(e => {
        let ex = (e.x - camX) * ts, ey = (e.y - camY) * ts;
        if (e.x >= camX && e.x < camX + VIEW_WIDTH && e.y >= camY && e.y < camY + VIEW_HEIGHT) {
            ctx.fillText(e.icon, ex + ts / 2, ey + ts / 2);
            ctx.fillStyle = '#500'; ctx.fillRect(ex + 4, ey + 2, ts - 8, 2);
            ctx.fillStyle = '#0f0'; ctx.fillRect(ex + 4, ey + 2, (ts - 8) * (e.hp / e.maxHp), 2);
        }
    });

    let px = (player.x - camX) * ts, py = (player.y - camY) * ts;
    if (playerImg.complete) ctx.drawImage(playerImg, animFrame * SPRITE_SIZE, playerDir * SPRITE_SIZE, SPRITE_SIZE, SPRITE_SIZE, px, py, ts, ts);
    else { ctx.fillStyle = 'red'; ctx.fillRect(px, py, ts, ts); }
}

// --- ターン経過：敵のAIとサバイバル計算 ---
function processTurn() {
    turnCount++;
    if (turnCount % 3 === 0 && player.food > 0) player.food--;
    if (player.food <= 0) { player.hp -= 0.5; logMessage('おなかが空いて 体力が減っていく！', 'danger'); }
    else if (player.hp < player.maxHp) player.hp += 0.1;

    enemies.forEach(e => {
        let dx = player.x - e.x, dy = player.y - e.y;
        let dist = Math.max(Math.abs(dx), Math.abs(dy));
        if (dist === 1) {
            // 回避判定（スピードの差で決まるわ）
            const totalSpd = player.spd + (player.fossil ? player.fossil.spd : 0);
            if (Math.random() * 100 < totalSpd - e.spd) {
                logMessage(`${e.icon} の攻撃を ひらりと身をかわした！`, 'system');
            } else {
                const totalDef = player.def + (player.fossil ? player.fossil.def : 0);
                let dmg = Math.max(1, e.atk - totalDef);
                player.hp -= dmg;
                logMessage(`${e.icon} の攻撃！ ${dmg} ダメージ！`, 'danger');
            }
        } else if (dist < 7) {
            let mx = Math.sign(dx), my = Math.sign(dy);
            if (map[e.y + my][e.x + mx] === TILE_FLOOR && !enemies.some(oe => oe.x === e.x + mx && oe.y === e.y + my)) {
                e.x += mx; e.y += my;
            }
        }
    });
    if (player.hp <= 0) showEnding(false);
    updateStatus(); draw();
}

// --- 行動処理：移動、攻撃、そしてドロップ ---
function handleMove(dx, dy) {
    if (gameState !== 'play') return;
    if (dx !== 0 || dy !== 0) {
        if (dx === 0 && dy === -1) playerDir = 0; else if (dx === 1 && dy === -1) playerDir = 1;
        else if (dx === 1 && dy === 0) playerDir = 2; else if (dx === 1 && dy === 1) playerDir = 3;
        else if (dx === 0 && dy === 1) playerDir = 4; else if (dx === -1 && dy === 1) playerDir = 5;
        else if (dx === -1 && dy === 0) playerDir = 6; else if (dx === -1 && dy === -1) playerDir = 7;
    }
    if (dx === 0 && dy === 0) { logMessage('ティラノは 深呼吸した。'); processTurn(); return; }

    let nx = player.x + dx, ny = player.y + dy;
    let target = enemies.find(e => e.x === nx && e.y === ny);

    if (target) {
        // クリティカル判定
        const totalSpd = player.spd + (player.fossil ? player.fossil.spd : 0);
        let crit = (Math.random() * 100 < totalSpd) ? 1.5 : 1;
        const totalAtk = player.atk + (player.fossil ? player.fossil.atk : 0);
        let dmg = Math.floor(Math.max(1, totalAtk - target.def) * crit);
        target.hp -= dmg;
        logMessage(`ティラノの攻撃！ ${target.icon} に ${dmg}${crit > 1 ? "！(会心)" : ""} のダメージ！`);
        
        if (target.hp <= 0) {
            logMessage(`${target.icon} を倒した！ 経験値 ${target.exp} 獲得！`);
            gainExp(target.exp);
            // ドロップ判定
            let rand = Math.random();
            if (rand < 0.15) { // 15%で化石
                const grade = Math.floor(Math.random() * 5) + 1; // +1〜+5
                const fAtk = Math.floor(target.atk * 0.4 * grade);
                const fDef = Math.floor(target.def * 0.4 * grade);
                const fSpd = Math.floor(target.spd * 0.4 * grade);
                tryEquipFossil({ name: `${target.name}の化石+${grade}`, atk: fAtk, def: fDef, spd: fSpd });
            } else if (rand < 0.55) { // 40%でお肉
                map[ny][nx] = TILE_MEAT;
                logMessage('新鮮な お肉が落ちている！', 'heal');
            }
            enemies = enemies.filter(e => e !== target);
        }
        processTurn(); return;
    }

    if (nx < 0 || nx >= MAP_WIDTH || ny < 0 || ny >= MAP_HEIGHT || map[ny][nx] === TILE_WALL) return;
    if (dx !== 0 && dy !== 0 && map[player.y][nx] === TILE_WALL && map[ny][player.x] === TILE_WALL) return;

    player.x = nx; player.y = ny;
    if (map[ny][nx] === TILE_MEAT) { player.food = Math.min(100, player.food + 25); map[ny][nx] = TILE_FLOOR; logMessage('お肉を食べて 元気が出た！', 'heal'); }
    if (map[ny][nx] === TILE_STAIRS) {
        if (currentFloor >= MAX_FLOOR) showEnding(true);
        else { currentFloor++; logMessage(`地下 ${currentFloor} 階へ進む。`, 'system'); initFloor(); }
        return;
    }
    processTurn();
}

// --- ストーリー管理 ---
function showStoryScene(type, index) {
    gameState = type; storyType = type; currentStoryIndex = index;
    elTitleArea.style.display = 'none'; elStatusBar.style.display = 'none'; elBottomArea.style.display = 'none';
    elOverlay.style.display = 'flex'; elStoryArea.style.display = 'flex';
    const scenes = (type === 'intro') ? introScenes : outroScenes;
    elStoryImg.src = scenes[index].img; elStoryText.innerHTML = scenes[index].text;
    elNextStoryBtn.innerText = (index === scenes.length - 1) ? (type === 'intro' ? "探索開始" : "タイトルへ") : "次へ";
}

function nextStory() {
    currentStoryIndex++;
    const scenes = (storyType === 'intro') ? introScenes : outroScenes;
    if (currentStoryIndex < scenes.length) showStoryScene(storyType, currentStoryIndex);
    else if (storyType === 'intro') startGame本編();
    else location.reload();
}

function startGame本編() {
    elOverlay.style.display = 'none'; elStatusBar.style.display = 'grid'; elBottomArea.style.display = 'flex';
    gameState = 'play'; currentFloor = 1; player.hp = 20; player.food = 100;
    player.lv = 1; player.exp = 0; player.atk = 5; player.def = 2; player.spd = 5; player.fossil = null;
    elMessageLog.innerHTML = ''; logMessage('不思議な洞窟に 踏み出した！', 'system');
    initFloor();
}

function initFloor() { generateMap(); updateStatus(); draw(); }
function showEnding(isWin) { if (isWin) showStoryScene('outro', 0); else { gameState = 'over'; elOverlay.style.display = 'flex'; elOverlay.innerHTML = `<h1>絶滅……</h1><button class="game-btn" onclick="location.reload()">もう一度</button>`; } }

function animationLoop(timestamp) {
    if (timestamp - lastAnimTime > 500) { animFrame = (animFrame === 0) ? 1 : 0; lastAnimTime = timestamp; draw(); }
    requestAnimationFrame(animationLoop);
}

elNextStoryBtn.addEventListener('click', nextStory);
document.getElementById('start-btn').addEventListener('click', () => showStoryScene('intro', 0));
requestAnimationFrame(animationLoop);
</script>
</body>
</html>
