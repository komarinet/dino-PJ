<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO-ROGUE DX</title>
    <style>
        :root {
            --bg-color: #000; --panel-bg: #1a1a1a;
            --text-color: #e0e0e0; --accent-color: #ff8c00; --danger-color: #ff4444; --border-color: #444;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Hiragino Maru Gothic ProN', sans-serif;
            display: flex; justify-content: center; height: 100dvh; overflow: hidden; touch-action: none;
        }
        #game-wrapper { display: flex; flex-direction: column; width: 100%; max-width: 600px; height: 100%; }
        
        /* ステータスバー */
        #status-bar {
            display: grid; grid-template-columns: 1fr 1fr;
            padding: 8px; background-color: var(--panel-bg);
            border-bottom: 2px solid var(--border-color); font-size: 11px;
            font-weight: bold; flex-shrink: 0; display: none; gap: 4px;
        }
        .status-row { display: flex; align-items: center; gap: 5px; }
        .bar-container { flex: 1; height: 10px; background: #333; border-radius: 5px; overflow: hidden; border: 1px solid #555; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.3s; }
        #hp-fill { background: linear-gradient(to right, #ff4444, #ff8888); }
        #food-fill { background: linear-gradient(to right, #44ff44, #88ff88); }
        
        .status-grid-small { display: grid; grid-template-columns: repeat(2, 1fr); grid-column: span 2; gap: 3px; margin-top: 4px; }
        .status-item { font-size: 10px; color: #ccc; }
        .status-item span.val-total { color: #fff; font-size: 11px; }
        .status-item span.val-plus { color: var(--accent-color); }
        .status-item.equip { grid-column: span 2; color: #aaaaff; border-top: 1px solid #333; padding-top: 4px; }
        ruby { ruby-align: center; } rt { font-size: 0.6em; color: #aaa; }

        /* ゲーム画面 */
        #canvas-container { position: relative; width: 100%; flex: 1; background-color: #000; display: flex; align-items: center; overflow: hidden; }
        canvas { display: block; width: 100%; height: auto; max-height: 100%; image-rendering: pixelated; margin: auto; }

        /* オーバーレイ */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; z-index: 10;
        }
        #story-area { display: none; flex-direction: column; align-items: center; width: 100%; }
        #story-img { max-width: 85%; max-height: 40dvh; border: 2px solid var(--border-color); margin-bottom: 15px; background: #111; }
        #story-text { font-size: 14px; color: #fff; line-height: 1.7; text-align: left; width: 100%; min-height: 80px; }

        .game-btn { margin-top: 20px; padding: 12px 35px; font-size: 18px; background-color: var(--accent-color); color: white; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }

        /* 操作エリア */
        #bottom-area { display: none; height: 185px; flex-direction: row; background-color: var(--panel-bg); border-top: 2px solid var(--border-color); flex-shrink: 0; }
        #controls-container { width: 160px; padding: 10px; display: flex; justify-content: center; align-items: center; border-right: 2px solid var(--border-color); }
        #controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 100%; }
        .btn { background-color: #333; border: 1px solid #444; border-radius: 8px; color: white; font-size: 20px; aspect-ratio: 1/1; display: flex; justify-content: center; align-items: center; user-select: none; }
        .btn-wait { font-size: 11px; background-color: #4a3b2f; }

        #message-log { flex: 1; padding: 10px; background-color: #0d0d0d; overflow-y: auto; font-size: 11px; line-height: 1.5; }
        .log-entry { border-bottom: 1px solid #222; margin-bottom: 4px; }
    </style>
</head>
<body>
<div id="game-wrapper">
    <div id="status-bar">
        <div class="status-row"><ruby>体力<rt>たいりょく</rt></ruby><div class="bar-container"><div id="hp-fill" class="bar-fill"></div></div></div>
        <div class="status-row">おなか<div class="bar-container"><div id="food-fill" class="bar-fill"></div></div></div>
        <div class="status-grid-small">
            <div class="status-item">レベル <span id="lv-val" class="val-total">1</span></div>
            <div class="status-item">こうげき <span id="atk-val" class="val-total">5</span> <span id="atk-plus" class="val-plus"></span></div>
            <div class="status-item">ぼうぎょ <span id="def-val" class="val-total">2</span> <span id="def-plus" class="val-plus"></span></div>
            <div class="status-item">はやさ <span id="spd-val" class="val-total">5</span> <span id="spd-plus" class="val-plus"></span></div>
            <div id="equip-info" class="status-item equip">そうび: なし</div>
        </div>
    </div>
    <div id="canvas-container">
        <canvas id="gameCanvas" width="400" height="300"></canvas>
        <div id="overlay">
            <div id="title-area">
                <h1>DINO-ROGUE DX</h1>
                <p>きょうりゅう の だいぼうけん！</p>
                <button id="start-btn" class="game-btn">はじめる</button>
            </div>
            <div id="story-area">
                <img id="story-img" src="" alt="story">
                <div id="story-text"></div>
                <button id="next-story-btn" class="game-btn">つぎへ</button>
            </div>
        </div>
    </div>
    <div id="bottom-area">
        <div id="controls-container">
            <div id="controls">
                <div class="btn" onmousedown="handleMove(-1, -1)" ontouchstart="handleMove(-1,-1);event.preventDefault();">↖</div>
                <div class="btn" onmousedown="handleMove(0, -1)" ontouchstart="handleMove(0,-1);event.preventDefault();">⬆</div>
                <div class="btn" onmousedown="handleMove(1, -1)" ontouchstart="handleMove(1,-1);event.preventDefault();">↗</div>
                <div class="btn" onmousedown="handleMove(-1, 0)" ontouchstart="handleMove(-1,0);event.preventDefault();">⬅</div>
                <div class="btn btn-wait" onmousedown="handleMove(0, 0)" ontouchstart="handleMove(0,0);event.preventDefault();">やすむ</div>
                <div class="btn" onmousedown="handleMove(1, 0)" ontouchstart="handleMove(1,0);event.preventDefault();">➡</div>
                <div class="btn" onmousedown="handleMove(-1, 1)" ontouchstart="handleMove(-1,1);event.preventDefault();">↙</div>
                <div class="btn" onmousedown="handleMove(0, 1)" ontouchstart="handleMove(0,1);event.preventDefault();">⬇</div>
                <div class="btn" onmousedown="handleMove(1, 1)" ontouchstart="handleMove(1,1);event.preventDefault();">↘</div>
            </div>
        </div>
        <div id="message-log"></div>
    </div>
</div>
<script>
// --- 基本（きほん）の 変数（へんすう） ---
const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
const elOverlay = document.getElementById('overlay'), elStatusBar = document.getElementById('status-bar');
const elBottomArea = document.getElementById('bottom-area'), elMessageLog = document.getElementById('message-log');
const elStoryArea = document.getElementById('story-area'), elStoryImg = document.getElementById('story-img'), elStoryText = document.getElementById('story-text');
const elTitleArea = document.getElementById('title-area'), elNextStoryBtn = document.getElementById('next-story-btn');

const MAP_WIDTH = 30, MAP_HEIGHT = 20, VIEW_WIDTH = 10, VIEW_HEIGHT = 8, MAX_FLOOR = 5;
const TILE_WALL = 0, TILE_FLOOR = 1, TILE_STAIRS = 2, TILE_MEAT = 3, SPRITE_SIZE = 64;

let gameState = 'title', currentFloor = 1, turnCount = 0, map = [], enemies = [], animFrame = 0, lastAnimTime = 0;
let player = { x: 0, y: 0, lv: 1, exp: 0, nextExp: 10, hp: 20, maxHp: 20, food: 100, maxFood: 100, atk: 5, def: 2, spd: 5, fossil: null };
let playerDir = 4;

const playerImg = new Image(); playerImg.src = 'img/tyrano01.png';
const enemyImg = new Image(); enemyImg.src = 'img/enemytile01.png';

const introScenes = [
    { img: 'img/intro01.png', text: 'ここは <ruby>恐竜<rt>きょうりゅう</rt></ruby>の <ruby>世界<rt>せかい</rt></ruby>。<br>ティラノは みんなと <ruby>楽<rt>たの</rt></ruby>しく くらしていました。' },
    { img: 'img/intro02.png', text: '<ruby>空<rt>そら</rt></ruby>から <ruby>大<rt>おお</rt></ruby>きな いんせきが！<br>森が もえて、エサが どんどん なくなりました。' },
    { img: 'img/intro03.png', text: 'ティラノ 「もうボク、<ruby>死<rt>し</rt></ruby>んじゃうのかな」<br><br>ひとりぼっちの ティラノは さみしそうに<br>だれもいない 原っぱを あるきました。' },
    { img: 'img/intro04.png', text: 'そのとき、ティラノの まえに ひかる あなが！<br>「この <ruby>中<rt>なか</rt></ruby>には きっと 食べものがあるぞ！」<br>ティラノは <ruby>中<rt>なか</rt></ruby>へ <ruby>入<rt>はい</rt></ruby>りました。' }
];

const outroScenes = [
    { img: 'img/outro01.png', text: 'あなの <ruby>外<rt>そと</rt></ruby>へ <ruby>出<rt>で</rt></ruby>たぞ！<br>まぶしい ひかりの さきに <ruby>見<rt>み</rt></ruby>えたのは……' },
    { img: 'img/outro02.png', text: 'みどりが いっぱいの せかい！<br>べつの <ruby>大<rt>だい</rt></ruby>きな <ruby>大地<rt>だいち</rt></ruby>に ついたのです。<br>「たすかったぞ！」' },
    { img: 'img/outro03.png', text: 'ティラノは また <ruby>楽<rt>たの</rt></ruby>しく くらせるように なりました。<br><br>おしまい！' }
];
let currentStoryIndex = 0, storyType = 'intro';

// --- システム：ログ と ステータス ---
function logMessage(msgHtml, type = 'normal') {
    const entry = document.createElement('div'); entry.className = `log-entry ${type}`;
    entry.innerHTML = msgHtml; elMessageLog.appendChild(entry);
    elMessageLog.scrollTop = elMessageLog.scrollHeight;
}

function updateStatus() {
    const f = player.fossil;
    const pAtk = f ? f.atk : 0; const pDef = f ? f.def : 0; const pSpd = f ? f.spd : 0;

    // バーの ひょうじ
    document.getElementById('hp-fill').style.width = Math.max(0, (player.hp / player.maxHp) * 100) + "%";
    document.getElementById('food-fill').style.width = Math.max(0, (player.food / player.maxFood) * 100) + "%";

    // 「力 7 (+1)」 の ような ひょうじ
    document.getElementById('lv-val').innerText = player.lv;
    document.getElementById('atk-val').innerText = player.atk + pAtk;
    document.getElementById('atk-plus').innerText = pAtk > 0 ? `(+${pAtk})` : "";
    document.getElementById('def-val').innerText = player.def + pDef;
    document.getElementById('def-plus').innerText = pDef > 0 ? `(+${pDef})` : "";
    document.getElementById('spd-val').innerText = player.spd + pSpd;
    document.getElementById('spd-plus').innerText = pSpd > 0 ? `(+${pSpd})` : "";
    
    document.getElementById('equip-info').innerText = f ? `そうび: ${f.name}` : "そうび: なし";
}

// --- かせき そうび：レア度（＋１〜＋５）を 見るわよ ---
function tryEquipFossil(newF) {
    const newVal = newF.atk + newF.def + newF.spd;
    const currentF = player.fossil;
    const currentVal = currentF ? (currentF.atk + currentF.def + currentF.spd) : -1;

    if (newVal > currentVal) {
        player.fossil = newF;
        logMessage(`【そうび】 ${newF.name} を つけた！ <ruby>力<rt>ちから</rt></ruby>が わいてきた！`, 'system');
    } else {
        logMessage(`${newF.name} を みつけたが、いまと おなじか よわいので すてた。`);
    }
}

// --- てき を あとから 出す 仕組み（し組み） ---
function spawnOneEnemy() {
    const allTypes = [
        {name:'コンプソ', hp:8, atk:4, def:2, spd:4, exp:5, minF:1, maxF:2, tsCol:0, icon:'🦎'},
        {name:'ディモル', hp:6, atk:7, def:1, spd:8, exp:7, minF:1, maxF:2, tsCol:2, icon:'🐦'},
        {name:'プテラ', hp:12, atk:10, def:2, spd:12, exp:12, minF:2, maxF:4, tsCol:4, icon:'🦇'},
        {name:'ディロホ', hp:25, atk:14, def:6, spd:7, exp:25, minF:3, maxF:4, tsCol:6, icon:'🦎'},
        {name:'トリケラ', hp:40, atk:15, def:18, spd:3, exp:40, minF:3, maxF:5, tsCol:8, icon:'🦏'},
        {name:'アロ', hp:65, atk:28, def:10, spd:10, exp:80, minF:4, maxF:5, tsCol:10, icon:'🦖'},
        {name:'ギガノト', hp:140, atk:45, def:22, spd:22, exp:350, minF:5, maxF:5, tsCol:12, icon:'🐉'}
    ];
    const available = allTypes.filter(t => t.minF <= currentFloor && t.maxF >= currentFloor);
    let ex, ey, limit = 0;
    do { ex = Math.floor(Math.random()*MAP_WIDTH); ey = Math.floor(Math.random()*MAP_HEIGHT); limit++; } 
    while((map[ey][ex] !== TILE_FLOOR || (Math.abs(ex-player.x) < 5 && Math.abs(ey-player.y) < 5)) && limit < 50);
    
    if (limit < 50) {
        let type = available[Math.floor(Math.random()*available.length)];
        enemies.push({...type, x:ex, y:ey, maxHp:type.hp, dir:1});
    }
}

// --- マップ を つくる ---
function generateMap() {
    map = Array.from({length: MAP_HEIGHT}, () => Array(MAP_WIDTH).fill(TILE_WALL));
    let rooms = [];
    const splitX = Math.floor(MAP_WIDTH / 2), splitY = Math.floor(MAP_HEIGHT / 2);
    const zones = [{x1:2,y1:2,x2:splitX-2,y2:splitY-2}, {x1:splitX+2,y1:2,x2:MAP_WIDTH-3,y2:splitY-2}, {x1:2,y1:splitY+2,x2:splitX-2,y2:MAP_HEIGHT-3}, {x1:splitX+2,y1:splitY+2,x2:MAP_WIDTH-3,y2:MAP_HEIGHT-3}];
    
    zones.forEach(z => {
        let w = Math.floor(Math.random()*(z.x2-z.x1-2))+4, h = Math.floor(Math.random()*(z.y2-z.y1-2))+4;
        let rx = Math.floor(Math.random()*(z.x2-z.x1-w))+z.x1, ry = Math.floor(Math.random()*(z.y2-z.y1-h))+z.y1;
        for(let y=ry; y<ry+h; y++) for(let x=rx; x<rx+w; x++) map[y][x] = TILE_FLOOR;
        rooms.push({x: Math.floor(rx + w / 2), y: Math.floor(ry + h / 2)});
    });
    for(let i=0; i<rooms.length-1; i++) {
        let s = rooms[i], e = rooms[i+1], cx = s.x, cy = s.y;
        while(cx !== e.x) { map[cy][cx] = TILE_FLOOR; cx += Math.sign(e.x - cx); }
        while(cy !== e.y) { map[cy][cx] = TILE_FLOOR; cy += Math.sign(e.y - cy); }
    }
    player.x = rooms[0].x; player.y = rooms[0].y;
    map[rooms[3].y][rooms[3].x] = TILE_STAIRS;
    for(let i=0; i<3; i++) {
        let rx, ry; do { rx = Math.floor(Math.random()*MAP_WIDTH); ry = Math.floor(Math.random()*MAP_HEIGHT); } while(map[ry][rx] !== TILE_FLOOR);
        map[ry][rx] = TILE_MEAT;
    }
    enemies = [];
    for(let i=0; i < 4+currentFloor; i++) spawnOneEnemy();
}
// --- びょうが：きょうりゅう や ステージを かく ---
function draw() {
    if (gameState !== 'play') return;
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    let camX = Math.max(0, Math.min(player.x - 5, MAP_WIDTH - 10));
    let camY = Math.max(0, Math.min(player.y - 4, MAP_HEIGHT - 8));
    let ts = canvas.width / 10;

    // かべ や ゆか
    for (let y = 0; y < 8; y++) {
        for (let x = 0; x < 10; x++) {
            let mx = camX + x, my = camY + y;
            if (mx < 0 || mx >= MAP_WIDTH || my < 0 || my >= MAP_HEIGHT) continue;
            let dx = x * ts, dy = y * ts;
            if (map[my][mx] === TILE_WALL) {
                ctx.fillStyle = '#2c2c3a'; ctx.fillRect(dx, dy, ts, ts);
            } else {
                ctx.fillStyle = '#3d2b1f'; ctx.fillRect(dx, dy, ts, ts);
                ctx.font = `${ts * 0.6}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                if (map[my][mx] === TILE_STAIRS) ctx.fillText('🚪', dx + ts / 2, dy + ts / 2);
                else if (map[my][mx] === TILE_MEAT) ctx.fillText('🍖', dx + ts / 2, dy + ts / 2);
            }
        }
    }

    // てき（enemytile01.png）
    enemies.forEach(e => {
        let ex = (e.x - camX) * ts, ey = (e.y - camY) * ts;
        if (e.x >= camX && e.x < camX + 10 && e.y >= camY && e.y < camY + 8) {
            if (enemyImg.complete && enemyImg.naturalWidth > 0) {
                ctx.drawImage(enemyImg, (e.tsCol + animFrame) * 64, e.dir * 64, 64, 64, ex, ey, ts, ts);
            } else {
                ctx.fillStyle = 'yellow'; ctx.fillText(e.icon, ex + ts / 2, ey + ts / 2);
            }
            // HPバー
            ctx.fillStyle = '#500'; ctx.fillRect(ex + 4, ey + 2, ts - 8, 2);
            ctx.fillStyle = '#0f0'; ctx.fillRect(ex + 4, ey + 2, (ts - 8) * (e.hp / e.maxHp), 2);
        }
    });

    // 主人公（tyrano01.png）
    let px = (player.x - camX) * ts, py = (player.y - camY) * ts;
    if (playerImg.complete && playerImg.naturalWidth > 0) {
        ctx.drawImage(playerImg, animFrame * 64, playerDir * 64, 64, 64, px, py, ts, ts);
    } else {
        ctx.fillStyle = 'red'; ctx.fillRect(px, py, ts, ts); 
    }
}

// --- ターン：敵の復活（ふっかつ）もしき名 ---
function processTurn() {
    turnCount++;
    
    // 15ターン ごとに 新しい 敵が 生まれるわよ！
    if (turnCount % 15 === 0) {
        spawnOneEnemy();
        logMessage('どこかで <ruby>新しい<rt>あたらしい</rt></ruby> きょうりゅうが 生まれた！', 'system');
    }

    if (turnCount % 3 === 0 && player.food > 0) player.food--;
    if (player.food <= 0) { 
        player.hp -= 0.5; 
        logMessage('おなかが すいて <ruby>体力<rt>たいりょく</rt></ruby>が へっていく！', 'danger'); 
    }
    else if (player.hp < player.maxHp) player.hp += 0.1;

    enemies.forEach(e => {
        let dx = player.x - e.x, dy = player.y - e.y, dist = Math.max(Math.abs(dx), Math.abs(dy));
        if (dist === 1) {
            let dmg = Math.max(1, e.atk - (player.def + (player.fossil ? player.fossil.def : 0)));
            player.hp -= dmg;
            logMessage(`${e.name}の こうげき！ ${dmg} ダメージ！`, 'danger');
        } else if (dist < 7) {
            let mx = Math.sign(dx), my = Math.sign(dy);
            if (map[e.y + my][e.x + mx] === TILE_FLOOR && !enemies.some(oe => oe.x === e.x + mx && oe.y === e.y + my)) {
                e.x += mx; e.y += my;
                e.dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 3 : 2) : (dy > 0 ? 1 : 0);
            }
        }
    });
    if (player.hp <= 0) showEnding(false);
    updateStatus(); draw();
}

// --- うごく・こうげき・かせき ゲット ---
function handleMove(dx, dy) {
    if (gameState !== 'play') return;
    if (dx !== 0 || dy !== 0) {
        if(dx===0&&dy===-1)playerDir=0;else if(dx===1&&dy===-1)playerDir=1;else if(dx===1&&dy===0)playerDir=2;
        else if(dx===1&&dy===1)playerDir=3;else if(dx===0&&dy===1)playerDir=4;else if(dx===-1&&dy===1)playerDir=5;
        else if(dx===-1&&dy===0)playerDir=6;else if(dx===-1&&dy===-1)playerDir=7;
    }
    if (dx === 0 && dy === 0) { logMessage('ティラノは やすんで いきを ととのえた。'); processTurn(); return; }

    let nx = player.x + dx, ny = player.y + dy, target = enemies.find(e => e.x === nx && e.y === ny);
    if (target) {
        let dmg = Math.floor(Math.max(1, (player.atk + (player.fossil ? player.fossil.atk : 0)) - target.def));
        target.hp -= dmg; logMessage(`ティラノの こうげき！ ${target.name}に ${dmg} ダメージ！`);
        
        if (target.hp <= 0) {
            logMessage(`${target.name}を たおした！ ${target.exp} ポイント ゲット！`);
            // かせき ゲット（20% に アップ！）
            if (Math.random() < 0.20) {
                const grade = Math.floor(Math.random() * 5) + 1; // +1 〜 +5 の レア度
                const fAtk = Math.floor(target.atk * 0.2 * grade);
                const fDef = Math.floor(target.def * 0.2 * grade);
                const fSpd = Math.floor(target.spd * 0.2 * grade);
                tryEquipFossil({ name: `${target.name}の かせき (+${grade})`, atk: fAtk, def: fDef, spd: fSpd });
            }
            player.exp += target.exp; gainExp(0);
            enemies = enemies.filter(e => e !== target);
        }
        processTurn(); return;
    }
    if (nx < 0 || nx >= MAP_WIDTH || ny < 0 || ny >= MAP_HEIGHT || map[ny][nx] === TILE_WALL) return;
    player.x = nx; player.y = ny;
    if (map[ny][nx] === TILE_MEAT) { player.food = Math.min(100, player.food + 25); map[ny][nx] = TILE_FLOOR; logMessage('おにくを たべて げんきに なった！', 'heal'); }
    if (map[ny][nx] === TILE_STAIRS) { if (currentFloor >= MAX_FLOOR) showEnding(true); else { currentFloor++; logMessage(`<ruby>下<rt>した</rt></ruby>の ${currentFloor} かいへ いこう！`, 'system'); initFloor(); } return; }
    processTurn();
}

function gainExp(n) {
    while (player.exp >= player.nextExp) {
        player.exp -= player.nextExp; player.lv++; player.nextExp = Math.floor(player.nextExp * 1.6);
        player.maxHp += 6; player.hp = player.maxHp; player.atk += 2; player.def += 1; player.spd += 1;
        logMessage(`レベルアップ！ レベル${player.lv} に なった！`, 'lvup');
    }
}

function showStoryScene(type, index) {
    gameState = type; storyType = type; currentStoryIndex = index;
    elTitleArea.style.display = 'none'; elStatusBar.style.display = 'none'; elBottomArea.style.display = 'none';
    elOverlay.style.display = 'flex'; elStoryArea.style.display = 'flex';
    let s = (type === 'intro' ? introScenes : outroScenes)[index];
    elStoryImg.src = s.img; elStoryText.innerHTML = s.text;
    elNextStoryBtn.innerText = index === (type === 'intro' ? introScenes : outroScenes).length - 1 ? (type === 'intro' ? 'はじめる' : 'タイトルへ') : 'つぎへ';
}

function nextStory() {
    currentStoryIndex++; let s = (storyType === 'intro' ? introScenes : outroScenes);
    if (currentStoryIndex < s.length) showStoryScene(storyType, currentStoryIndex);
    else if (storyType === 'intro') startGame(); else location.reload();
}

function startGame() {
    elOverlay.style.display = 'none'; elStatusBar.style.display = 'grid'; elBottomArea.style.display = 'flex';
    gameState = 'play'; currentFloor = 1; player.hp = 20; player.maxHp = 20; player.food = 100; player.exp = 0; player.lv = 1;
    player.atk = 5; player.def = 2; player.spd = 5; player.fossil = null;
    initFloor();
}

function initFloor() { generateMap(); updateStatus(); draw(); }

function showEnding(win) {
    if (win) showStoryScene('outro', 0);
    else {
        elOverlay.style.display = 'flex';
        elOverlay.innerHTML = `<h1><ruby>死<rt>し</rt></ruby>んでしまった…</h1><button class="game-btn" onclick="location.reload()">もういちど</button>`;
    }
}

function loop(t) {
    if (t - lastAnimTime > 500) { animFrame = 1 - animFrame; lastAnimTime = t; draw(); }
    requestAnimationFrame(loop);
}

elNextStoryBtn.onclick = nextStory;
document.getElementById('start-btn').onclick = () => showStoryScene('intro', 0);
requestAnimationFrame(loop);
</script>
</body>
</html>
