<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO-ROGUE</title>
    <style>
        :root {
            --bg-color: #000; --panel-bg: #1a1a1a;
            --text-color: #e0e0e0; --accent-color: #ff8c00; --danger-color: #ff4444; --border-color: #444;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'Meiryo', sans-serif;
            display: flex; justify-content: center; height: 100vh; height: 100dvh;
            overflow: hidden; touch-action: none;
        }
        #game-wrapper {
            display: flex; flex-direction: column; width: 100%; max-width: 600px;
            height: 100%; background-color: var(--bg-color);
        }
        /* ステータスバー */
        #status-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; background-color: var(--panel-bg);
            border-bottom: 2px solid var(--border-color); font-size: 14px;
            font-weight: bold; flex-shrink: 0; display: none; z-index: 5;
        }
        .status-item span.value { color: #ffaaaa; }
        .status-item.food span.value { color: #aaffaa; }
        .status-item.floor span.value { color: #aaaaff; }
        ruby { ruby-align: center; } rt { font-size: 0.6em; color: #aaa; }

        /* ゲーム画面（Canvas） */
        #canvas-container {
            position: relative; width: 100%; aspect-ratio: 4 / 3;
            background-color: #000; flex-shrink: 0; overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

        /* オーバーレイ（タイトル・ストーリー・エンディング） */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
            box-sizing: border-box; text-align: center; z-index: 10;
        }
        #overlay h1 { color: var(--accent-color); font-size: 32px; margin: 0 0 20px 0; text-shadow: 2px 2px 4px #8b0000; font-family: 'Georgia', serif; }
        #overlay p { line-height: 1.8; font-size: 15px; margin: 10px 0; text-shadow: 1px 1px 2px #000; }
        
        /* ストーリー表示エリア */
        #story-area { display: none; flex-direction: column; align-items: center; width: 100%; }
        #story-img { 
            max-width: 90%; max-height: 60%; border: 3px solid var(--border-color); 
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.3); margin-bottom: 15px; 
            object-fit: contain; background-color: #111;
        }
        #story-text-container { width: 100%; min-height: 80px; display: flex; justify-content: center; align-items: center; }
        #story-text { font-size: 14px; color: #fff; max-width: 90%; margin: 0; animation: fadeInText 0.5s; }

        /* 共通ボタン */
        .game-btn {
            margin-top: 25px; padding: 12px 35px; font-size: 18px; background-color: var(--accent-color);
            color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 0 #b36200; transition: all 0.1s; text-decoration: none; display: inline-block;
        }
        .game-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b36200; }

        /* ボトムエリア（操作・ログ） */
        #bottom-area {
            display: none; flex: 1; flex-direction: row; background-color: var(--panel-bg);
            border-top: 2px solid var(--border-color); overflow: hidden;
        }
        #controls-container {
            width: 160px; padding: 10px 5px; display: flex; justify-content: center;
            align-items: center; border-right: 2px solid var(--border-color); background-color: #1a1a1a; flex-shrink: 0;
        }
        #controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; width: 100%; aspect-ratio: 1/1; }
        .btn {
            background-color: #333; border: 1px solid #444; border-radius: 8px; color: white;
            font-size: 20px; cursor: pointer; user-select: none; display: flex; justify-content: center;
            align-items: center; box-shadow: 0 3px 0 #111; touch-action: manipulation;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #111; background-color: #444; }
        .btn-wait { font-size: 12px; font-weight: bold; background-color: #4a3b2f; }

        #message-log {
            flex: 1; padding: 10px; background-color: #0d0d0d; overflow-y: auto;
            font-size: 12px; line-height: 1.6; display: flex; flex-direction: column;
        }
        .log-entry { margin-bottom: 5px; animation: fadeInLog 0.3s; border-bottom: 1px solid #222; padding-bottom: 3px; }
        .log-entry.system { color: #88ccff; } .log-entry.danger { color: var(--danger-color); font-weight: bold;}
        .log-entry.heal { color: #88ff88; } .log-entry.normal { color: #ccc; }

        @keyframes fadeInText { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInLog { from { opacity: 0; transform: translateX(5px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
<div id="game-wrapper">
    <div id="status-bar">
        <div class="status-item hp"><ruby>体力<rt>たいりょく</rt></ruby> <span id="hp-val" class="value">20/20</span></div>
        <div class="status-item food">おなか <span id="food-val" class="value">100/100</span></div>
        <div class="status-item floor">ちか<span id="floor-val" class="value">1</span>かい</div>
    </div>
    <div id="canvas-container">
        <canvas id="gameCanvas" width="400" height="300"></canvas>
        <div id="overlay">
            <div id="title-area">
                <h1>DINO-ROGUE</h1>
                <p>いんせき から にげろ！<br>ふしぎな どうくつ の サバイバル</p>
                <button id="start-btn" class="game-btn">ゲームスタート</button>
            </div>
            <div id="story-area">
                <img id="story-img" src="" alt="Story Image">
                <div id="story-text-container">
                    <p id="story-text"></p>
                </div>
                <button id="next-story-btn" class="game-btn">次へ</button>
            </div>
        </div>
    </div>
    <div id="bottom-area">
        <div id="controls-container">
            <div id="controls">
                <div class="btn" onmousedown="handleMove(-1, -1)" ontouchstart="handleMove(-1, -1); event.preventDefault();">↖</div>
                <div class="btn" onmousedown="handleMove(0, -1)" ontouchstart="handleMove(0, -1); event.preventDefault();">⬆</div>
                <div class="btn" onmousedown="handleMove(1, -1)" ontouchstart="handleMove(1, -1); event.preventDefault();">↗</div>
                <div class="btn" onmousedown="handleMove(-1, 0)" ontouchstart="handleMove(-1, 0); event.preventDefault();">⬅</div>
                <div class="btn btn-wait" onmousedown="handleMove(0, 0)" ontouchstart="handleMove(0, 0); event.preventDefault();"><ruby>待<rt>まち</rt></ruby></div>
                <div class="btn" onmousedown="handleMove(1, 0)" ontouchstart="handleMove(1, 0); event.preventDefault();">➡</div>
                <div class="btn" onmousedown="handleMove(-1, 1)" ontouchstart="handleMove(-1, 1); event.preventDefault();">↙</div>
                <div class="btn" onmousedown="handleMove(0, 1)" ontouchstart="handleMove(0, 1); event.preventDefault();">⬇</div>
                <div class="btn" onmousedown="handleMove(1, 1)" ontouchstart="handleMove(1, 1); event.preventDefault();">↘</div>
            </div>
        </div>
        <div id="message-log"></div>
    </div>
</div>

<script>
// --- 基本設定とDOM要素 ---
const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
const elOverlay = document.getElementById('overlay'), elStatusBar = document.getElementById('status-bar');
const elBottomArea = document.getElementById('bottom-area'), elMessageLog = document.getElementById('message-log');
const elTitleArea = document.getElementById('title-area'), elStoryArea = document.getElementById('story-area');
const elStoryImg = document.getElementById('story-img'), elStoryText = document.getElementById('story-text');
const elNextStoryBtn = document.getElementById('next-story-btn');

// ゲーム定数
const MAP_WIDTH = 30, MAP_HEIGHT = 20, VIEW_WIDTH = 10, VIEW_HEIGHT = 8, MAX_FLOOR = 5;
const TILE_WALL = 0, TILE_FLOOR = 1, TILE_STAIRS = 2, TILE_MEAT = 3;

// ゲーム状態変数
let gameState = 'title', currentFloor = 1, turnCount = 0, map = [], enemies = [];
let player = { x: 1, y: 1, hp: 20, maxHp: 20, food: 100, maxFood: 100, atk: 5, def: 2 };

// --- 画像とアニメーション設定 ---
const playerImg = new Image();
playerImg.src = 'img/tyrano01.png'; // パスをimg/に修正
const SPRITE_SIZE = 64; 
let playerDir = 4, animFrame = 0, lastAnimTime = 0; 

// --- ストーリーデータ ---
// 小文字 img/ パスに修正
const introScenes = [
    { img: 'img/intro01.png', text: 'ここは、恐竜たちの世界。主人公のティラノサウルス「ティラノ」は、他の恐竜たちと平和に暮らしていました。' },
    { img: 'img/intro02.png', text: 'ところがある日、空から大きな隕石が降ってきました。世界の気候は大きく変わり、森は燃え尽きてしまいました……。' },
    { img: 'img/intro03.png', text: '餌が絶滅し、仲間の恐竜たちも倒れていくなか、最後に残ったのは地上最強のティラノだけ。「僕ももうだめなのかな……」そのときです。' },
    { img: 'img/intro04.png', text: '暗い世界に、怪しく光る洞窟が現れたのです！「この洞窟、餌のにおいがするぞ！」ティラノは希望を求めて、洞窟へ入ることにしました。' }
];

const outroScenes = [
    { img: 'img/outro01.png', text: '「出口だ！」<br>ティラノが洞窟の奥で見つけた扉をくぐり抜けると……。' },
    { img: 'img/outro02.png', text: 'そこは、隕石のない別の世界！<br>緑豊かな楽園で、沢山の恐竜たちが元気に過ごしていました！<br>「助かったぞ！」' },
    { img: 'img/outro03.png', text: 'ティラノは元気になり、また恐竜たちの世界で幸せに暮らせるようになりました。<br>「待てー！ トリケラトプス！」<br><br>【ハッピーエンド】' }
];

let currentStoryIndex = 0;
let storyType = 'intro'; // 'intro' または 'outro'

// --- システム関数 ---
function logMessage(msgHtml, type = 'normal') {
    const entry = document.createElement('div'); entry.className = `log-entry ${type}`;
    entry.innerHTML = msgHtml; elMessageLog.appendChild(entry);
    elMessageLog.scrollTop = elMessageLog.scrollHeight;
}

function updateStatus() {
    document.getElementById('hp-val').innerText = `${Math.ceil(player.hp)}/${player.maxHp}`;
    document.getElementById('food-val').innerText = `${player.food}/${player.maxFood}`;
    document.getElementById('floor-val').innerText = currentFloor;
}

// --- ストーリー進行システム ---
function showStoryScene(type, index) {
    gameState = type; // 'intro' or 'outro'
    storyType = type;
    currentStoryIndex = index;
    
    elTitleArea.style.display = 'none';
    elStatusBar.style.display = 'none';
    elBottomArea.style.display = 'none';
    elOverlay.style.display = 'flex';
    elStoryArea.style.display = 'flex';
    
    const scenes = (type === 'intro') ? introScenes : outroScenes;
    const scene = scenes[index];
    
    // 画像とテキストを更新
    elStoryImg.src = scene.img;
    elStoryText.innerHTML = scene.text;
    
    // 最後のシーンならボタンの文字を変える
    if (index === scenes.length - 1) {
        elNextStoryBtn.innerText = (type === 'intro') ? "ゲーム開始" : "タイトルへ";
    } else {
        elNextStoryBtn.innerText = "次へ";
    }
}

function nextStory() {
    currentStoryIndex++;
    const scenes = (storyType === 'intro') ? introScenes : outroScenes;
    
    if (currentStoryIndex < scenes.length) {
        showStoryScene(storyType, currentStoryIndex);
    } else {
        // ストーリー終了
        if (storyType === 'intro') {
            startGame本編(); // ゲーム開始
        } else {
            location.reload(); // タイトルへ戻る（リロード）
        }
    }
}

// イベントリスナー
elNextStoryBtn.addEventListener('click', nextStory);
document.getElementById('start-btn').addEventListener('click', () => showStoryScene('intro', 0));
// --- ダンジョン生成：部屋と通路のアルゴリズム ---
function generateMap() {
    // 全てを壁で埋める
    map = Array.from({length: MAP_HEIGHT}, () => Array(MAP_WIDTH).fill(TILE_WALL));
    let rooms = [];
    
    // マップを4つの区画に分け、各区画に1つずつ部屋を作る
    const splitX = Math.floor(MAP_WIDTH / 2);
    const splitY = Math.floor(MAP_HEIGHT / 2);
    const zones = [
        {x1: 2, y1: 2, x2: splitX - 2, y2: splitY - 2},
        {x1: splitX + 2, y1: 2, x2: MAP_WIDTH - 3, y2: splitY - 2},
        {x1: 2, y1: splitY + 2, x2: splitX - 2, y2: MAP_HEIGHT - 3},
        {x1: splitX + 2, y1: splitY + 2, x2: MAP_WIDTH - 3, y2: MAP_HEIGHT - 3}
    ];

    zones.forEach(z => {
        let w = Math.floor(Math.random() * (z.x2 - z.x1 - 2)) + 4;
        let h = Math.floor(Math.random() * (z.y2 - z.y1 - 2)) + 4;
        let rx = Math.floor(Math.random() * (z.x2 - z.x1 - w)) + z.x1;
        let ry = Math.floor(Math.random() * (z.y2 - z.y1 - h)) + z.y1;
        
        for (let y = ry; y < ry + h; y++) {
            for (let x = rx; x < rx + w; x++) {
                map[y][x] = TILE_FLOOR;
            }
        }
        rooms.push({ x: Math.floor(rx + w / 2), y: Math.floor(ry + h / 2), rx, ry, rw: w, rh: h });
    });

    // 部屋同士を通路でつなぐ（簡易L字接続）
    for (let i = 0; i < rooms.length - 1; i++) {
        let start = rooms[i], end = rooms[i + 1];
        let currX = start.x, currY = start.y;
        while (currX !== end.x) { map[currY][currX] = TILE_FLOOR; currX += Math.sign(end.x - currX); }
        while (currY !== end.y) { map[currY][currX] = TILE_FLOOR; currY += Math.sign(end.y - currY); }
    }

    // プレイヤーを最初の部屋に、階段を最後の部屋に配置
    player.x = rooms[0].x; player.y = rooms[0].y;
    map[rooms[3].y][rooms[3].x] = TILE_STAIRS;

    // お肉の初期配置
    for (let i = 0; i < 3; i++) {
        let rx, ry;
        do { rx = Math.floor(Math.random() * MAP_WIDTH); ry = Math.floor(Math.random() * MAP_HEIGHT); } 
        while (map[ry][rx] !== TILE_FLOOR || (rx === player.x && ry === player.y));
        map[ry][rx] = TILE_MEAT;
    }

    // 敵の配置と種類の設定
    enemies = [];
    const enemyTypes = [
        { name: 'コンプソグナトゥス', icon: '🦎', hp: 6, atk: 3, def: 1, freq: 0 }, // 全階層
        { name: 'プテラノドン', icon: '🦇', hp: 4, atk: 7, def: 0, freq: 2 },       // 2階〜
        { name: 'アンキロサウルス', icon: '🐢', hp: 15, atk: 4, def: 4, freq: 3 }    // 3階〜
    ];

    let count = 3 + currentFloor; // 階層ごとに敵が増えるわ
    for (let i = 0; i < count; i++) {
        let ex, ey;
        do { ex = Math.floor(Math.random() * MAP_WIDTH); ey = Math.floor(Math.random() * MAP_HEIGHT); } 
        while (map[ey][ex] !== TILE_FLOOR || (Math.abs(ex - player.x) < 4 && Math.abs(ey - player.y) < 4));
        
        // 階層に応じて出現する敵を抽選
        let availableTypes = enemyTypes.filter(t => t.freq <= currentFloor);
        let type = availableTypes[Math.floor(Math.random() * availableTypes.length)];
        enemies.push({ ...type, x: ex, y: ey, maxHp: type.hp });
    }
}

// --- 描画処理 ---
function draw() {
    if (gameState !== 'play') return;
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    let camX = Math.max(0, Math.min(player.x - Math.floor(VIEW_WIDTH / 2), MAP_WIDTH - VIEW_WIDTH));
    let camY = Math.max(0, Math.min(player.y - Math.floor(VIEW_HEIGHT / 2), MAP_HEIGHT - VIEW_HEIGHT));
    let ts = canvas.width / VIEW_WIDTH;

    // マップタイル描画
    for (let y = 0; y < VIEW_HEIGHT; y++) {
        for (let x = 0; x < VIEW_WIDTH; x++) {
            let mx = camX + x, my = camY + y;
            if (my < 0 || my >= MAP_HEIGHT || mx < 0 || mx >= MAP_WIDTH) continue;
            let dx = x * ts, dy = y * ts;
            
            if (map[my][mx] === TILE_WALL) {
                ctx.fillStyle = '#2c2c3a'; ctx.fillRect(dx, dy, ts, ts); // 壁
            } else {
                ctx.fillStyle = '#3d2b1f'; ctx.fillRect(dx, dy, ts, ts); // 床
                if (map[my][mx] === TILE_STAIRS) {
                    ctx.font = `${ts * 0.7}px sans-serif`; ctx.fillText('🚪', dx + ts / 2, dy + ts / 2);
                } else if (map[my][mx] === TILE_MEAT) {
                    ctx.font = `${ts * 0.6}px sans-serif`; ctx.fillText('🍖', dx + ts / 2, dy + ts / 2);
                }
            }
        }
    }

    // 敵の描画
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    enemies.forEach(e => {
        let ex = (e.x - camX) * ts, ey = (e.y - camY) * ts;
        if (e.x >= camX && e.x < camX + VIEW_WIDTH && e.y >= camY && e.y < camY + VIEW_HEIGHT) {
            ctx.font = `${ts * 0.7}px sans-serif`; ctx.fillText(e.icon, ex + ts / 2, ey + ts / 2);
            // ミニHPバー
            ctx.fillStyle = '#500'; ctx.fillRect(ex + 4, ey + 2, ts - 8, 3);
            ctx.fillStyle = '#0f0'; ctx.fillRect(ex + 4, ey + 2, (ts - 8) * (e.hp / e.maxHp), 3);
        }
    });

    // プレイヤーの描画
    let px = (player.x - camX) * ts, py = (player.y - camY) * ts;
    if (playerImg.complete && playerImg.naturalWidth !== 0) {
        ctx.drawImage(playerImg, animFrame * SPRITE_SIZE, playerDir * SPRITE_SIZE, SPRITE_SIZE, SPRITE_SIZE, px, py, ts, ts);
    } else {
        ctx.fillStyle = 'red'; ctx.fillRect(px, py, ts, ts); // 読み込み失敗時のバックアップ
    }
}

// --- ターン経過処理 ---
function processTurn() {
    turnCount++;
    // おなかの減少（3ターンに1回）
    if (turnCount % 3 === 0 && player.food > 0) player.food--;
    
    // 空腹・自然回復ダメージ
    if (player.food <= 0) { player.hp -= 0.5; logMessage('おなかが ペコペコで 苦しい！', 'danger'); }
    else if (player.hp < player.maxHp) { player.hp += 0.1; } // 満腹なら微量回復

    // 敵のAI（移動と攻撃）
    enemies.forEach(e => {
        let dx = player.x - e.x, dy = player.y - e.y;
        let dist = Math.max(Math.abs(dx), Math.abs(dy));

        if (dist === 1) {
            // 隣接していたら攻撃！
            let dmg = Math.max(1, e.atk - player.def);
            player.hp -= dmg;
            logMessage(`${e.icon} ${e.name} の攻撃！ ${dmg} ダメージを受けた！`, 'danger');
        } else if (dist < 7) {
            // プレイヤーを追跡
            let mx = Math.sign(dx), my = Math.sign(dy);
            let nx = e.x + mx, ny = e.y + my;
            // 壁や他の敵がいなければ移動
            if (map[ny][nx] !== TILE_WALL && !enemies.some(oe => oe.x === nx && oe.y === ny)) {
                e.x = nx; e.y = ny;
            }
        }
    });

    if (player.hp <= 0) showEnding(false);
    updateStatus(); draw();
}

// --- 移動・攻撃コマンド ---
function handleMove(dx, dy) {
    if (gameState !== 'play') return;

    // プレイヤーの向きを更新
    if (dx !== 0 || dy !== 0) {
        if (dx === 0 && dy === -1) playerDir = 0; else if (dx === 1 && dy === -1) playerDir = 1;
        else if (dx === 1 && dy === 0) playerDir = 2; else if (dx === 1 && dy === 1) playerDir = 3;
        else if (dx === 0 && dy === 1) playerDir = 4; else if (dx === -1 && dy === 1) playerDir = 5;
        else if (dx === -1 && dy === 0) playerDir = 6; else if (dx === -1 && dy === -1) playerDir = 7;
    }

    // 待機
    if (dx === 0 && dy === 0) { logMessage('ティラノは 身構えている。'); processTurn(); return; }

    let nx = player.x + dx, ny = player.y + dy;

    // 移動先に敵がいるか？（攻撃判定）
    let target = enemies.find(e => e.x === nx && e.y === ny);
    if (target) {
        let dmg = Math.max(1, player.atk - target.def);
        target.hp -= dmg;
        logMessage(`ティラノの攻撃！ ${target.icon} に ${dmg} ダメージ！`);
        
        if (target.hp <= 0) {
            logMessage(`${target.icon} を倒した！`);
            // 40%の確率でお肉をドロップ
            if (Math.random() < 0.4) {
                map[ny][nx] = TILE_MEAT;
                logMessage('お肉を 手に入れた！', 'heal');
            }
            enemies = enemies.filter(e => e !== target);
        }
        processTurn(); return;
    }

    // 壁判定
    if (nx < 0 || nx >= MAP_WIDTH || ny < 0 || ny >= MAP_HEIGHT || map[ny][nx] === TILE_WALL) return;
    // 通路の角抜け防止
    if (dx !== 0 && dy !== 0 && map[player.y][nx] === TILE_WALL && map[ny][player.x] === TILE_WALL) return;

    // 移動実行
    player.x = nx; player.y = ny;
    
    // アイテム拾得
    if (map[ny][nx] === TILE_MEAT) {
        player.food = Math.min(100, player.food + 25);
        map[ny][nx] = TILE_FLOOR;
        logMessage('落ちていた お肉を食べた！', 'heal');
    }
    
    // 階段判定
    if (map[ny][nx] === TILE_STAIRS) {
        if (currentFloor >= MAX_FLOOR) {
            showEnding(true);
        } else {
            currentFloor++;
            logMessage(`地下 ${currentFloor} 階へ 降りた。`, 'system');
            initFloor();
        }
        return;
    }
    processTurn();
}

// --- ゲーム開始・初期化 ---
function startGame本編() {
    elStoryArea.style.display = 'none';
    elOverlay.style.display = 'none';
    elStatusBar.style.display = 'flex';
    elBottomArea.style.display = 'flex';
    gameState = 'play';
    currentFloor = 1; turnCount = 0; player.hp = 20; player.food = 100;
    elMessageLog.innerHTML = '';
    initFloor();
}

function initFloor() { generateMap(); updateStatus(); draw(); }

function showEnding(isWin) { showStoryScene('outro', 0); }

// --- アニメーションループ ---
function animationLoop(timestamp) {
    if (timestamp - lastAnimTime > 500) {
        animFrame = (animFrame === 0) ? 1 : 0;
        lastAnimTime = timestamp;
        draw();
    }
    requestAnimationFrame(animationLoop);
}

// 実行開始
requestAnimationFrame(animationLoop);
</script>
