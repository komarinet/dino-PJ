<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO-ROGUE</title>
    <style>
        :root {
            --bg-color: #121212; --panel-bg: #1e1e1e;
            --text-color: #e0e0e0; --accent-color: #ff8c00; --border-color: #444;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'Meiryo', sans-serif;
            display: flex; justify-content: center; height: 100vh; height: 100dvh;
            overflow: hidden; touch-action: none;
        }
        #game-wrapper {
            display: flex; flex-direction: column; width: 100%; max-width: 600px;
            height: 100%; background-color: var(--bg-color);
        }
        #status-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; background-color: var(--panel-bg);
            border-bottom: 2px solid var(--border-color); font-size: 14px;
            font-weight: bold; flex-shrink: 0; display: none;
        }
        .status-item span.value { color: #ffaaaa; }
        .status-item.food span.value { color: #aaffaa; }
        .status-item.floor span.value { color: #aaaaff; }
        ruby { ruby-align: center; } rt { font-size: 0.6em; color: #aaa; }
        #canvas-container {
            position: relative; width: 100%; aspect-ratio: 4 / 3;
            background-color: #000; flex-shrink: 0;
        }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
            box-sizing: border-box; text-align: center; z-index: 10;
        }
        #overlay h1 { color: var(--accent-color); font-size: 28px; margin: 0 0 15px 0; text-shadow: 2px 2px 0px #8b0000; }
        #overlay p { line-height: 1.6; font-size: 14px; margin: 5px 0; }
        #start-btn {
            margin-top: 20px; padding: 12px 30px; font-size: 20px; background-color: var(--accent-color);
            color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 0 #b36200;
        }
        #start-btn:active { transform: translateY(4px); box-shadow: none; }
        #bottom-area {
            display: none; flex: 1; flex-direction: row; background-color: var(--panel-bg);
            border-top: 2px solid var(--border-color); overflow: hidden;
        }
        #controls-container {
            width: 180px; padding: 10px 5px; display: flex; justify-content: center;
            align-items: center; border-right: 2px solid var(--border-color); background-color: #1a1a1a;
        }
        #controls { display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); gap: 4px; }
        .btn {
            background-color: #444; border: 2px solid #555; border-radius: 8px; color: white;
            font-size: 20px; cursor: pointer; user-select: none; display: flex; justify-content: center;
            align-items: center; box-shadow: 0 3px 0 #222; touch-action: manipulation;
        }
        .btn:active { transform: translateY(3px); box-shadow: none; background-color: #666; }
        .btn-wait { font-size: 14px; font-weight: bold; background-color: #554433; }
        #message-log {
            flex: 1; padding: 10px; background-color: #0a0a0a; overflow-y: auto;
            font-size: 13px; line-height: 1.5; display: flex; flex-direction: column;
        }
        .log-entry { margin-bottom: 6px; animation: fadeIn 0.3s; border-bottom: 1px dashed #333; padding-bottom: 4px; }
        .log-entry.system { color: #88ccff; } .log-entry.danger { color: #ff6666; font-weight: bold;}
        .log-entry.heal { color: #88ff88; } .log-entry.normal { color: #dddddd; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(5px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
<div id="game-wrapper">
    <div id="status-bar">
        <div class="status-item hp"><ruby>体力<rt>たいりょく</rt></ruby> <span id="hp-val" class="value">20/20</span></div>
        <div class="status-item food">おなか <span id="food-val" class="value">100/100</span></div>
        <div class="status-item floor">ちか<span id="floor-val" class="value">1</span>かい</div>
    </div>
    <div id="canvas-container">
        <canvas id="gameCanvas" width="400" height="300"></canvas>
        <div id="overlay">
            <h1>DINO-ROGUE</h1>
            <p><ruby>空<rt>そら</rt></ruby>から いんせき が ふってきた！<br>きょうりゅう たちは だいピンチ！</p>
            <p>ティラノサウルスの 「ティラノ」 は、<br>ふしぎな どうくつ を みつけた。</p>
            <p>ここ を ぬければ、<br>いんせき の ない べつの <ruby>地球<rt>ちきゅう</rt></ruby> へ<br>にげられる らしい！</p>
            <button id="start-btn">ゲームスタート</button>
        </div>
    </div>
    <div id="bottom-area">
        <div id="controls-container">
            <div id="controls">
                <div class="btn" onmousedown="handleMove(-1, -1)" ontouchstart="handleMove(-1, -1); event.preventDefault();">↖</div>
                <div class="btn" onmousedown="handleMove(0, -1)" ontouchstart="handleMove(0, -1); event.preventDefault();">⬆</div>
                <div class="btn" onmousedown="handleMove(1, -1)" ontouchstart="handleMove(1, -1); event.preventDefault();">↗</div>
                <div class="btn" onmousedown="handleMove(-1, 0)" ontouchstart="handleMove(-1, 0); event.preventDefault();">⬅</div>
                <div class="btn btn-wait" onmousedown="handleMove(0, 0)" ontouchstart="handleMove(0, 0); event.preventDefault();"><ruby>待<rt>まち</rt></ruby></div>
                <div class="btn" onmousedown="handleMove(1, 0)" ontouchstart="handleMove(1, 0); event.preventDefault();">➡</div>
                <div class="btn" onmousedown="handleMove(-1, 1)" ontouchstart="handleMove(-1, 1); event.preventDefault();">↙</div>
                <div class="btn" onmousedown="handleMove(0, 1)" ontouchstart="handleMove(0, 1); event.preventDefault();">⬇</div>
                <div class="btn" onmousedown="handleMove(1, 1)" ontouchstart="handleMove(1, 1); event.preventDefault();">↘</div>
            </div>
        </div>
        <div id="message-log"></div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
const elOverlay = document.getElementById('overlay'), elStatusBar = document.getElementById('status-bar');
const elBottomArea = document.getElementById('bottom-area'), elMessageLog = document.getElementById('message-log');
const TILE_SIZE = 40, MAP_WIDTH = 30, MAP_HEIGHT = 20, VIEW_WIDTH = 10;
const VIEW_HEIGHT = 8, MAX_FLOOR = 5;
const TILE_WALL = 0, TILE_FLOOR = 1, TILE_STAIRS = 2, TILE_MEAT = 3;

let gameState = 'title', currentFloor = 1, turnCount = 0, map = [], enemies = [];
let player = { x: 1, y: 1, hp: 20, maxHp: 20, food: 100, maxFood: 100, atk: 5, def: 2 };

// --- 画像とアニメーション設定 ---
const playerImg = new Image();
playerImg.src = 'img/tyrano01.png';
const SPRITE_SIZE = 64; 
let playerDir = 4, animFrame = 0, lastAnimTime = 0; 

function logMessage(msgHtml, type = 'normal') {
    const entry = document.createElement('div'); entry.className = `log-entry ${type}`;
    entry.innerHTML = msgHtml; elMessageLog.appendChild(entry);
    elMessageLog.scrollTop = elMessageLog.scrollHeight;
}

function updateStatus() {
    document.getElementById('hp-val').innerText = `${Math.ceil(player.hp)}/${player.maxHp}`;
    document.getElementById('food-val').innerText = `${player.food}/${player.maxFood}`;
    document.getElementById('floor-val').innerText = currentFloor;
}

// --- 部屋と通路のダンジョン生成 ---
function generateMap() {
    map = Array.from({length: MAP_HEIGHT}, () => Array(MAP_WIDTH).fill(TILE_WALL));
    let rooms = [];
    const splitX = Math.floor(MAP_WIDTH / 2), splitY = Math.floor(MAP_HEIGHT / 2);
    
    // 4つの区画にそれぞれ1つ部屋を作る
    const zones = [
        {x1: 2, y1: 2, x2: splitX-2, y2: splitY-2},
        {x1: splitX+2, y1: 2, x2: MAP_WIDTH-3, y2: splitY-2},
        {x1: 2, y1: splitY+2, x2: splitX-2, y2: MAP_HEIGHT-3},
        {x1: splitX+2, y1: splitY+2, x2: MAP_WIDTH-3, y2: MAP_HEIGHT-3}
    ];

    zones.forEach(z => {
        let w = Math.floor(Math.random() * (z.x2 - z.x1 - 2)) + 3;
        let h = Math.floor(Math.random() * (z.y2 - z.y1 - 2)) + 3;
        let rx = Math.floor(Math.random() * (z.x2 - z.x1 - w)) + z.x1;
        let ry = Math.floor(Math.random() * (z.y2 - z.y1 - h)) + z.y1;
        for(let y=ry; y<ry+h; y++) for(let x=rx; x<rx+w; x++) map[y][x] = TILE_FLOOR;
        rooms.push({x: Math.floor(rx + w/2), y: Math.floor(ry + h/2)});
    });

    // 通路でつなぐ（簡易L字）
    for(let i=0; i<rooms.length-1; i++) {
        let start = rooms[i], end = rooms[i+1];
        for(let x=Math.min(start.x, end.x); x<=Math.max(start.x, end.x); x++) map[start.y][x] = TILE_FLOOR;
        for(let y=Math.min(start.y, end.y); y<=Math.max(start.y, end.y); y++) map[y][end.x] = TILE_FLOOR;
    }

    // 入口と出口
    player.x = rooms[0].x; player.y = rooms[0].y;
    map[rooms[3].y][rooms[3].x] = TILE_STAIRS;

    // お肉の配置
    for(let i=0; i<3; i++) {
        let rx, ry; do { rx = Math.floor(Math.random()*MAP_WIDTH); ry = Math.floor(Math.random()*MAP_HEIGHT); } while(map[ry][rx] !== TILE_FLOOR);
        map[ry][rx] = TILE_MEAT;
    }

    // 敵の配置
    enemies = [];
    const enemyTypes = [
        {name: 'コンプソグナトゥス', icon: '🦎', hp: 5, atk: 3, def: 1},
        {name: 'プテラノドン', icon: '🦇', hp: 3, atk: 6, def: 0},
        {name: 'アンキロサウルス', icon: '🐢', hp: 12, atk: 4, def: 3}
    ];
    for(let i=0; i<3 + currentFloor; i++) {
        let ex, ey; do { ex = Math.floor(Math.random()*MAP_WIDTH); ey = Math.floor(Math.random()*MAP_HEIGHT); } 
        while(map[ey][ex] !== TILE_FLOOR || (ex === player.x && ey === player.y));
        let type = enemyTypes[Math.floor(Math.random() * Math.min(enemyTypes.length, currentFloor))];
        enemies.push({...type, x: ex, y: ey, maxHp: type.hp});
    }
}

function draw() {
    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (gameState !== 'play') return;
    
    let camX = Math.max(0, Math.min(player.x - Math.floor(VIEW_WIDTH / 2), MAP_WIDTH - VIEW_WIDTH));
    let camY = Math.max(0, Math.min(player.y - Math.floor(VIEW_HEIGHT / 2), MAP_HEIGHT - VIEW_HEIGHT));
    let ts = canvas.width / VIEW_WIDTH;

    for (let y = 0; y < VIEW_HEIGHT; y++) {
        for (let x = 0; x < VIEW_WIDTH; x++) {
            let mx = camX + x, my = camY + y;
            if(my < 0 || my >= MAP_HEIGHT || mx < 0 || mx >= MAP_WIDTH) continue;
            let dx = x * ts, dy = y * ts;
            if (map[my][mx] === TILE_WALL) { ctx.fillStyle = '#333'; ctx.fillRect(dx, dy, ts, ts); }
            else { 
                ctx.fillStyle = '#4a3b2f'; ctx.fillRect(dx, dy, ts, ts); 
                if(map[my][mx] === TILE_STAIRS) { ctx.fillText('🚪', dx+ts/2, dy+ts/2); }
                else if(map[my][mx] === TILE_MEAT) { ctx.fillText('🍖', dx+ts/2, dy+ts/2); }
            }
        }
    }
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = `${ts*0.6}px sans-serif`;
    
    enemies.forEach(e => {
        let ex = (e.x - camX)*ts, ey = (e.y - camY)*ts;
        if(e.x>=camX && e.x<camX+VIEW_WIDTH && e.y>=camY && e.y<camY+VIEW_HEIGHT) {
            ctx.fillText(e.icon, ex+ts/2, ey+ts/2);
            ctx.fillStyle = 'red'; ctx.fillRect(ex+5, ey+2, ts-10, 2);
            ctx.fillStyle = 'lime'; ctx.fillRect(ex+5, ey+2, (ts-10)*(e.hp/e.maxHp), 2);
        }
    });

    let px = (player.x - camX)*ts, py = (player.y - camY)*ts;
    if(playerImg.complete) ctx.drawImage(playerImg, animFrame*SPRITE_SIZE, playerDir*SPRITE_SIZE, SPRITE_SIZE, SPRITE_SIZE, px, py, ts, ts);
    else { ctx.fillStyle='red'; ctx.fillRect(px,py,ts,ts); }
}

function processTurn() {
    turnCount++;
    if (turnCount % 3 === 0 && player.food > 0) player.food--;
    if (player.food <= 0) { player.hp -= 0.5; logMessage('おなかが ペコペコだ！', 'danger'); }
    else if (player.hp < player.maxHp) player.hp += 0.2;

    enemies.forEach(e => {
        let dx = player.x - e.x, dy = player.y - e.y;
        if (Math.abs(dx) <= 1 && Math.abs(dy) <= 1) {
            let dmg = Math.max(1, e.atk - player.def);
            player.hp -= dmg; logMessage(`${e.icon} の こうげき！ ${dmg} ダメージ！`, 'danger');
        } else if (Math.abs(dx) < 6 && Math.abs(dy) < 6) {
            let mx = Math.sign(dx), my = Math.sign(dy);
            if(map[e.y+my][e.x+mx] === TILE_FLOOR && !enemies.some(oe=>oe.x===e.x+mx && oe.y===e.y+my)) { e.x+=mx; e.y+=my; }
        }
    });
    if (player.hp <= 0) showEnding(false);
    updateStatus(); draw();
}

function handleMove(dx, dy) {
    if (gameState !== 'play') return;
    // 向き
    if(dx!==0 || dy!==0) {
        if(dx===0 && dy===-1) playerDir=0; else if(dx===1 && dy===-1) playerDir=1;
        else if(dx===1 && dy===0) playerDir=2; else if(dx===1 && dy===1) playerDir=3;
        else if(dx===0 && dy===1) playerDir=4; else if(dx===-1 && dy===1) playerDir=5;
        else if(dx===-1 && dy===0) playerDir=6; else if(dx===-1 && dy===-1) playerDir=7;
    }

    let nx = player.x+dx, ny = player.y+dy;
    let target = enemies.find(e => e.x === nx && e.y === ny);
    if(target) {
        let dmg = Math.max(1, player.atk - target.def);
        target.hp -= dmg; logMessage(`${target.icon} に ${dmg} ダメージ！`);
        if(target.hp <= 0) {
            logMessage(`${target.icon} を たおした！`);
            if(Math.random() < 0.4) { map[ny][nx] = TILE_MEAT; logMessage('おにく を おとした！', 'heal'); }
            enemies = enemies.filter(e => e !== target);
        }
        processTurn(); return;
    }

    if(dx===0 && dy===0) { logMessage('ティラノ は みがまえている。'); processTurn(); return; }
    if(nx<0 || nx>=MAP_WIDTH || ny<0 || ny>=MAP_HEIGHT || map[ny][nx]===TILE_WALL) return;
    if(dx!==0 && dy!==0 && map[player.y][nx]===TILE_WALL && map[ny][player.x]===TILE_WALL) return;

    player.x = nx; player.y = ny;
    if(map[ny][nx] === TILE_MEAT) { player.food = Math.min(100, player.food+20); map[ny][nx]=TILE_FLOOR; logMessage('おにく を たべた！', 'heal'); }
    if(map[ny][nx] === TILE_STAIRS) {
        if(currentFloor >= MAX_FLOOR) showEnding(true);
        else { currentFloor++; logMessage(`ちか ${currentFloor} かい に すすんだ！`, 'system'); initFloor(); }
        return;
    }
    processTurn();
}

function showEnding(isWin) {
    gameState = 'ending';
    elOverlay.style.display = 'flex';
    if(isWin) {
        elOverlay.innerHTML = `<h1 style="color:#88ff88;">ハッピーエンド！</h1>
        <p>ティラノ は ついに 地下5階 を ぬけた！</p>
        <p>そこには いんせき の ない、<br>みどり ゆたかな 地球 が 広がっていた。</p>
        <p>きょうりゅう たちの 世界 は、<br>これからも ずっと つづいていく……。</p>
        <button onclick="location.reload()">もういちど あそぶ</button>`;
    } else {
        elOverlay.innerHTML = `<h1>ゲームオーバー</h1><p>ティラノ は たおれてしまった…</p><button onclick="location.reload()">リトライ</button>`;
    }
}

function startGame() {
    elOverlay.style.display = 'none'; elStatusBar.style.display = 'flex'; elBottomArea.style.display = 'flex';
    gameState = 'play'; currentFloor = 1; turnCount = 0; player.hp = 20; player.food = 100;
    elMessageLog.innerHTML = ''; logMessage('ふしぎな どうくつ に はいった！', 'system');
    initFloor();
}

function initFloor() { generateMap(); updateStatus(); draw(); }
function animationLoop(timestamp) {
    if (timestamp - lastAnimTime > 500) { animFrame = (animFrame === 0) ? 1 : 0; lastAnimTime = timestamp; draw(); }
    requestAnimationFrame(animationLoop);
}

document.getElementById('start-btn').addEventListener('click', startGame);
requestAnimationFrame(animationLoop);
</script>
</body>
</html>
