<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprite Studio v1.1</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent: #00e5ff;
            --border: #333;
            --text: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ヘッダー・バージョン情報 */
        header {
            padding: 10px 20px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .version-tag {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--accent);
            opacity: 0.7;
        }

        /* メインレイアウト */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        @media (max-width: 768px) {
            .main-layout { flex-direction: column; overflow-y: auto; }
        }

        /* サイドバー（設定） */
        .sidebar {
            width: 320px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        @media (max-width: 768px) { .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); } }

        /* プレビューエリア */
        .preview-area {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background: #0a0a0a;
            overflow: auto;
            position: relative;
        }

        /* アニメーションプレビューパネル */
        .anim-panel {
            position: sticky;
            top: 0;
            background: rgba(30,30,30,0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            margin-bottom: 20px;
            text-align: center;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        canvas {
            /* プレビュー用の格子背景 */
            background-image: linear-gradient(45deg, #1a1a1a 25%, transparent 25%), linear-gradient(-45deg, #1a1a1a 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #1a1a1a 75%), linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* スタイリッシュな入力UI */
        .group { border: 1px solid var(--border); padding: 10px; border-radius: 5px; }
        .group h4 { margin: 0 0 10px 0; font-size: 12px; color: var(--accent); text-transform: uppercase; }
        label { display: block; font-size: 11px; margin-bottom: 5px; color: #aaa; }
        input[type="number"], input[type="text"] {
            width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 5px; border-radius: 3px; box-sizing: border-box;
        }
        .btn-primary {
            background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px;
        }
        .btn-primary:hover { opacity: 0.8; }

        .sprite-list { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        .sprite-item { display: flex; align-items: center; gap: 10px; background: #252525; padding: 5px; font-size: 11px; border-radius: 3px; }
        .sprite-item img { width: 30px; height: 30px; object-fit: contain; background: #fff; }

    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; letter-spacing: 1px;">SPRITE STUDIO <span style="color:var(--accent)">PRO</span></div>
    <div class="version-tag">VER 1.1.0 / BUILD 2026</div>
</header>

<div class="main-layout">
    <div class="sidebar">
        <div class="group">
            <h4>File Import</h4>
            <input type="file" id="fileInput" multiple accept="image/*">
            <button class="btn-primary" id="downloadBtn">EXPORT (.PNG)</button>
        </div>

        <div class="group">
            <h4>Grid Settings</h4>
            <label>COLUMNS: <input type="number" id="cols" value="3"></label>
            <label>ROWS: <input type="number" id="rows" value="4"></label>
            <label>CELL SIZE: <input type="number" id="cellW" value="128"> x <input type="number" id="cellH" value="128"></label>
        </div>

        <div class="group">
            <h4>Loop Preview Settings</h4>
            <label>START INDEX (1~): <input type="number" id="loopStart" value="4"></label>
            <label>END INDEX (1~): <input type="number" id="loopEnd" value="6"></label>
            <label>FPS: <input type="number" id="loopFps" value="8"></label>
        </div>

        <div class="group">
            <h4>Images (<span id="imgCount">0</span>)</h4>
            <div id="spriteList" class="sprite-list"></div>
        </div>
    </div>

    <div class="preview-area">
        <div class="anim-panel">
            <div style="font-size: 10px; margin-bottom: 5px; color: var(--accent);">LOOP PREVIEW</div>
            <canvas id="animCanvas" width="128" height="128" style="background:none; border:none; box-shadow:none;"></canvas>
        </div>

        <div style="font-size: 10px; margin-bottom: 10px; color: #666;">SHEET PREVIEW (TRANSPARENT BACKGROUND)</div>
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const mainCanvas = document.getElementById('mainCanvas');
    const mCtx = mainCanvas.getContext('2d');
    const animCanvas = document.getElementById('animCanvas');
    const aCtx = animCanvas.getContext('2d');
    const spriteList = document.getElementById('spriteList');

    let images = [];
    let loopFrame = 0;
    let lastAnimTime = 0;

    // ファイル読み込み
    fileInput.onchange = async (e) => {
        const files = Array.from(e.target.files);
        for (const file of files) {
            const img = new Image();
            img.src = URL.createObjectURL(file);
            await img.decode();
            images.push({ img, name: file.name });
        }
        document.getElementById('imgCount').textContent = images.length;
        updateUI();
        drawSheet();
    };

    function updateUI() {
        spriteList.innerHTML = '';
        images.forEach((data, i) => {
            const item = document.createElement('div');
            item.className = 'sprite-item';
            item.innerHTML = `<img src="${data.img.src}"> <span>#${i+1}: ${data.name.slice(0,10)}</span>`;
            spriteList.appendChild(item);
        });
    }

    // メインシートの描画
    function drawSheet() {
        if (images.length === 0) return;
        const cw = parseInt(document.getElementById('cellW').value);
        const ch = parseInt(document.getElementById('cellH').value);
        const cols = parseInt(document.getElementById('cols').value);
        const rows = parseInt(document.getElementById('rows').value);

        mainCanvas.width = cols * cw;
        mainCanvas.height = rows * ch;

        // 重要：透過のためにクリアするだけ（背景色は塗らない）
        mCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);

        images.forEach((data, i) => {
            if (i >= cols * rows) return;
            const c = i % cols;
            const r = Math.floor(i / cols);
            
            // 中央に描画
            const dx = c * cw + (cw - data.img.width) / 2;
            const dy = r * ch + (ch - data.img.height) / 2;
            mCtx.drawImage(data.img, dx, dy);
        });
    }

    // ループアニメーションの更新処理
    function updateAnimation(timestamp) {
        const start = parseInt(document.getElementById('loopStart').value) - 1;
        const end = parseInt(document.getElementById('loopEnd').value) - 1;
        const fps = parseInt(document.getElementById('loopFps').value);
        
        if (images.length > 0 && start >= 0 && end < images.length && start <= end) {
            const interval = 1000 / fps;
            if (timestamp - lastAnimTime > interval) {
                loopFrame = loopFrame < start || loopFrame >= end ? start : loopFrame + 1;
                
                const cw = parseInt(document.getElementById('cellW').value);
                const ch = parseInt(document.getElementById('cellH').value);
                animCanvas.width = cw;
                animCanvas.height = ch;
                
                aCtx.clearRect(0, 0, cw, ch);
                const img = images[loopFrame].img;
                aCtx.drawImage(img, (cw - img.width) / 2, (ch - img.height) / 2);
                
                lastAnimTime = timestamp;
            }
        }
        requestAnimationFrame(updateAnimation);
    }

    // 設定変更時に描画更新
    ['cols', 'rows', 'cellW', 'cellH'].forEach(id => {
        document.getElementById(id).addEventListener('input', drawSheet);
    });

    // ダウンロード処理
    document.getElementById('downloadBtn').onclick = () => {
        // グリッド線などを入れずに、現在のCanvas（背景透明）を保存
        const link = document.createElement('a');
        link.download = `spritesheet_transparent.png`;
        link.href = mainCanvas.toDataURL('image/png');
        link.click();
    };

    // アニメーション開始
    requestAnimationFrame(updateAnimation);

</script>

</body>
</html>
