<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スプライト制作ツール v1.6</title>
    <style>
        :root { --bg: #f0f2f5; --panel: #ffffff; --accent: #007bff; --text: #333; --border: #ddd; --danger: #dc3545; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #333; color: white; padding: 10px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }

        .app-container { display: flex; flex: 1; overflow: hidden; }
        @media (max-width: 800px) { .app-container { flex-direction: column; overflow-y: auto; } }

        .sidebar { width: 300px; background: var(--panel); border-right: 1px solid var(--border); padding: 15px; overflow-y: auto; box-sizing: border-box; }
        @media (max-width: 800px) { .sidebar { width: 100%; border-right: none; } }

        .group { background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); }
        h4 { margin: 0 0 10px 0; font-size: 13px; color: #555; border-bottom: 2px solid var(--accent); display: inline-block; }

        .main-stage { flex: 1; display: flex; flex-direction: column; padding: 15px; align-items: center; overflow: auto; background: #e5e7eb; }
        
        /* 枠の見た目 */
        .slot-grid { display: grid; gap: 8px; margin-bottom: 20px; }
        .slot { 
            width: 75px; height: 75px; border: 2px solid #ccc; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; position: relative;
            cursor: pointer; background: white; transition: 0.2s;
        }
        .slot.selected { border-color: var(--accent); background: #e7f3ff; }
        /* はみ出し警告 */
        .slot.overflow { border-color: var(--danger); box-shadow: inset 0 0 10px rgba(220, 53, 69, 0.2); }
        .slot.overflow::after { content: "!"; position: absolute; bottom: 2px; right: 4px; color: var(--danger); font-weight: bold; font-size: 14px; }
        
        .slot img { max-width: 90%; max-height: 90%; object-fit: contain; pointer-events: none; }
        .slot-num { position: absolute; top: 2px; left: 4px; font-size: 9px; color: #999; }

        .canvas-wrapper { max-width: 100%; background: #fff; border: 1px solid #999; }
        #mainCanvas { display: block; max-width: 100%; height: auto !important; }

        .inspector { width: 300px; background: var(--panel); border-left: 1px solid var(--border); padding: 15px; box-sizing: border-box; }
        @media (max-width: 800px) { .inspector { width: 100%; border-left: none; } }
        
        .control-row { margin-bottom: 12px; }
        label { font-size: 11px; font-weight: bold; display: block; margin-bottom: 4px; color: #666; }
        .btn-sm { background: #6c757d; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; margin-right: 4px; }
        .btn-sm:hover { background: #5a6268; }

        .btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-delete { background: #dc3545; }
        .total-info { font-size: 12px; font-weight: bold; color: #28a745; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div>スプライト制作ツール Pro <b>v1.6</b></div>
</header>

<div class="app-container">
    <div class="sidebar">
        <div class="group">
            <h4>1. グリッド設定</h4>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <label>列数<input type="number" id="cols" value="3"></label>
                <label>行数<input type="number" id="rows" value="4"></label>
                <label>マス幅<input type="number" id="cellW" value="128"></label>
                <label>マス高<input type="number" id="cellH" value="128"></label>
            </div>
            <div id="totalPx" class="total-info">合計サイズ: 0 × 0 px</div>
        </div>
        <div class="group">
            <h4>2. ループ設定</h4>
            <label>ループ順 (スロット番号)</label>
            <input type="text" id="loopSeq" value="1, 2, 3">
            <label style="margin-top:5px;">FPS (速度)<input type="number" id="loopFps" value="8"></label>
        </div>
        <div class="group">
            <h4>3. 画像読み込み</h4>
            <input type="file" id="fileInput" multiple accept="image/*">
            <button class="btn" id="dlBtn">PNG保存 (透過)</button>
        </div>
    </div>

    <div class="main-stage">
        <div style="background:#fff; padding:10px; border-radius:8px; border:2px solid var(--accent); margin-bottom:15px; text-align:center;">
            <div style="font-size:10px; font-weight:bold; color:var(--accent);">アニメ確認</div>
            <canvas id="animCanvas"></canvas>
        </div>
        <h4 style="margin-bottom:8px;">配置マップ <small style="color:#f00; font-weight:normal;">(赤い枠ははみ出し警告)</small></h4>
        <div id="slotGrid" class="slot-grid"></div>
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="inspector" id="inspector" style="display:none;">
        <h4 id="inspectTitle">調整パネル</h4>
        <div class="control-row">
            <label>拡大率</label>
            <div style="margin-bottom:5px;">
                <button class="btn-sm" onclick="fitTo('width')">幅に合わせる</button>
                <button class="btn-sm" onclick="fitTo('height')">高さに合わせる</button>
            </div>
            <input type="number" id="scNum" step="0.01"><input type="range" id="scRange" min="0.01" max="5" step="0.01">
        </div>
        <div class="control-row">
            <label>回転 / 位置</label>
            <input type="range" id="rtRange" min="-180" max="180">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:5px;">
                <input type="number" id="oxNum" placeholder="X"><input type="number" id="oyNum" placeholder="Y">
            </div>
        </div>
        <button class="btn btn-delete" onclick="clearSlot()">削除</button>
    </div>
</div>

<script>
    let sprites = []; 
    let selectedIdx = null;
    let loopIdx = 0;
    let lastAnimTime = 0;

    const fileInput = document.getElementById('fileInput');
    const slotGrid = document.getElementById('slotGrid');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const animCanvas = document.getElementById('animCanvas');
    const aCtx = animCanvas.getContext('2d');
    const inspector = document.getElementById('inspector');

    function checkOverflow(s, cw, ch) {
        if (!s) return false;
        const sw = s.img.width * s.scale;
        const sh = s.img.height * s.scale;
        const rad = s.rot * Math.PI / 180;
        const corners = [[-sw/2, -sh/2], [sw/2, -sh/2], [-sw/2, sh/2], [sw/2, sh/2]];
        for (let [cx, cy] of corners) {
            const rx = cx * Math.cos(rad) - cy * Math.sin(rad) + cw/2 + s.ox;
            const ry = cx * Math.sin(rad) + cy * Math.cos(rad) + ch/2 + s.oy;
            if (rx < -0.1 || rx > cw + 0.1 || ry < -0.1 || ry > ch + 0.1) return true;
        }
        return false;
    }

    function initSlots() {
        const cols = parseInt(document.getElementById('cols').value);
        const rows = parseInt(document.getElementById('rows').value);
        const cw = parseInt(document.getElementById('cellW').value);
        const ch = parseInt(document.getElementById('cellH').value);
        
        document.getElementById('totalPx').textContent = `合計サイズ: ${cols * cw} × ${rows * ch} px`;
        slotGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        slotGrid.innerHTML = '';
        
        for (let i = 0; i < cols * rows; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot' + (i === selectedIdx ? ' selected' : '');
            if (checkOverflow(sprites[i], cw, ch)) slot.classList.add('overflow');
            slot.innerHTML = `<span class="slot-num">${i+1}</span>`;
            if (sprites[i]) {
                const thumb = new Image(); thumb.src = sprites[i].img.src;
                slot.appendChild(thumb);
            }
            slot.onclick = () => handleSlotClick(i);
            slotGrid.appendChild(slot);
        }
        draw(true);
    }

    function handleSlotClick(i) {
        if (selectedIdx !== null && selectedIdx !== i) {
            const temp = sprites[selectedIdx]; sprites[selectedIdx] = sprites[i]; sprites[i] = temp;
            selectedIdx = null; inspector.style.display = 'none';
        } else {
            selectedIdx = (selectedIdx === i) ? null : i;
        }
        if (selectedIdx !== null && sprites[selectedIdx]) {
            inspector.style.display = 'block';
            syncInspector(sprites[selectedIdx]);
        } else {
            inspector.style.display = 'none';
        }
        initSlots();
    }

    function fitTo(type) {
        if (selectedIdx === null || !sprites[selectedIdx]) return;
        const s = sprites[selectedIdx];
        const cw = parseInt(document.getElementById('cellW').value);
        const ch = parseInt(document.getElementById('cellH').value);
        s.scale = (type === 'width') ? cw / s.img.width : ch / s.img.height;
        s.ox = 0; s.oy = 0; s.rot = 0;
        syncInspector(s);
        initSlots();
    }

    fileInput.onchange = async (e) => {
        const files = Array.from(e.target.files);
        for (const file of files) {
            let img = new Image(); img.src = URL.createObjectURL(file);
            await img.decode();
            if (sprites.filter(s => s).length === 0) {
                document.getElementById('cellW').value = img.width;
                document.getElementById('cellH').value = img.height;
            }
            const targetIdx = sprites.findIndex((s, idx) => !s && idx < 100);
            sprites[targetIdx === -1 ? sprites.length : targetIdx] = { img, scale: 1.0, rot: 0, ox: 0, oy: 0 };
        }
        initSlots();
    };

    function syncInspector(s) {
        const mapping = [['scNum','scale'],['scRange','scale'],['rtRange','rot'],['oxNum','ox'],['oyNum','oy']];
        mapping.forEach(([id, prop]) => {
            const el = document.getElementById(id); el.value = s[prop];
            el.oninput = (e) => { s[prop] = parseFloat(e.target.value); syncInspector(s); draw(true); initSlots(); };
        });
    }

    function clearSlot() { if (selectedIdx !== null) { sprites[selectedIdx] = null; selectedIdx = null; initSlots(); inspector.style.display = 'none'; } }

    function drawSprite(pCtx, s, x, y, cw, ch) {
        pCtx.save(); pCtx.translate(x + cw/2 + s.ox, y + ch/2 + s.oy); pCtx.rotate(s.rot * Math.PI / 180);
        pCtx.drawImage(s.img, -s.img.width*s.scale/2, -s.img.height*s.scale/2, s.img.width*s.scale, s.img.height*s.scale);
        pCtx.restore();
    }

    function draw(guides = false) {
        const cw = parseInt(document.getElementById('cellW').value), ch = parseInt(document.getElementById('cellH').value);
        const cols = parseInt(document.getElementById('cols').value), rows = parseInt(document.getElementById('rows').value);
        canvas.width = cols * cw; canvas.height = rows * ch;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (guides) {
            ctx.strokeStyle = "rgba(0,123,255,0.2)";
            for(let i=0; i<=cols; i++){ ctx.moveTo(i*cw,0); ctx.lineTo(i*cw,canvas.height); }
            for(let i=0; i<=rows; i++){ ctx.moveTo(0,i*ch); ctx.lineTo(canvas.width,i*ch); }
            ctx.stroke();
        }
        sprites.forEach((s, i) => { if(s && i < cols*rows) drawSprite(ctx, s, (i%cols)*cw, Math.floor(i/cols)*ch, cw, ch); });
    }

    function animate(t) {
        const seq = document.getElementById('loopSeq').value.split(',').map(n=>parseInt(n.trim())-1).filter(n=>!isNaN(n)&&sprites[n]);
        const fps = parseInt(document.getElementById('loopFps').value), cw = parseInt(document.getElementById('cellW').value), ch = parseInt(document.getElementById('cellH').value);
        if (seq.length > 0 && t - lastAnimTime > 1000/fps) {
            loopIdx = (loopIdx + 1) % seq.length; animCanvas.width = cw; animCanvas.height = ch;
            aCtx.clearRect(0,0,cw,ch); drawSprite(aCtx, sprites[seq[loopIdx]], 0, 0, cw, ch);
            lastAnimTime = t;
        }
        requestAnimationFrame(animate);
    }

    document.getElementById('dlBtn').onclick = () => { draw(false); const l = document.createElement('a'); l.download = "sheet.png"; l.href = canvas.toDataURL(); l.click(); draw(true); };
    ['cols', 'rows', 'cellW', 'cellH'].forEach(id => document.getElementById(id).oninput = initSlots);
    requestAnimationFrame(animate);
    initSlots();
</script>
</body>
</html>
