<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sprite Sheet Maker</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
        .controls { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        canvas { background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; border: 1px solid #999; max-width: 100%; }
        input[type="number"] { width: 60px; }
    </style>
</head>
<body>

    <h2>Sprite Sheet Maker</h2>

    <div class="controls">
        <input type="file" id="fileInput" multiple accept="image/*">
        <label>列数: <input type="number" id="cols" value="3" min="1"></label>
        <label>1セルの幅: <input type="number" id="cellW" value="200"></label>
        <label>1セルの高: <input type="number" id="cellH" value="200"></label>
        <label>拡大率: <input type="range" id="scale" min="0.1" max="3" step="0.1" value="1.0"></label>
        <label>位置X微調整: <input type="number" id="offsetX" value="0"></label>
        <label>位置Y微調整: <input type="number" id="offsetY" value="0"></label>
        <button id="downloadBtn">PNGとして保存</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const fileInput = document.getElementById('fileInput');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');

        let images = [];

        // 入力値の取得
        const getInputs = () => ({
            cols: parseInt(document.getElementById('cols').value),
            cellW: parseInt(document.getElementById('cellW').value),
            cellH: parseInt(document.getElementById('cellH').value),
            scale: parseFloat(document.getElementById('scale').value),
            offX: parseInt(document.getElementById('offsetX').value),
            offY: parseInt(document.getElementById('offsetY').value)
        });

        // 描画処理
        function draw() {
            if (images.length === 0) return;
            const settings = getInputs();
            const rows = Math.ceil(images.length / settings.cols);

            canvas.width = settings.cols * settings.cellW;
            canvas.height = rows * settings.cellH;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            images.forEach((img, i) => {
                const col = i % settings.cols;
                const row = Math.floor(i / settings.cols);

                const destW = img.width * settings.scale;
                const destH = img.height * settings.scale;

                // 中心合わせ + 微調整
                const x = col * settings.cellW + (settings.cellW - destW) / 2 + settings.offX;
                const y = row * settings.cellH + (settings.cellH - destH) / 2 + settings.offY;

                ctx.drawImage(img, x, y, destW, destH);
            });
        }

        // ファイル読み込み
        fileInput.onchange = async (e) => {
            images = [];
            const files = Array.from(e.target.files);
            for (const file of files) {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                await img.decode();
                images.push(img);
            }
            draw();
        };

        // イベントリスナー
        ['cols', 'cellW', 'cellH', 'scale', 'offsetX', 'offsetY'].forEach(id => {
            document.getElementById(id).addEventListener('input', draw);
        });

        // ダウンロード
        downloadBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = 'spritesheet.png';
            link.href = canvas.toDataURL();
            link.click();
        };
    </script>
</body>
</html>
