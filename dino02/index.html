<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO-CHASE DX: PERFECT LOOP & JUNGLE RUN v5.4</title>
    <style>
        body { margin: 0; padding: 0; background-color: #050a05; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100dvh; image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
/**
 * DINO-CHASE DX - V5.4 Perfect Loop & JUNGLE JIVE
 * 開発: 先生 & Gemini (Missing Code Fixed)
 */

const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
let W, H, hW, hH;

// --- エンジン定数 ---
const CAMERA_HEIGHT = 1500;
const CAMERA_DEPTH = 0.8; 
const RENDER_DISTANCE = 200; // 奥の描画距離（Z値）
const SCROLL_SPEED = 0.5; // 速度を半分に落とし、重厚感を出す

let animTime = 0;
let travelDist = 0;
let cameraYaw = 0; 
let sprites = [];
let effects = [];
let touch = { x: 0, y: 0, down: false };

// --- 画像アセット ---
const roadImg = new Image(); roadImg.src = 'img/road03.png'; // 復活
const backImg = new Image(); backImg.src = 'img/back01.png'; // 新規追加: 遠景パノラマ
const tyranoImg = new Image(); tyranoImg.src = 'img/tyrano_ani01.png'; 
const plantImg = new Image(); plantImg.src = 'img/plant01.png'; // 新規追加

// --- 植物スプライトのUV定義 (1024x1024アトラス仕様) ---
const PLANT_DEFS = {
    'tall': [
        { x: 0, y: 0, w: 256, h: 512 },
        { x: 256, y: 0, w: 256, h: 512 },
        { x: 512, y: 0, w: 256, h: 512 }
    ],
    'short': [
        { x: 0, y: 512, w: 256, h: 256 },
        { x: 256, y: 512, w: 256, h: 256 },
        { x: 512, y: 512, w: 256, h: 256 }
    ],
    'ground': [
        { x: 0, y: 768, w: 256, h: 256 },
        { x: 256, y: 768, w: 256, h: 256 },
        { x: 512, y: 768, w: 256, h: 256 }
    ]
};

// --- スプライト（ビルボード）クラス ---
class Sprite {
    constructor(type, xOffset, z) {
        this.type = type; // 'tall', 'short', 'ground', 'boss'
        this.xOffset = xOffset; // 道路中心からの横ズレ
        this.z = z;
        
        // 仮のサイズ設定（本来はplant01.pngの切り出しサイズ）
        if(type !== 'boss') {
            this.index = Math.floor(Math.random() * 3);
            this.def = PLANT_DEFS[type][this.index];
            this.w = this.def.w;
            this.h = this.def.h;
            // 木のサイズを少し落ち着かせる
            this.scaleBase = type === 'tall' ? 5.0 : type === 'short' ? 3.5 : 2.5;
        } else {
            this.w = 512; 
            this.h = 512; 
            // 【重要修正】巨大すぎたスケールを、無理のない巨獣サイズ(7.5)に調整
            this.scaleBase = 7.5; 
        }
    }
}

class HitEffect {
    constructor(x, y) { this.x = x; this.y = y; this.life = 20; }
    draw() {
        this.life--;
        ctx.fillStyle = `rgba(255, ${150 + this.life * 5}, 50, ${this.life / 20})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, 50 - this.life * 2, 0, Math.PI*2); ctx.fill();
    }
}

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    hW = W / 2; hH = H / 2;
}

function init() {
    resize();
    animTime = 0; travelDist = 0;
    sprites = []; effects = [];

    // 植物を生成。道路に被らないように配置
    for(let i = 0; i < 250; i++) {
        spawnPlant(Math.random() * RENDER_DISTANCE);
    }
    // ボス配置。遠近法を効かせるため遠くに配置。
    sprites.push(new Sprite('boss', 0, 100)); // 遠景奥
}

function spawnPlant(zPos) {
    const side = Math.random() > 0.5 ? 1 : -1;
    // AAAのテクニック。道路（幅約1200）に絶対被らないように配置する
    const xOffset = side * (800 + Math.random() * 3000); 
    const r = Math.random();
    let type = 'ground';
    if (r > 0.7) type = 'tall';
    else if (r > 0.4) type = 'short';
    
    sprites.push(new Sprite(type, xOffset, zPos));
}

// 複合サイン波による「予測不能なロングカーブ」の生成
function getCurrentCurve() {
    // 複数の波を合成して、右へ左へ大きくうねるコースを作る
    return Math.sin(travelDist * 0.003) * 1.5 + Math.cos(travelDist * 0.0015) * 1.0;
}

function loop() {
    animTime++;
    travelDist += SCROLL_SPEED;
    const currentCurve = getCurrentCurve();
    cameraYaw += currentCurve * 0.5;

    ctx.fillStyle = '#050a05'; // ジャングルの奥の暗闇
    ctx.fillRect(0, 0, W, H);

    // 1. パララックス背景の描画（back01.pngを鏡合わせでループ）
    if (backImg.complete && backImg.width > 0) {
        // 画像の高さを画面半分(hH)に合わせ、アスペクト比を維持した幅を算出
        const bgScale = hH / backImg.height;
        const bgW = backImg.width * bgScale;
        
        // 鏡合わせを含めた全体の幅は bgW * 2
        // cameraYaw から bgPan を 0〜bgW*2 の範囲で計算
        let bgPan = cameraYaw % (bgW * 2);
        if (bgPan < 0) bgPan += (bgW * 2);

        // 1枚目（正方向）を描画
        let drawX1 = -bgPan;
        ctx.drawImage(backImg, 0, 0, backImg.width, backImg.height, drawX1, 0, bgW, hH + 2);

        // 2枚目（鏡合わせ）を描画。1枚目の右に繋げる
        let drawX2 = bgW - bgPan;
        ctx.save();
        ctx.translate(drawX2 + bgW, 0); // 反転ピボットを右端に
        ctx.scale(-1, 1);
        ctx.drawImage(backImg, 0, 0, backImg.width, backImg.height, 0, 0, bgW, hH + 2);
        ctx.restore();
        
        // 3枚目（正方向）を描画。画面がカバーしきれない場合の補完
        let drawX3 = bgW * 2 - bgPan;
        if (drawX3 < W) {
            ctx.drawImage(backImg, 0, 0, backImg.width, backImg.height, drawX3, 0, bgW, hH + 2);
        }
    }

    // 2. 地面と道路の描画（隙間・かすれを完璧に修正）
    for (let i = RENDER_DISTANCE; i > 1; i--) {
        // 3D投影計算
        const projScale = CAMERA_DEPTH / i;
        const y = hH + (CAMERA_HEIGHT * projScale);
        
        // 【重要修正】次のラインのY座標を計算し、隙間（描画高）を埋める
        const nextProjScale = CAMERA_DEPTH / (i - 1);
        const nextY = hH + (CAMERA_HEIGHT * nextProjScale);
        const drawH = Math.ceil(nextY - y) + 1; // +1ピクセル余分に描いて隙間を撲滅

        // 画面外（下部）ならスキップ
        if (y > H) continue;

        // カーブによるX軸のオフセット（物理の等加速度運動の公式 x = 1/2*a*t^2 を応用）
        const curveOffsetX = 0.5 * currentCurve * i * i * projScale;
        const x = hW + curveOffsetX;

        const roadWidth = 1200 * projScale;

        // 地表のストライプ描画。速度を感じさせるためにシマシマに
        ctx.fillStyle = (i + Math.floor(travelDist)) % 6 < 3 ? '#101a0e' : '#080d07';
        ctx.fillRect(0, y, W, drawH); 

        // 道路レイヤー
        if (roadImg.complete && roadImg.width > 0) {
            // テクスチャのY座標（手前に流れる計算）
            let texY = ((i * 10 + travelDist * 50) % roadImg.height);
            if (texY < 0) texY += roadImg.height;
            // 高さ(drawH)分をしっかり引き伸ばして描画
            ctx.drawImage(roadImg, 0, texY, roadImg.width, 2, x - roadWidth/2, y, roadWidth, drawH);
        }
    }

    // 3. スプライト更新とZソート（Painter's Algorithm: 奥から手前）
    sprites.forEach(s => {
        // ボス以外のオブジェクトはプレイヤーに向かってくる
        if (s.type !== 'boss') {
            s.z += SCROLL_SPEED;
            if (s.z > RENDER_DISTANCE) { // カメラを過ぎたら奥に再配置
                s.z = 1;
                s.xOffset = side * (800 + Math.random() * 3000); 
            }
        } else {
            // 【重要修正: 無理のない迫力演出】
            // Z=45(真ん中)を中心に、Z=20(迫力) 〜 Z=70(無理のない豆粒) を往復させる
            s.xOffset = Math.sin(animTime * 0.03) * 100; // カーブ内での横揺れ
            s.z = 45 + Math.sin(animTime * 0.02) * 25; 
        }
    });

    // Z値が大きい（奥にある）順にソート
    sprites.sort((a, b) => b.z - a.z);

    // ティラノのアニメーション計算
    const TOTAL_FRAMES = 12;
    const FRAME_W = 512;
    const FRAME_H = 512;
    const SPRITE_COL = 4;
    // プレイヤーの速度(SCROLL_SPEED)に同期させる。重みを持たせる。
    const bossFrame = Math.floor(animTime * 0.4 * SCROLL_SPEED) % TOTAL_FRAMES;

    // 4. スプライト描画
    sprites.forEach(s => {
        const projScale = CAMERA_DEPTH / s.z;
        const y = hH + (CAMERA_HEIGHT * projScale);
        const curveOffsetX = 0.5 * currentCurve * s.z * s.z * projScale;
        const x = hW + (s.xOffset * projScale) + curveOffsetX;

        const drawW = s.w * projScale * s.scaleBase;
        const drawH = s.h * projScale * s.scaleBase;

        s.screenX = x;
        s.screenY = y - drawH / 2; 

        if (s.type === 'boss') {
            if (tyranoImg.complete && tyranoImg.width > 0) {
                // スプライトシートからの切り出し（UV）座標
                const sx = (bossFrame % SPRITE_COL) * FRAME_W;
                const sy = Math.floor(bossFrame / SPRITE_COL) * FRAME_H;

                ctx.drawImage(
                    tyranoImg, 
                    sx, sy, FRAME_W, FRAME_H, // 切り出し
                    x - drawW/2, y - drawH, drawW, drawH // 描画
                );
            }
        } else {
            // 植物の描画
            if (plantImg.complete && plantImg.width > 0) {
                ctx.drawImage(
                    plantImg, 
                    s.def.x, s.def.y, s.def.w, s.def.h, 
                    x - drawW / 2, y - drawH, drawW, drawH 
                );
            }
        }
    });

    // 5. ヒット判定とUI
    if (touch.down) {
        const bossObj = sprites.find(s => s.type === 'boss');
        if (bossObj) {
            const dist = Math.hypot(touch.x - bossObj.screenX, touch.y - bossObj.screenY);
            if (dist < bossObj.w * (CAMERA_DEPTH/bossObj.z) * bossObj.scaleBase * 0.5) {
                effects.push(new HitEffect(touch.x, touch.y));
            }
        }
    }
    
    effects = effects.filter(e => e.life > 0);
    effects.forEach(e => e.draw());

    // 照準とプレイヤー機。UIレイヤーは一番最後に描画。
    ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(touch.x, touch.y, 25, 0, Math.PI*2);
    ctx.moveTo(touch.x - 40, touch.y); ctx.lineTo(touch.x - 10, touch.y);
    ctx.moveTo(touch.x + 10, touch.y); ctx.lineTo(touch.x + 40, touch.y);
    ctx.moveTo(touch.x, touch.y - 40); ctx.lineTo(touch.x, touch.y - 10);
    ctx.moveTo(touch.x, touch.y + 10); ctx.lineTo(touch.x, touch.y + 40);
    ctx.stroke();

    ctx.font = '80px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('🚙', hW, H - 20); 

    requestAnimationFrame(loop);
}

// --- 入力制御 ---
const handleInput = (e) => {
    const t = e.touches ? e.touches[0] : e;
    touch.x = t.clientX; touch.y = t.clientY;
    if (e.type === 'mousedown' || e.type === 'touchstart') touch.down = true;
    if (e.type === 'mouseup' || e.type === 'touchend') touch.down = false;
};
window.addEventListener('mousemove', handleInput);
window.addEventListener('mousedown', handleInput);
window.addEventListener('mouseup', handleInput);
window.addEventListener('touchstart', handleInput, {passive: false});
window.addEventListener('touchend', handleInput);
window.addEventListener('touchmove', e => { e.preventDefault(); handleInput(e); }, {passive: false});
window.addEventListener('resize', resize);

init();
loop();

</script>
</body>
</html>
