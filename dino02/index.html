<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO-SHOOT: COMPLETE EDITION v6.8</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0a140a; overflow: hidden; touch-action: none; font-family: 'Arial', sans-serif; }
        canvas { display: block; margin: 0 auto; background-color: #000; }
        #ui-layer { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; text-align: left; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
/**
 * DINO-SHOOT 2D - V6.8 Complete Edition
 * 開発: 先生 & Gemini (AAA Graphics Integration)
 */
const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
let W, H;

// --- エンジン定数 ---
let gameState = 'TITLE'; // 'TITLE', 'PLAYING', 'GAMEOVER', 'CLEAR'
let frame = 0, score = 0, bgY = 0; 
const SCROLL_SPEED = 2.5;

// 入力状態
const input = { x: 0, y: 0, isTouching: false };

// エンティティリスト
let player;
let bullets = [];
let enemies = [];
let items = [];
let particles = [];

// --- 画像アセット（image_0.png, image_1.png, image_2.png とパスを合わせてください） ---
const imgs = {};
imgs['bg_jungle01'] = new Image(); imgs['bg_jungle01'].src = 'img/bg_jungle01.png'; // image_0.png
imgs['jeep01'] = new Image(); imgs['jeep01'].src = 'img/jeep02.png'; // image_1.png
imgs['Velo02'] = new Image(); imgs['Velo02'].src = 'img/velo02.png'; // image_2.png (1500x570, 4コマ)

const imgNames_old = ['velo01', 'item_p']; // 以前の仮グラフィック用
imgNames_old.forEach(name => imgs[name] = new Image());

// --- クラス定義 ---
class Player {
    constructor() {
        this.x = W / 2; this.y = H - 150;
        this.size = 25; this.power = 1; // 1:単発, 2:2連装, 3:3方向
        this.fireTimer = 0; this.hp = 5; this.invincible = 0; 
    }
    update() {
        if (input.isTouching) {
            this.x += (input.x - this.x) * 0.25;
            this.y += (input.y - 100 - this.y) * 0.25; // 指で隠れないよう上にオフセット
        }
        this.x = Math.max(30, Math.min(W - 30, this.x));
        this.y = Math.max(30, Math.min(H - 30, this.y));
        if (this.invincible > 0) this.invincible--;
        if (++this.fireTimer > 8) { this.fire(); this.fireTimer = 0; }
    }
    fire() {
        const s = -20;
        if (this.power === 1) bullets.push(new Bullet(this.x, this.y - 30, 0, s));
        else if (this.power === 2) {
            bullets.push(new Bullet(this.x - 15, this.y - 30, 0, s), new Bullet(this.x + 15, this.y - 30, 0, s));
        } else {
            bullets.push(new Bullet(this.x, this.y - 30, 0, s));
            bullets.push(new Bullet(this.x - 20, this.y - 30, -4, s), new Bullet(this.x + 20, this.y - 30, 4, s));
        }
    }
    draw() {
        if (this.invincible > 0 && frame % 4 < 2) return;
        if (imgs['jeep01'].complete && imgs['jeep01'].width > 0) {
            const img = imgs['jeep01'];
            const aspect = img.height / img.width;
            const dw = 80; ctx.drawImage(img, this.x - dw/2, this.y - (dw*aspect)/2, dw, dw * aspect);
        } else {
            ctx.fillStyle = '#4af'; ctx.fillRect(this.x - 20, this.y - 30, 40, 60);
        }
    }
}

class Bullet {
    constructor(x, y, vx, vy) { this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.size = 5; this.alive = true; }
    update() { this.x += this.vx; this.y += this.vy; if (this.y < -50 || this.y > H + 50) this.alive = false; }
    draw() { ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
}

class Enemy {
    constructor(type) {
        this.type = type; this.alive = true; this.timer = 0;
        if (type === 'small') {
            this.hp = 2; this.size = 22; this.x = Math.random() * (W - 80) + 40; this.y = -50;
            this.vy = 4 + Math.random() * 3; this.vx = (Math.random() - 0.5) * 2;
        } else if (type === 'boss') {
            this.hp = 300; this.maxHp = 300; // AAA級の耐久力
            this.size = 80; this.x = W / 2; this.y = -300; this.vy = 1;
        }
    }
    update() {
        this.timer++;
        if (this.type === 'boss') {
            if (this.y < H * 0.2) this.y += this.vy;
            this.x = W / 2 + Math.sin(this.timer * 0.03) * (W * 0.3); // 不気味な左右の動き
            // ボス攻撃：一定周期で全方位に弾をバラまく
            if (this.timer % 60 === 0) {
                for(let i=0; i<12; i++) { // 弾数を増やしてAAAの難易度に
                    const angle = (Math.PI / 6) * i;
                    bullets.push(new Bullet(this.x, this.y, Math.cos(angle) * 5, Math.sin(angle) * 5 + SCROLL_SPEED + 1));
                }
            }
        } else {
            this.x += this.vx; this.y += this.vy;
        }
        if (this.type !== 'boss' && this.y > H + 100) this.alive = false;
    }
    draw() {
        if (this.type === 'small') {
            // ザコ敵は絵文字アイコン（🦖）
            ctx.font = '45px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.save(); ctx.translate(this.x, this.y); ctx.scale(1, -1); ctx.fillText('🦖', 0, 0); ctx.restore();
        } else if (this.type === 'boss') {
            // --- 【重要】「Velo02」アニメーションの実装 ---
            if (imgs['Velo02'].complete && imgs['Velo02'].width > 0) {
                const TOTAL_FRAMES = 4; // 4分割
                const FRAME_W = 375; // 1500 / 4
                const FRAME_H = 570;
                // アニメーション速度（プレイヤーのスクロールに同期）
                const animFrame = Math.floor(frame * 0.4 * SCROLL_SPEED) % TOTAL_FRAMES;
                const sx = animFrame * FRAME_W;
                
                // ボスらしい巨大サイズを計算（アスペクト比 375:570 = 1:1.52 を維持）
                const drawW = 180; // 横幅を拡大し、長ネギ感を撲滅
                const drawH = drawW * (FRAME_H / FRAME_W); // 約274px
                
                ctx.drawImage(
                    imgs['Velo02'], 
                    sx, 0, FRAME_W, FRAME_H, // 切り出し
                    this.x - drawW/2, this.y - drawH/2, drawW, drawH // 描画
                );
            } else {
                ctx.fillStyle = '#f00'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
            // ボス体力ゲージ
            const barW = 200;
            ctx.fillStyle = '#333'; ctx.fillRect(this.x - barW/2, this.y - (300*0.5+20), barW, 10);
            ctx.fillStyle = '#f00'; ctx.fillRect(this.x - barW/2, this.y - (300*0.5+20), barW * (this.hp / this.maxHp), 10);
        }
    }
}

class Item {
    constructor(x, y) { this.x = x; this.y = y; this.size = 20; this.vy = 3; this.alive = true; }
    update() { this.y += this.vy; if (this.y > H + 50) this.alive = false; }
    draw() { ctx.fillStyle = '#0f0'; ctx.fillRect(this.x - 15, this.y - 15, 30, 30); ctx.fillStyle = '#000'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('P', this.x, this.y); }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.vx = (Math.random() - 0.5) * 15; this.vy = (Math.random() - 0.5) * 15;
        this.life = 25 + Math.random() * 15; this.color = color;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life--; }
    draw() { ctx.fillStyle = this.color; ctx.globalAlpha = this.life / 40; ctx.beginPath(); ctx.arc(this.x, this.y, this.life * 0.5, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0; }
}

// --- メインシステム ---
function resize() { W = window.innerWidth; H = window.innerHeight; canvas.width = W; canvas.height = H; if(W > 600) W = canvas.width = 600; }

function initGame() { player = new Player(); bullets = []; enemies = []; items = []; particles = []; score = 0; frame = 0; gameState = 'PLAYING'; }

function spawnParticles(x, y, color, count) { for(let i=0; i<count; i++) particles.push(new Particle(x, y, color)); }

function checkCollisions() {
    bullets.forEach(b => {
        enemies.forEach(e => {
            if (b.alive && e.alive) {
                const dist = Math.hypot(b.x - e.x, b.y - e.y);
                if (dist < b.size + e.size) {
                    b.alive = false; e.hp--; spawnParticles(b.x, b.y, '#ff0', 3); // ヒットエフェクト
                    if (e.hp <= 0) {
                        e.alive = false; score += (e.type === 'boss') ? 5000 : 100;
                        spawnParticles(e.x, e.y, '#f44', 35); // 爆発エフェクト
                        if (e.type === 'boss') setTimeout(() => { gameState = 'CLEAR'; }, 3000);
                        else if (Math.random() < 0.1) items.push(new Item(e.x, e.y));
                    }
                }
            }
        });
        // 敵の弾がプレイヤーに当たる判定
        if (b.vy > 0 && player.invincible <= 0) {
            if (Math.hypot(b.x - player.x, b.y - player.y) < player.size + b.size) {
                b.alive = false; player.hp--; player.invincible = 100; // ダメージ無敵
                spawnParticles(player.x, player.y, '#0ff', 30);
                if (player.hp <= 0) gameState = 'GAMEOVER';
            }
        }
    });
    items.forEach(i => { if (i.alive && Math.hypot(player.x - i.x, player.y - i.y) < player.size + i.size) { i.alive = false; if(player.power < 3) player.power++; score += 500; spawnParticles(player.x, player.y, '#0f0', 15); } });
    if (player.invincible <= 0) {
        enemies.forEach(e => { if (e.alive && Math.hypot(player.x - e.x, player.y - e.y) < player.size + e.size * 0.7) { player.hp--; player.invincible = 100; player.power = 1; spawnParticles(player.x, player.y, '#0ff', 30); if (player.hp <= 0) gameState = 'GAMEOVER'; } });
    }
}

function loop() {
    requestAnimationFrame(loop);
    ctx.fillStyle = '#050a05'; ctx.fillRect(0, 0, W, H);
    
    // 背景ループ (image_0.png)
    if (imgs['bg_jungle01'].complete && imgs['bg_jungle01'].width > 0) {
        const bg = imgs['bg_jungle01'];
        const bh = W * (bg.height / bg.width);
        bgY = (bgY + SCROLL_SPEED) % (bh * 2);
        for (let i = 0; i < 4; i++) {
            let y = bgY - bh*2 + i * bh;
            if (i % 2 === 0) ctx.drawImage(bg, 0, y, W, bh);
            else { ctx.save(); ctx.translate(0, y + bh); ctx.scale(1, -1); ctx.drawImage(bg, 0, 0, W, bh); ctx.restore(); }
        }
    }

    if (gameState === 'TITLE') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H); ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '48px Impact'; ctx.fillText('DINO-SHOOT', W/2, H/3); ctx.font = '20px sans-serif'; ctx.fillText('TAP TO START', W/2, H/2); if (input.isTouching) initGame(); return;
    }

    if (gameState === 'PLAYING') {
        frame++;
        if (frame < 1200 && frame % 40 === 0) enemies.push(new Enemy('small'));
        else if (frame === 1200) enemies.push(new Enemy('boss')); // 1200フレームでボス出現

        player.update(); [bullets, enemies, items, particles].forEach(arr => arr.forEach(obj => obj.update()));
        checkCollisions();
        bullets = bullets.filter(b => b.alive); enemies = enemies.filter(e => e.alive); items = items.filter(i => i.alive); particles = particles.filter(p => p.life > 0);
        items.forEach(i => i.draw()); enemies.forEach(e => e.draw()); player.draw(); bullets.forEach(b => b.draw()); particles.forEach(p => p.draw());
        ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.font = 'bold 22px sans-serif'; ctx.fillText('SCORE: ' + score, 15, 35); ctx.fillText('HP: ' + '❤️'.repeat(player.hp), 15, 65);
    } else {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H); ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '40px Impact'; ctx.fillText(gameState === 'GAMEOVER' ? 'GAME OVER' : 'CLEAR!', W/2, H/2);
        if (input.isTouching && frame > 60) initGame(); frame++;
    }
}

const handleInput = (e) => { e.preventDefault(); const t = e.touches ? e.touches[0] : e; const rect = canvas.getBoundingClientRect(); input.x = t.clientX - rect.left; input.y = t.clientY - rect.top; if (e.type === 'mousedown' || e.type === 'touchstart') input.isTouching = true; if (e.type === 'mouseup' || e.type === 'touchend') input.isTouching = false; };
['mousedown', 'mousemove', 'mouseup', 'touchstart', 'touchmove', 'touchend'].forEach(ev => window.addEventListener(ev, handleInput, {passive: false}));
window.addEventListener('resize', resize); resize(); requestAnimationFrame(loop);
</script>
</body>
</html>
