<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO-SHOOT 2D - ISOMETRIC v6.9</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0a140a; overflow: hidden; touch-action: none; font-family: 'Arial', sans-serif; }
        canvas { display: block; margin: 0 auto; background-color: #000; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
/**
 * DINO-SHOOT 2D - V6.9 Isometric Motion & Shadow Update
 * 「ななめ視点」を絵だけではなく「動き」で再現
 */
const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
let W, H;

let gameState = 'TITLE'; 
let frame = 0, score = 0;
let bgX = 0, bgY = 0; // X方向のスクロールも追加
const SCROLL_SPEED_Y = 2.5;
const SCROLL_SPEED_X = -0.8; // ななめに見せるための横流れ

const input = { x: 0, y: 0, isTouching: false };
let player, bullets = [], enemies = [], items = [], particles = [];

const imgs = {};
['bg_jungle01', 'jeep02', 'velo02'].forEach(name => {
    imgs[name] = new Image();
    imgs[name].src = `img/${name}.png`;
});

// 影を描画する共通関数（ななめ視点には不可欠）
function drawShadow(x, y, radiusW, radiusH) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    // 影を右下に少しずらすのが3/4視点のコツ
    ctx.ellipse(x + 15, y + 20, radiusW, radiusH, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

class Player {
    constructor() {
        this.x = W / 2; this.y = H - 150;
        this.hp = 5; this.power = 1;
        this.size = 25; this.fireTimer = 0; this.invincible = 0;
    }
    update() {
        if (input.isTouching) {
            this.x += (input.x - this.x) * 0.2;
            this.y += (input.y - 100 - this.y) * 0.2;
        }
        this.x = Math.max(30, Math.min(W - 30, this.x));
        this.y = Math.max(30, Math.min(H - 30, this.y));
        if (this.invincible > 0) this.invincible--;
        if (++this.fireTimer > 8) { this.fire(); this.fireTimer = 0; }
    }
    fire() {
        const s = -20;
        if (this.power === 1) bullets.push(new Bullet(this.x, this.y - 30, 0, s));
        else if (this.power === 2) {
            bullets.push(new Bullet(this.x - 15, this.y - 30, 0, s), new Bullet(this.x + 15, this.y - 30, 0, s));
        } else {
            bullets.push(new Bullet(this.x, this.y - 30, 0, s));
            bullets.push(new Bullet(this.x - 20, this.y - 30, -4, s), new Bullet(this.x + 20, this.y - 30, 4, s));
        }
    }
    draw() {
        // 影
        drawShadow(this.x, this.y + 10, 25, 12);
        
        if (this.invincible > 0 && frame % 4 < 2) return;
        if (imgs['jeep01'].complete && imgs['jeep01'].width > 0) {
            const img = imgs['jeep01'];
            const aspect = img.height / img.width;
            const dw = 90; 
            ctx.drawImage(img, this.x - dw/2, this.y - (dw*aspect)/2, dw, dw * aspect);
        }
    }
}

class Enemy {
    constructor(type) {
        this.type = type; this.alive = true; this.timer = 0;
        if (type === 'small') {
            this.hp = 2; this.size = 20;
            this.x = Math.random() * (W + 200) - 100; // 横から流れてくるため広めに
            this.y = -100;
            this.vy = 4 + Math.random() * 3;
            this.vx = SCROLL_SPEED_X; // 背景と同じ横移動をデフォルトにする
        } else {
            this.hp = 350; this.maxHp = 350; this.size = 80;
            this.x = W / 2; this.y = -300; this.vy = 1;
        }
    }
    update() {
        this.timer++;
        if (this.type === 'boss') {
            if (this.y < H * 0.25) this.y += this.vy;
            // ボスも背景のななめ移動を考慮して揺れる
            this.x = W / 2 + Math.sin(this.timer * 0.03) * (W * 0.25) + (bgX * 0.1);
            if (this.timer % 50 === 0) {
                for(let i=0; i<10; i++) {
                    const angle = (Math.PI / 5) * i;
                    bullets.push(new Bullet(this.x, this.y, Math.cos(angle) * 5, Math.sin(angle) * 5 + 2));
                }
            }
        } else {
            this.x += this.vx; this.y += this.vy;
        }
        if (this.y > H + 200) this.alive = false;
    }
    draw() {
        // 影
        drawShadow(this.x, this.y + (this.type==='boss'?150:10), this.type==='boss'?100:20, this.type==='boss'?40:10);

        if (this.type === 'small') {
            ctx.font = '45px sans-serif'; ctx.textAlign = 'center'; ctx.save();
            ctx.translate(this.x, this.y); 
            ctx.scale(1, -1); // 下を向かせる
            ctx.fillText('🦖', 0, 0); ctx.restore();
        } else {
            if (imgs['Velo02'].complete && imgs['Velo02'].width > 0) {
                const animFrame = Math.floor(frame * 0.15) % 4;
                const dw = 220, dh = 334; // 長すぎないバランス
                ctx.drawImage(imgs['Velo02'], animFrame * 375, 0, 375, 570, this.x - dw/2, this.y - dh/2, dw, dh);
            }
            // 体力ゲージ
            const barW = 250;
            ctx.fillStyle = '#333'; ctx.fillRect(this.x - barW/2, this.y - 200, barW, 12);
            ctx.fillStyle = '#f00'; ctx.fillRect(this.x - barW/2, this.y - 200, barW * (this.hp / this.maxHp), 12);
        }
    }
}

// ... (Bullet, Item, Particle 略) ...
class Bullet {
    constructor(x, y, vx, vy) { this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.size = 5; this.alive = true; }
    update() { this.x += this.vx; this.y += this.vy; if (this.y < -50 || this.y > H + 100) this.alive = false; }
    draw() { ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
}

class Item {
    constructor(x, y) { this.x = x; this.y = y; this.size = 20; this.vy = SCROLL_SPEED_Y; this.vx = SCROLL_SPEED_X; this.alive = true; }
    update() { this.x += this.vx; this.y += this.vy; if (this.y > H + 50) this.alive = false; }
    draw() { ctx.fillStyle = '#0f0'; ctx.fillRect(this.x - 15, this.y - 15, 30, 30); ctx.fillStyle = '#000'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('P', this.x, this.y); }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.vx = (Math.random() - 0.5) * 15; this.vy = (Math.random() - 0.5) * 15;
        this.life = 25 + Math.random() * 15; this.color = color;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life--; }
    draw() { ctx.fillStyle = this.color; ctx.globalAlpha = this.life / 40; ctx.beginPath(); ctx.arc(this.x, this.y, this.life * 0.5, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0; }
}

function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W; canvas.height = H;
    if(W > 600) W = canvas.width = 600; 
}

function initGame() {
    player = new Player(); bullets = []; enemies = []; items = []; particles = [];
    score = 0; frame = 0; gameState = 'PLAYING';
}

function spawnParticles(x, y, color, count) { for(let i=0; i<count; i++) particles.push(new Particle(x, y, color)); }

function checkCollisions() {
    bullets.forEach(b => {
        enemies.forEach(e => {
            if (b.alive && e.alive) {
                const dist = Math.hypot(b.x - e.x, b.y - e.y);
                if (dist < b.size + e.size) {
                    b.alive = false; e.hp--;
                    spawnParticles(b.x, b.y, '#ff0', 3);
                    if (e.hp <= 0) {
                        e.alive = false; score += (e.type === 'boss') ? 5000 : 100;
                        spawnParticles(e.x, e.y, '#f44', 35);
                        if (e.type === 'boss') setTimeout(() => { gameState = 'ENDING'; }, 3000);
                        else if (Math.random() < 0.1) items.push(new Item(e.x, e.y));
                    }
                }
            }
        });
        if (b.vy > 0 && player.invincible <= 0) {
            if (Math.hypot(b.x - player.x, b.y - player.y) < player.size + b.size) {
                b.alive = false; player.hp--; player.invincible = 100;
                spawnParticles(player.x, player.y, '#0ff', 30);
                if (player.hp <= 0) gameState = 'GAMEOVER';
            }
        }
    });
    items.forEach(i => {
        if (i.alive && Math.hypot(player.x - i.x, player.y - i.y) < player.size + i.size) {
            i.alive = false; if(player.power < 3) player.power++; score += 500;
            spawnParticles(player.x, player.y, '#0f0', 15);
        }
    });
}

function loop() {
    requestAnimationFrame(loop);
    ctx.fillStyle = '#050a05'; ctx.fillRect(0, 0, W, H);
    
    // なめらかな「ななめスクロール」
    if (imgs['bg_jungle01'].complete && imgs['bg_jungle01'].width > 0) {
        const bg = imgs['bg_jungle01'];
        const bh = W * (bg.height / bg.width);
        bgY = (bgY + SCROLL_SPEED_Y) % (bh * 2);
        bgX = (bgX + SCROLL_SPEED_X) % W; // 横にも流す
        
        for (let i = -1; i < 3; i++) {
            let y = bgY - bh + i * bh;
            // 横位置をbgXでずらして描画
            ctx.drawImage(bg, bgX, y, W, bh);
            ctx.drawImage(bg, bgX + W, y, W, bh);
            ctx.drawImage(bg, bgX - W, y, W, bh);
        }
    }

    if (gameState === 'TITLE') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '48px Impact'; ctx.fillText('DINO-SHOOT', W/2, H/3);
        ctx.font = '20px sans-serif'; ctx.fillText('TAP TO START', W/2, H/2);
        if (input.isTouching) initGame(); return;
    }

    if (gameState === 'PLAYING') {
        frame++;
        if (frame < 1200 && frame % 35 === 0) enemies.push(new Enemy('small'));
        else if (frame === 1200) enemies.push(new Enemy('boss'));

        player.update();
        [bullets, enemies, items, particles].forEach(arr => arr.forEach(obj => obj.update()));
        checkCollisions();
        bullets = bullets.filter(b => b.alive); enemies = enemies.filter(e => e.alive);
        items = items.filter(i => i.alive); particles = particles.filter(p => p.life > 0);

        items.forEach(i => i.draw()); enemies.forEach(e => e.draw());
        player.draw(); bullets.forEach(b => b.draw()); particles.forEach(p => p.draw());

        ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.font = 'bold 22px sans-serif';
        ctx.fillText('SCORE: ' + score, 15, 35);
        ctx.fillText('HP: ' + '❤️'.repeat(player.hp), 15, 65);
    } else {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '40px Impact';
        ctx.fillText(gameState === 'GAMEOVER' ? 'GAME OVER' : 'CLEAR!', W/2, H/2);
        if (input.isTouching && frame > 60) initGame();
        frame++;
    }
}

const handleInput = (e) => {
    e.preventDefault(); const t = e.touches ? e.touches[0] : e;
    const rect = canvas.getBoundingClientRect();
    input.x = t.clientX - rect.left; input.y = t.clientY - rect.top;
    if (e.type === 'mousedown' || e.type === 'touchstart') input.isTouching = true;
    if (e.type === 'mouseup' || e.type === 'touchend') input.isTouching = false;
};
['mousedown', 'mousemove', 'mouseup', 'touchstart', 'touchmove', 'touchend'].forEach(ev => window.addEventListener(ev, handleInput, {passive: false}));
window.addEventListener('resize', resize);
resize(); requestAnimationFrame(loop);
</script>
</body>
</html>
