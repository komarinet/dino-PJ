<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>きょうりゅうはっくつゲーム - 発掘一体型Ver.</title>
    <style>
        /* 基本設定 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', sans-serif;
            background-color: #f4e8d3; text-align: center; color: #333;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 10px; overscroll-behavior: none;
        }
        
        .screen {
            display: none; width: 100%; max-width: 500px;
            flex-direction: column; align-items: center; justify-content: center; flex-grow: 1;
        }
        .screen.active { display: flex; }

        .btn {
            border: none; padding: 12px 20px; font-size: 16px; border-radius: 25px;
            cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s, background-color 0.2s; margin: 5px; width: auto; min-width: 120px;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 3px rgba(0,0,0,0.2); }
        .btn-primary { background-color: #d35400; color: white; }
        .btn-secondary { background-color: #f39c12; color: white; }
        .btn-skip { background-color: #bdc3c7; color: #333; padding: 8px 15px; font-size: 14px; position: absolute; top: 10px; right: 10px; }

        /* タイトル画面 */
        #title-logo {
            width: 100%; max-width: 350px; height: auto; border-radius: 15px;
            margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); background-color: #ccc;
        }
        h1 { color: #d35400; font-size: 24px; margin-bottom: 20px; line-height: 1.5; }

        /* チュートリアル */
        #tutorial-text-box {
            background-color: #fff; border: 3px solid #d35400; border-radius: 10px;
            padding: 15px; margin-bottom: 20px; width: 90%; font-size: 16px; font-weight: bold;
            line-height: 1.8; min-height: 100px; display: flex; align-items: center; justify-content: center;
        }
        #tut-board {
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 5px;
            width: 180px; height: 180px; background-color: #8d6e63; padding: 5px;
            border-radius: 10px; margin-bottom: 20px;
        }

        /* ゲーム本編 ヘッダー・コントロール */
        header { width: 100%; margin-bottom: 10px; flex-shrink: 0; }
        h2#stage-name { color: #d35400; font-size: 22px; margin: 5px 0; background: #fff; display: inline-block; padding: 5px 20px; border-radius: 20px; border: 2px solid #d35400; }
        p#message { font-size: 14px; font-weight: bold; line-height: 1.6; margin-bottom: 5px; height: 45px;}
        
        #controls { 
            display: flex; gap: 15px; margin-bottom: 15px; width: 100%; 
            justify-content: center; align-items: center; 
        }
        #progress-text { font-size: 16px; font-weight: bold; color: #8d6e63; }

        .game-main { display: flex; flex-direction: column; align-items: center; flex-grow: 1; width: 100%; }
        
        /* 発掘ゲーム盤（背景画像と重ねるラッパー） */
        .board-wrapper {
            position: relative;
            width: 100%; max-width: 400px; aspect-ratio: 1 / 1;
            background-color: #4e342e; /* 隙間が見えても土っぽく見える暗い茶色 */
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            overflow: hidden; /* 角丸からはみ出ないように */
        }
        
        /* 1層目: 化石の背景画像 */
        #bg-fossil {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; z-index: 1; padding: 10px; box-sizing: border-box;
        }

        /* 2層目: マインスイーパーのマス目 */
        #game-board { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: grid; 
            grid-template-columns: repeat(var(--cols, 6), 1fr); 
            grid-template-rows: repeat(var(--rows, 6), 1fr); 
            gap: 2px; padding: 4px; box-sizing: border-box;
            z-index: 2; 
            transition: opacity 1s ease; /* クリア時にフワッと消える用 */
        }

        /* 3層目: 本体画像（クリアするまで透明） */
        #overlay-body {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; z-index: 3; padding: 10px; box-sizing: border-box;
            opacity: 0; transition: opacity 1.5s ease; pointer-events: none;
        }

        /* マスのデザイン */
        .cell {
            background-color: #d7ccc8; border: 2px solid #a1887f; border-radius: 4px;
            font-size: calc(240px / var(--cols, 6)); 
            font-weight: bold; display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; 
            aspect-ratio: 1 / 1; overflow: hidden;
            transition: background-color 0.2s;
        }
        @media (min-width: 500px) { .cell { font-size: calc(300px / var(--cols, 6)); } }
        
        /* 掘った後のマス（半透明になって化石が透ける） */
        .cell.revealed { 
            background-color: rgba(255, 255, 255, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: default;
            /* 数字を読みやすくするための強い白フチと影 */
            text-shadow:
                -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff,
                0px 2px 4px rgba(0,0,0,0.8);
        }
        
        .cell.cracked { background-color: #ffccbc; border: 2px dashed #e64a19; }
        .cell.cracked span { opacity: 0.6; font-size: 80%; }
        
        .cell.magma-revealed {
            background-color: rgba(255, 205, 210, 0.9); border: 2px solid #e53935;
        }

        .magma { font-size: 100%; line-height: 1; }
        
        /* 動画コンテナ */
        #video-container {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; z-index: 100; flex-direction: column; justify-content: center; align-items: center;
        }
        video { width: 100%; height: auto; max-height: 85vh; object-fit: contain; }
        #close-video-btn { margin-top: 20px; }
        
        ruby rt { font-size: 10px; color: #555; }
    </style>
</head>
<body>

    <div id="screen-title" class="screen active">
        <img id="title-logo" src="img/title.png" alt="タイトル画像" onerror="this.style.display='none'">
        <h1>きょうりゅう<br><ruby>発掘<rt>はっくつ</rt></ruby>ゲーム</h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-secondary" onclick="startTutorial()">あそびかた</button>
            <button class="btn btn-primary" onclick="startGame(0)">すぐにあそぶ</button>
        </div>
    </div>

    <div id="screen-tutorial" class="screen">
        <button class="btn btn-skip" onclick="startGame(0)">スキップ ➡</button>
        <div id="tutorial-text-box"><span id="tut-text"></span></div>
        <div id="tut-board">
            <div class="cell" id="tut-cell-0"></div><div class="cell" id="tut-cell-1"></div><div class="cell" id="tut-cell-2"></div>
            <div class="cell" id="tut-cell-3"></div><div class="cell" id="tut-cell-4"></div><div class="cell" id="tut-cell-5"></div>
            <div class="cell" id="tut-cell-6"></div><div class="cell" id="tut-cell-7"></div><div class="cell" id="tut-cell-8"></div>
        </div>
        <button id="tut-next-btn" class="btn btn-primary" onclick="nextTutorial()">つぎへ</button>
    </div>

    <div id="screen-game" class="screen">
        <div id="game-layout">
            <div class="game-main">
                <header>
                    <h2 id="stage-name">ステージ 1</h2>
                    <p id="message"><ruby>数字<rt>すうじ</rt></ruby>をヒントに <ruby>安全<rt>あんぜん</rt></ruby>な<ruby>土<rt>つち</rt></ruby>を ほろう！</p>
                </header>
                
                <div id="controls">
                    <button id="reset-btn" class="btn btn-primary" onclick="initGame()">やりなおす</button>
                    <span id="progress-text"><ruby>発掘<rt>はっくつ</rt></ruby>: 0%</span>
                </div>

                <div class="board-wrapper">
                    <img id="bg-fossil" src="" alt="化石の背景">
                    <div id="game-board"></div>
                    <img id="overlay-body" src="" alt="復活した恐竜">
                </div>
            </div>
        </div>
    </div>

    <div id="video-container">
        <video id="win-video" playsinline></video>
        <button id="close-video-btn" class="btn btn-primary" onclick="closeVideo()">つぎのステージへ！</button>
    </div>

    <script>
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // --- チュートリアル ---
        let tutStep = 0;
        const tutTextElement = document.getElementById('tut-text');
        
        const tutorialSteps = [
            { text: "<ruby>土<rt>つち</rt></ruby>の 下(した)には <ruby>危険<rt>きけん</rt></ruby>なマグマが<br>かくれている ことがあるよ！", action: () => { resetTutBoard(); } },
            { text: "まずは まん中の <ruby>土<rt>つち</rt></ruby>を<br>ほってみよう！", action: () => { let c = document.getElementById('tut-cell-4'); c.classList.add('revealed'); c.style.color = '#0000FF'; c.textContent = '1'; } },
            { text: "『１』が でたね！まわりの どこか<br>１つだけに マグマが あるよ。", action: () => { for(let i=0; i<9; i++) { if(i !== 4) document.getElementById('tut-cell-'+i).style.borderColor = '#e74c3c'; } } },
            { text: "あ！マグマを ほってしまった！<br>でも１回目(かいめ)なら セーフ！", action: () => { for(let i=0; i<9; i++) { document.getElementById('tut-cell-'+i).style.borderColor = '#a1887f'; } let bomb = document.getElementById('tut-cell-0'); bomb.classList.add('cracked'); bomb.innerHTML = '<span>🌋</span>'; } },
            { text: "ヒビが 入ったところを もう１度<br>ほると バクハツしちゃうよ！<br>よけて ほかの<ruby>土<rt>つち</rt></ruby>を ほろう！", action: () => { [1,2,3,5,6,7,8].forEach(i => { let c = document.getElementById('tut-cell-'+i); c.classList.add('revealed'); }); document.getElementById('tut-next-btn').textContent = "あそぶ！"; } }
        ];

        function startTutorial() { showScreen('screen-tutorial'); tutStep = 0; document.getElementById('tut-next-btn').textContent = "つぎへ"; playTutStep(tutStep); }
        function playTutStep(step) { tutTextElement.innerHTML = tutorialSteps[step].text; tutorialSteps[step].action(); }
        function nextTutorial() { tutStep++; if (tutStep >= tutorialSteps.length) { startGame(0); } else { playTutStep(tutStep); } }
        function resetTutBoard() { for(let i=0; i<9; i++) { let c = document.getElementById('tut-cell-'+i); c.className = 'cell'; c.innerHTML = ''; c.style.borderColor = '#a1887f'; c.style.backgroundColor = '#d7ccc8'; } }

        // --- ゲーム本編：ステージ管理 ---
        const stages = [
            {
                rows: 6, cols: 6, mines: 6,
                bodyImg: "img/mosa02.png",
                fossilImg: "img/mosa_born02.png",
                videoSrc: "img/mosa.mp4"
            },
            {
                rows: 8, cols: 8, mines: 12,
                bodyImg: "img/tyrano02.png",
                fossilImg: "img/tyrano_born02.png",
                videoSrc: "img/tyrano01.mp4"
            }
        ];

        let currentStageIndex = 0;
        let board = [];
        let revealedCount = 0;
        let gameOver = false;
        let isFirstClick = true;

        const boardElement = document.getElementById('game-board');
        const progressText = document.getElementById('progress-text');
        const videoContainer = document.getElementById('video-container');
        const winVideo = document.getElementById('win-video');
        const messageElement = document.getElementById('message');
        const stageNameElement = document.getElementById('stage-name');
        
        const bgFossilImg = document.getElementById('bg-fossil');
        const overlayBodyImg = document.getElementById('overlay-body');
        const closeVideoBtn = document.getElementById('close-video-btn');

        function startGame(stageIndex) {
            currentStageIndex = stageIndex;
            showScreen('screen-game');
            initGame();
        }

        function initGame() {
            const stage = stages[currentStageIndex];

            board = []; revealedCount = 0; gameOver = false; isFirstClick = true;
            
            // 状態リセット
            videoContainer.style.display = 'none'; 
            winVideo.pause(); winVideo.currentTime = 0;
            boardElement.style.opacity = '1';       // グリッドを表示
            overlayBodyImg.style.opacity = '0';     // 肉付け画像を隠す
            
            stageNameElement.textContent = `ステージ ${currentStageIndex + 1}`;
            bgFossilImg.src = stage.fossilImg;
            overlayBodyImg.src = stage.bodyImg;
            winVideo.src = stage.videoSrc;
            winVideo.load();

            if (currentStageIndex === stages.length - 1) {
                closeVideoBtn.textContent = "タイトルにもどる";
            } else {
                closeVideoBtn.textContent = "つぎのステージへ！";
            }

            messageElement.innerHTML = "<ruby>数字<rt>すうじ</rt></ruby>をヒントに <ruby>安全<rt>あんぜん</rt></ruby>な<ruby>土<rt>つち</rt></ruby>を ほろう！<br>ヒビが入ったら もうさわらないでね！";
            updateProgressText(stage);
            
            boardElement.style.setProperty('--cols', stage.cols);
            boardElement.style.setProperty('--rows', stage.rows);
            boardElement.style.gridTemplateColumns = `repeat(${stage.cols}, 1fr)`;
            boardElement.style.gridTemplateRows = `repeat(${stage.rows}, 1fr)`;
            boardElement.innerHTML = '';

            for (let r = 0; r < stage.rows; r++) {
                let row = [];
                for (let c = 0; c < stage.cols; c++) { row.push({ isMine: false, revealed: false, cracked: false, neighborMines: 0 }); }
                board.push(row);
            }
            
            for (let r = 0; r < stage.rows; r++) {
                for (let c = 0; c < stage.cols; c++) {
                    let cellDiv = document.createElement('div'); cellDiv.classList.add('cell');
                    cellDiv.dataset.r = r; cellDiv.dataset.c = c;
                    cellDiv.addEventListener('click', () => handleCellClick(r, c, stage));
                    boardElement.appendChild(cellDiv);
                }
            }
        }

        function generateMines(firstR, firstC, stage) {
            let placedMines = 0;
            while (placedMines < stage.mines) {
                let r = Math.floor(Math.random() * stage.rows); let c = Math.floor(Math.random() * stage.cols);
                if (!board[r][c].isMine && !(r === firstR && c === firstC)) {
                    board[r][c].isMine = true; placedMines++;
                }
            }
            for (let r = 0; r < stage.rows; r++) {
                for (let c = 0; c < stage.cols; c++) {
                    if (!board[r][c].isMine) {
                        let count = 0;
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                let nr = r + dr; let nc = c + dc;
                                if (nr >= 0 && nr < stage.rows && nc >= 0 && nc < stage.cols && board[nr][nc].isMine) { count++; }
                            }
                        }
                        board[r][c].neighborMines = count;
                    }
                }
            }
        }

        function handleCellClick(r, c, stage) {
            let cellData = board[r][c];
            if (gameOver || cellData.revealed) return;

            if (isFirstClick) {
                generateMines(r, c, stage);
                isFirstClick = false;
            }

            let cellDiv = boardElement.children[r * stage.cols + c];

            if (cellData.isMine) {
                if (!cellData.cracked) {
                    cellData.cracked = true;
                    cellDiv.classList.add('cracked');
                    cellDiv.innerHTML = '<span>🌋</span>';
                    messageElement.innerHTML = "<span style='color:#d35400;'>あつッ！マグマが かくれているぞ！<br>もう１回 さわると バクハツだよ！</span>";
                    return; 
                } else {
                    gameOver = true;
                    cellData.revealed = true;
                    cellDiv.classList.remove('cracked');
                    cellDiv.classList.add('magma-revealed');
                    cellDiv.innerHTML = '<span class="magma">🌋</span>';
                    messageElement.innerHTML = "<span style='color:red;'>ドッカーン！もえちゃった！<br>「やりなおす」をおしてね。</span>";
                    progressText.innerHTML = "<span style='color:red;'>しっぱい...</span>";
                    revealAllMines(stage);
                }
            } else {
                cellData.revealed = true;
                revealedCount++;
                cellDiv.classList.add('revealed');
                updateProgressText(stage);

                if (cellData.neighborMines > 0) {
                    const colors = ["", "#1565C0", "#2E7D32", "#c62828", "#6A1B9A", "#8e0000", "#00838F", "#212121", "#616161"];
                    cellDiv.style.color = colors[cellData.neighborMines];
                    cellDiv.textContent = cellData.neighborMines;
                    messageElement.innerHTML = "<ruby>数字<rt>すうじ</rt></ruby>をヒントに <ruby>安全<rt>あんぜん</rt></ruby>な<ruby>土<rt>つち</rt></ruby>を ほろう！";
                } else {
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            let nr = r + dr; let nc = c + dc;
                            if (nr >= 0 && nr < stage.rows && nc >= 0 && nc < stage.cols) {
                                handleCellClick(nr, nc, stage);
                            }
                        }
                    }
                }
                checkWin(stage);
            }
        }

        function revealAllMines(stage) {
            for (let r = 0; r < stage.rows; r++) {
                for (let c = 0; c < stage.cols; c++) {
                    if (board[r][c].isMine) {
                        let cellDiv = boardElement.children[r * stage.cols + c];
                        cellDiv.classList.remove('cracked');
                        if (!cellDiv.classList.contains('revealed') && !cellDiv.classList.contains('magma-revealed')) {
                            cellDiv.classList.add('magma-revealed');
                            cellDiv.innerHTML = '<span class="magma">🌋</span>';
                        }
                    }
                }
            }
        }

        function updateProgressText(stage) {
            if(gameOver) return;
            const targetSafeCells = (stage.rows * stage.cols) - stage.mines;
            let progress = revealedCount / targetSafeCells;
            let percent = Math.floor(progress * 100);
            progressText.innerHTML = `<ruby>発掘<rt>はっくつ</rt></ruby>: ${percent}%`;
        }

        function checkWin(stage) {
            const targetSafeCells = (stage.rows * stage.cols) - stage.mines;
            if (revealedCount === targetSafeCells) {
                gameOver = true;
                messageElement.innerHTML = "<span style='color:#d35400; font-size:20px;'><ruby>発掘<rt>はっくつ</rt></ruby>コンプリート！！</span>";
                progressText.innerHTML = "<span style='color:#d35400;'>100% コンプリート！</span>";

                // 演出1: グリッド（マス目）を透明にして、化石を完全に見せる
                boardElement.style.opacity = '0';

                // 演出2: 1秒後に本体画像をフワッと重ねる
                setTimeout(() => {
                    overlayBodyImg.style.opacity = '1';

                    // 演出3: 本体画像が現れた後（さらに2.5秒後）、動画を再生
                    setTimeout(() => {
                        videoContainer.style.display = 'flex';
                        winVideo.muted = true;
                        winVideo.play().then(() => winVideo.muted = false).catch(e => { winVideo.muted = false; winVideo.controls = true; });
                    }, 2500);

                }, 1000);
            }
        }

        function closeVideo() {
            winVideo.pause(); 
            winVideo.muted = false; 
            videoContainer.style.display = 'none'; 
            
            if (currentStageIndex < stages.length - 1) {
                startGame(currentStageIndex + 1);
            } else {
                alert("すごい！ぜんぶの きょうりゅうを 復活（ふっかつ）させたよ！");
                showScreen('screen-title');
            }
        }
    </script>
</body>
</html>
