<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO-SHOOT 2D - PERFECT ENGINE</title>
    <style>
        body { margin: 0; padding: 0; background-color: #111; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; background-color: #000; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
/**
 * DINO-SHOOT 2D - V6.5 Perfect Refine
 * アスペクト比維持、完全シームレス背景、ボス専用アニメーション
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;

// --- ゲーム状態 ---
let gameState = 'TITLE'; 
let frame = 0;
let score = 0;
let bgY = 0; 
const SCROLL_SPEED = 2; // 背景の流れるスピード

// 入力
const input = { x: 0, y: 0, isTouching: false };

// エンティティ
let player;
let bullets = [];
let enemies = [];
let items = [];
let particles = [];

// --- 画像アセット ---
const imgs = {};
imgs['bg_jungle01'] = new Image(); imgs['bg_jungle01'].src = 'img/bg_jungle01.png'; 
imgs['jeep01'] = new Image(); imgs['jeep01'].src = 'img/jeep01.png'; 
imgs['velo01'] = new Image(); imgs['velo01'].src = 'img/velo01.png'; 

// --- クラス定義 ---
class Player {
    constructor() {
        this.x = W / 2;
        this.y = H - 150;
        this.size = 20; // 当たり判定の大きさ
        this.power = 1; 
        this.fireTimer = 0;
        this.hp = 3;
        this.invincible = 0; 
    }
    update() {
        if (input.isTouching) {
            this.x += (input.x - this.x) * 0.2;
            this.y += (input.y - 80 - this.y) * 0.2; // 指で隠れないよう上にオフセット
        }
        
        // 画面外制限
        this.x = Math.max(30, Math.min(W - 30, this.x));
        this.y = Math.max(30, Math.min(H - 30, this.y));

        if (this.invincible > 0) this.invincible--;

        // オート連射
        this.fireTimer++;
        if (this.fireTimer > 8) { 
            this.fire();
            this.fireTimer = 0;
        }
    }
    fire() {
        const speed = -18;
        if (this.power === 1) {
            bullets.push(new Bullet(this.x, this.y - 20, 0, speed));
        } else if (this.power === 2) {
            bullets.push(new Bullet(this.x - 15, this.y - 20, 0, speed));
            bullets.push(new Bullet(this.x + 15, this.y - 20, 0, speed));
        } else {
            bullets.push(new Bullet(this.x, this.y - 20, 0, speed));
            bullets.push(new Bullet(this.x - 15, this.y - 20, -3, speed * 0.9));
            bullets.push(new Bullet(this.x + 15, this.y - 20, 3, speed * 0.9)); 
        }
    }
    draw() {
        if (this.invincible > 0 && frame % 4 < 2) return; 
        
        if (imgs['jeep01'].complete && imgs['jeep01'].width > 0) {
            const img = imgs['jeep01'];
            // 【修正】画像の本来の縦横比を計算して絶対に潰さない
            const aspect = img.height / img.width;
            const drawW = 70; // 横幅を固定
            const drawH = drawW * aspect; // 縦幅を自動計算
            
            ctx.drawImage(img, this.x - drawW/2, this.y - drawH/2, drawW, drawH);
        } else {
            ctx.fillStyle = '#4af';
            ctx.fillRect(this.x - 20, this.y - 30, 40, 60);
        }
    }
}

class Bullet {
    constructor(x, y, vx, vy) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.size = 6;
        this.alive = true;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        if (this.y < -50 || this.y > H + 50 || this.x < -50 || this.x > W + 50) this.alive = false;
    }
    draw() {
        ctx.fillStyle = '#ff0';
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
    }
}

class Enemy {
    constructor(type) {
        this.type = type; 
        this.alive = true;
        this.timer = 0;

        if (type === 'small') {
            this.hp = 2;
            this.size = 20; // 当たり判定
            this.x = Math.random() * (W - 80) + 40;
            this.y = -50;
            this.vy = 4 + Math.random() * 3;
            this.vx = (Math.random() - 0.5) * 1.5;
        } else if (type === 'boss') {
            this.hp = 150;
            this.size = 60; // 当たり判定
            this.x = W / 2;
            this.y = -300; // 巨大なのでかなり上からスタート
            this.vy = 1.5;
            this.vx = 0;
        }
    }
    update() {
        this.timer++;
        
        if (this.type === 'boss') {
            // ボスは画面の上の方で停止し、左右に不気味に揺れる
            if (this.y < H * 0.25) this.y += this.vy;
            this.x = W / 2 + Math.sin(this.timer * 0.03) * (W * 0.25);
        } else {
            this.x += this.vx;
            this.y += this.vy;
        }

        // ボスは画面外でも消さない。ザコのみ消す。
        if (this.type !== 'boss' && this.y > H + 100) this.alive = false;
    }
    draw() {
        if (this.type === 'small') {
            // 【修正】ザコ敵はアイコン（絵文字）にする
            ctx.font = '40px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // 敵らしく下を向かせるために上下反転して描画
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(1, -1);
            ctx.fillText('🦖', 0, 0);
            ctx.restore();
        } else if (this.type === 'boss') {
            // 【修正】ボス専用の巨大ヴェロキラプトル描画
            if (imgs['velo01'].complete && imgs['velo01'].width > 0) {
                const TOTAL_FRAMES = 8; 
                const FRAME_W = 150;
                const FRAME_H = 600;
                const animFrame = Math.floor(frame * 0.15) % TOTAL_FRAMES;
                const sx = animFrame * FRAME_W;
                
                // ボスらしい巨大サイズを計算（アスペクト比 150:600 = 1:4 を維持）
                const drawW = 140; 
                const drawH = drawW * (FRAME_H / FRAME_W); // 約560px
                
                ctx.drawImage(
                    imgs['velo01'], 
                    sx, 0, FRAME_W, FRAME_H, 
                    this.x - drawW/2, this.y - drawH/2, drawW, drawH 
                );
            }
        }
    }
}

class Item {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.size = 15;
        this.vy = 2.5;
        this.alive = true;
    }
    update() {
        this.y += this.vy;
        if (this.y > H + 50) this.alive = false;
    }
    draw() {
        ctx.fillStyle = '#0f0';
        ctx.fillRect(this.x - 15, this.y - 15, 30, 30);
        ctx.fillStyle = '#000'; ctx.font = '20px Arial'; 
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('P', this.x, this.y);
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 12;
        this.vy = (Math.random() - 0.5) * 12;
        this.life = 20 + Math.random() * 15;
        this.color = color;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.life--;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.life / 35;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.life * 0.4, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

// --- メインシステム ---
function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    // PC向け幅制限
    if(W > 600) { W = canvas.width = 600; } 
}

function initGame() {
    player = new Player();
    bullets = []; enemies = []; items = []; particles = [];
    score = 0; frame = 0;
    gameState = 'PLAYING';
}

function spawnParticles(x, y, color, count) {
    for(let i=0; i<count; i++) particles.push(new Particle(x, y, color));
}

function checkCollisions() {
    bullets.forEach(b => {
        enemies.forEach(e => {
            if (b.alive && e.alive) {
                const dist = Math.hypot(b.x - e.x, b.y - e.y);
                if (dist < b.size + e.size) {
                    b.alive = false;
                    e.hp--;
                    spawnParticles(b.x, b.y, '#ff0', 3); 
                    
                    if (e.hp <= 0) {
                        e.alive = false;
                        score += (e.type === 'boss') ? 5000 : 50;
                        spawnParticles(e.x, e.y, '#f44', 30); 
                        
                        if (e.type === 'boss') {
                            setTimeout(() => { gameState = 'ENDING'; }, 3000);
                        } else if (Math.random() < 0.08) { // ザコを倒すとたまにアイテム
                            items.push(new Item(e.x, e.y));
                        }
                    }
                }
            }
        });
    });

    items.forEach(i => {
        if (i.alive) {
            const dist = Math.hypot(player.x - i.x, player.y - i.y);
            if (dist < player.size + i.size) {
                i.alive = false;
                if(player.power < 3) player.power++; 
                score += 200;
                spawnParticles(player.x, player.y, '#0f0', 15);
            }
        }
    });

    if (player.invincible <= 0) {
        enemies.forEach(e => {
            if (e.alive) {
                const dist = Math.hypot(player.x - e.x, player.y - e.y);
                if (dist < player.size + e.size * 0.8) {
                    player.hp--;
                    player.invincible = 90; // 1.5秒無敵
                    player.power = 1; // パワーダウン
                    spawnParticles(player.x, player.y, '#0ff', 25);
                    if (player.hp <= 0) {
                        gameState = 'GAMEOVER';
                    }
                }
            }
        });
    }
}

function loop() {
    requestAnimationFrame(loop);
    
    // 【重要修正】毎フレーム必ず画面全体を黒で塗りつぶす（残像バグ撲滅）
    ctx.fillStyle = '#050a05'; 
    ctx.fillRect(0, 0, W, H);
    
    // --- 【重要修正】完璧な鏡合わせシームレス背景ループ ---
    if (imgs['bg_jungle01'].complete && imgs['bg_jungle01'].width > 0) {
        const bg = imgs['bg_jungle01'];
        const bgW = W;
        const bgH = W * (bg.height / bg.width); // アスペクト比を維持した高さ
        const loopH = bgH * 2; // 正方向＋鏡合わせの合計高さ
        
        bgY = (bgY + SCROLL_SPEED) % loopH;
        let startY = bgY - loopH;

        // 画面を覆い尽くすまでタイルを敷き詰める（絶対に隙間ができない）
        for (let i = 0; i < 4; i++) {
            let y = startY + i * bgH;
            if (y > H) break; 
            if (y + bgH < 0) continue;

            if (i % 2 === 0) {
                // 通常描画
                ctx.drawImage(bg, 0, y, bgW, bgH);
            } else {
                // 鏡合わせ（上下反転）描画
                ctx.save();
                ctx.translate(0, y + bgH); 
                ctx.scale(1, -1); 
                ctx.drawImage(bg, 0, 0, bgW, bgH);
                ctx.restore();
            }
        }
    } else {
        // 画像読み込み前の仮背景
        ctx.fillStyle = '#141';
        for(let i=-50; i<H; i+=100) ctx.fillRect(0, i + (bgY%100), W, 50);
    }

    // --- 状態ごとの処理 ---
    if (gameState === 'TITLE') {
        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
        ctx.font = '40px Impact, sans-serif'; ctx.fillText('DINO-SHOOT', W/2, H/3);
        ctx.font = '20px sans-serif'; ctx.fillText('TAP TO START', W/2, H/2);
        ctx.fillText('Move: Drag / Auto-Fire', W/2, H/2 + 50);
        
        if (input.isTouching) initGame();
        return;
    }

    if (gameState === 'GAMEOVER') {
        ctx.fillStyle = 'rgba(255,0,0,0.5)'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
        ctx.font = '40px Impact'; ctx.fillText('GAME OVER', W/2, H/2 - 30);
        ctx.font = '20px sans-serif'; ctx.fillText('Score: ' + score, W/2, H/2 + 20);
        ctx.fillText('TAP TO RETRY', W/2, H/2 + 80);
        
        if (input.isTouching && frame > 60) initGame(); 
        frame++;
        return;
    }

    if (gameState === 'ENDING') {
        ctx.fillStyle = 'rgba(0,100,255,0.5)'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
        ctx.font = '40px Impact'; ctx.fillText('BOSS DEFEATED!', W/2, H/2 - 30);
        ctx.font = '20px sans-serif'; ctx.fillText('Final Score: ' + score, W/2, H/2 + 20);
        ctx.fillText('THANK YOU FOR PLAYING', W/2, H/2 + 80);
        return;
    }

    // --- PLAYING 状態の更新と描画 ---
    frame++;

    // 敵の出現（約30秒間ザコ、その後ボス）
    if (frame < 1800) { 
        if (frame % 35 === 0) enemies.push(new Enemy('small')); 
    } else if (frame === 1800) { 
        enemies.push(new Enemy('boss'));
    }

    player.update();
    
    [bullets, enemies, items, particles].forEach(arr => {
        arr.forEach(obj => obj.update());
    });

    checkCollisions();

    bullets = bullets.filter(b => b.alive);
    enemies = enemies.filter(e => e.alive);
    items = items.filter(i => i.alive);
    particles = particles.filter(p => p.life > 0);

    // 描画
    items.forEach(i => i.draw());
    enemies.forEach(e => e.draw());
    player.draw();
    bullets.forEach(b => b.draw());
    particles.forEach(p => p.draw());

    // UI描画
    ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.font = 'bold 22px sans-serif';
    ctx.fillText('SCORE: ' + score, 15, 35);
    ctx.fillText('HP: ' + '❤️'.repeat(player.hp), 15, 65);
}

// --- 入力イベント ---
const handleInput = (e) => {
    e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    const rect = canvas.getBoundingClientRect();
    input.x = t.clientX - rect.left;
    input.y = t.clientY - rect.top;
    if (e.type === 'mousedown' || e.type === 'touchstart') input.isTouching = true;
    if (e.type === 'mouseup' || e.type === 'touchend') input.isTouching = false;
};
window.addEventListener('mousedown', handleInput);
window.addEventListener('mousemove', handleInput);
window.addEventListener('mouseup', handleInput);
window.addEventListener('touchstart', handleInput, {passive: false});
window.addEventListener('touchmove', handleInput, {passive: false});
window.addEventListener('touchend', handleInput);
window.addEventListener('resize', resize);

// 起動
resize();
requestAnimationFrame(loop);

</script>
</body>
</html>
