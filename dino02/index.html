<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO-CHASE DX</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100dvh; image-rendering: pixelated; }
        #ui { position: absolute; top: 10px; left: 10px; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; z-index: 20; }
        ruby rt { font-size: 0.6em; color: #ccc; }
    </style>
</head>
<body>
    <div id="ui">
        <div><ruby>得点<rt>とくてん</rt></ruby>: <span id="score">0</span></div>
        <div><ruby>体力<rt>たいりょく</rt></ruby>: <span id="hp">10</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
let W, H, VP;
const ROAD_Z_MAX = 10;
const SCROLL_SPEED = 0.08;

let score = 0, hp = 10, roadZ = 0, animFrame = 0;
let enemies = [], aim = { x: 0, y: 0 }, touch = { x: 0, y: 0 };
let clouds = [];

// --- 画像アセットの読み込み ---
const roadImg = new Image();
roadImg.src = 'img/road03.png';

const horizonImg = new Image();
horizonImg.src = 'img/horizon01.png'; // 先ほどの火山の地平線画像

const cloudFiles = ['cloud02.png', 'cloud03.png', 'cloud04.png', 'cloud05.png', 'cloud06.png'];
const cloudImgs = cloudFiles.map(file => {
    const img = new Image();
    img.src = `img/${file}`;
    return img;
});

// --- 雲クラス（3Dパース対応） ---
class Cloud {
    constructor(z = Math.random() * 10) {
        this.reset(z);
    }
    reset(z = 10) {
        this.z = z;
        // 消失点からの左右の広がり（大きいほど外側を流れる）
        this.xOffset = (Math.random() - 0.5) * 3000;
        // 地平線からの高さ（高度）
        this.yOffset = 100 + Math.random() * 300;
        // ランダムに画像を選択
        this.img = cloudImgs[Math.floor(Math.random() * cloudImgs.length)];
        // 個別のゆらぎ
        this.scaleMult = 0.5 + Math.random() * 1.5;
    }
    update() {
        // 道路より少しゆっくり動かすことで遠景らしさを出す
        this.z -= SCROLL_SPEED * 0.4;
        if (this.z <= 0.1) this.reset(10);
    }
    draw() {
        if (!this.img.complete) return;
        const scale = 1 / (this.z + 0.5);
        const x = VP.x + this.xOffset * scale;
        const y = VP.y - this.yOffset * scale; // 地平線より上に描画
        const w = this.img.width * scale * this.scaleMult;
        const h = this.img.height * scale * this.scaleMult;

        ctx.save();
        // 遠く（zが大きい）ほど薄くして空気遠近法を表現
        ctx.globalAlpha = Math.min(1, (10 - this.z) / 3);
        ctx.drawImage(this.img, x - w/2, y - h/2, w, h);
        ctx.restore();
    }
}

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    VP = { x: W / 2, y: H * 0.45 };
}

// --- 空の描画（夕暮れグラデーション） ---
function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, VP.y);
    grad.addColorStop(0, '#001a33'); // 上空：濃い紺色
    grad.addColorStop(0.6, '#4b0082'); // 中層：紫
    grad.addColorStop(1, '#ff8c00'); // 地平線付近：オレンジ
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, VP.y);

    // 地平線画像（火山）の描画
    if (horizonImg.complete) {
        const aspect = horizonImg.width / horizonImg.height;
        const hW = W;
        const hH = W / aspect;
        ctx.drawImage(horizonImg, 0, VP.y - hH, hW, hH);
    }
}

function drawRoad() {
    if (!roadImg.complete) return;
    const roadH = H - VP.y;
    const imgW = roadImg.width;
    const imgH = roadImg.height;

    for (let i = 0; i < roadH; i++) {
        const progress = i / roadH;
        const z = 1 / (progress + 0.1); 
        let sy = ((z * 2 + roadZ) % 1) * imgH;
        const drawW = W * (0.1 + progress * 2.5);
        const drawX = VP.x - drawW / 2;
        const drawY = VP.y + i;

        ctx.drawImage(roadImg, 0, sy, imgW, 1, drawX, drawY, drawW, 1.5);
    }
}

// 敵クラスなどは前回同様のため中略（動作に必要なので保持します）
class Enemy {
    constructor() {
        this.z = 10;
        this.offset = (Math.random() - 0.5) * 2;
        this.icon = Math.random() < 0.2 ? '🦖' : '🦎';
        this.alive = true;
    }
    update() {
        this.z -= SCROLL_SPEED * 1.5;
        const progress = (10 - this.z) / 10;
        const scale = 1 / (this.z * 0.2 + 0.5);
        this.x = VP.x + this.offset * W * progress * 1.5;
        this.y = VP.y + (H - VP.y) * progress;
        this.size = 30 * scale;
        const dist = Math.hypot(this.x - aim.x, this.y - aim.y);
        if (this.alive && dist < this.size * 0.7) {
            this.alive = false; score += 100; document.getElementById('score').innerText = score;
        }
        if (this.z < 0.2) {
            if (this.alive) { hp--; document.getElementById('hp').innerText = hp; }
            this.alive = false;
        }
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = Math.min(1, 1.5 - this.z / 10);
        ctx.font = `${this.size}px serif`;
        ctx.textAlign = 'center';
        ctx.fillText(this.icon, this.x, this.y);
        ctx.restore();
    }
}

function init() {
    resize();
    enemies = []; roadZ = 0; score = 0; hp = 10;
    touch.x = W/2; touch.y = H/2;
    // 雲の初期化
    clouds = [];
    for(let i=0; i<8; i++) clouds.push(new Cloud(Math.random() * 10));
}

function loop() {
    animFrame++;
    roadZ += SCROLL_SPEED * 0.5;
    
    const shakeY = Math.sin(animFrame * 0.9) * 1.5;
    ctx.setTransform(1, 0, 0, 1, 0, shakeY);

    // 描画順序：空 -> 雲 -> 道路 -> 敵 -> UI
    drawSky();

    clouds.forEach(c => { c.update(); c.draw(); });

    drawRoad();

    if (Math.random() < 0.05) enemies.push(new Enemy());
    enemies.forEach(e => { e.update(); e.draw(); });
    enemies = enemies.filter(e => e.alive);

    aim.x += (touch.x - aim.x) * 0.2;
    aim.y += (touch.y - aim.y) * 0.2;
    ctx.strokeStyle = 'rgba(0, 255, 255, 0.5)';
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(W/2, H); ctx.lineTo(aim.x, aim.y); ctx.stroke();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.strokeRect(aim.x - 15, aim.y - 15, 30, 30);
    ctx.font = '70px serif'; ctx.textAlign = 'center';
    ctx.fillText('🚙', W/2 + (aim.x - W/2) * 0.1, H - 40);

    if (hp > 0) requestAnimationFrame(loop);
    else {
        ctx.setTransform(1,0,0,1,0,0);
        ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,W,H);
        ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.font = '30px sans-serif';
        ctx.fillText('ゲームオーバー', W/2, H/2);
    }
}

function handleInput(e) {
    const t = e.touches ? e.touches[0] : e;
    const rect = canvas.getBoundingClientRect();
    touch.x = t.clientX - rect.left;
    touch.y = t.clientY - rect.top;
}
window.addEventListener('mousemove', handleInput);
window.addEventListener('touchmove', e => { e.preventDefault(); handleInput(e); }, {passive: false});
window.addEventListener('touchstart', handleInput, {passive: false});
window.addEventListener('resize', resize);

init(); loop();
</script>
</body>
</html>
