<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO-CHASE DX: T-REX CHASE</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100dvh; image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
let W, H, VP;
const SCROLL_SPEED = 0.15; // 逃走感を出すために少し速めに設定

let roadZ = 0, animFrame = 0;
let walls = [], effects = [], boss;
let touch = { x: 0, y: 0, down: false };

// --- 画像アセット ---
const atlasImg = new Image();
atlasImg.src = 'img/jungle03.png'; 

const tyranoImg = new Image();
tyranoImg.src = 'img/tyrano02.png'; 

// jungle03のレイアウト設定
const BG_RECT = { sx: 0, sy: 0, sw: 2048, sh: 1024 }; // 上半分の背景
const WALL_WIDTH = 512; // 2048 / 4

// --- クラス定義 ---
class Wall {
    constructor(side) {
        this.z = 10;
        this.side = side;
        // 下半分(y:1024〜)からランダムに切り出し
        this.index = Math.floor(Math.random() * 4);
        this.alive = true;
    }
    update() {
        this.z -= SCROLL_SPEED;
        if (this.z < 0.1) this.alive = false;
    }
    draw() {
        const scale = 1 / (this.z + 0.5);
        const w = 800 * scale;
        const h = 1600 * scale;
        const roadW = W * (0.1 + (1 / (this.z + 0.1)) * 0.15);
        const x = (this.side === 'left') ? VP.x - roadW - w : VP.x + roadW;
        const y = VP.y + (H - VP.y) * (1 / (this.z + 1)) - h;

        ctx.save();
        ctx.globalAlpha = Math.min(1, (10 - this.z) / 3);
        ctx.drawImage(atlasImg, this.index * WALL_WIDTH, 1024, WALL_WIDTH, 1024, x, y, w, h);
        ctx.restore();
    }
}

class HitEffect {
    constructor(x, y) { this.x = x; this.y = y; this.life = 15; }
    draw() {
        this.life--;
        ctx.fillStyle = `rgba(255, ${100 + this.life * 10}, 0, ${this.life / 15})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, 30 - this.life, 0, Math.PI*2); ctx.fill();
    }
}

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    VP = { x: W / 2, y: H * 0.48 };
}

function init() {
    resize();
    roadZ = 0; animFrame = 0;
    touch.x = W/2; touch.y = H/2;
    walls = []; effects = [];
    
    // VPが決まってからボスを初期化（ここが真っ暗回避のポイントです）
    boss = {
        x: VP.x, y: VP.y, z: 10, size: 200, alive: true
    };
}

function drawBackground() {
    if (!atlasImg.complete) return;
    // 上半分の背景一枚絵を消失点に合わせて描画
    const aspect = BG_RECT.sw / BG_RECT.sh;
    const hH = H / 2;
    const hW = hH * aspect;
    ctx.drawImage(atlasImg, BG_RECT.sx, BG_RECT.sy, BG_RECT.sw, BG_RECT.sh, W/2 - hW/2, VP.y - hH, hW, hH * 2);
}

function drawBoss() {
    if (!tyranoImg.complete || !boss.alive) return;
    const scale = 1 / (boss.z + 0.5);
    const w = tyranoImg.width * scale * (W / 800);
    const h = tyranoImg.height * scale * (H / 800);
    ctx.drawImage(tyranoImg, VP.x - w/2, VP.y - h/2, w, h);
}

function drawRoad() {
    const roadH = H - VP.y;
    // カーブのうねり計算
    const curveAmp = Math.sin(animFrame * 0.03) * (W * 0.25); 

    for (let i = 0; i < roadH; i++) {
        const p = i / roadH;
        const z = 1 / (p + 0.1);
        const xOffset = Math.sin(i * 0.015) * (curveAmp * p);
        const drawX = VP.x + xOffset;

        // roadZを「減算」することで手前に迫ってくる流れに
        let sy = 512 + ((z - roadZ) % 1) * 512;
        if (sy < 512) sy += 512;

        const dw = W * (0.1 + p * 3.0);
        ctx.drawImage(atlasImg, 0, sy, 2048, 1, drawX - dw/2, VP.y + i, dw, 2);
    }
}

function loop() {
    animFrame++;
    roadZ += SCROLL_SPEED * 0.2; // 背景のスクロール速度

    // 走行振動
    ctx.setTransform(1, 0, 0, 1, 0, Math.sin(animFrame * 0.7) * 3);

    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
    drawBackground();
    drawBoss();

    if (Math.random() < 0.12) walls.push(new Wall('left'), new Wall('right'));
    walls.forEach(w => { w.update(); w.draw(); });
    walls = walls.filter(w => w.alive);

    drawRoad();

    // 当たり判定
    if (touch.down) {
        const dist = Math.hypot(touch.x - VP.x, touch.y - VP.y);
        if (dist < 150) effects.push(new HitEffect(touch.x, touch.y));
    }
    effects = effects.filter(e => e.life > 0);
    effects.forEach(e => e.draw());

    // 照準と手前のジープ
    ctx.setTransform(1,0,0,1,0,0);
    ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3;
    ctx.strokeRect(touch.x - 25, touch.y - 25, 50, 50);
    ctx.font = '90px serif'; ctx.textAlign = 'center';
    ctx.fillText('🚙', W/2, H - 40); 

    requestAnimationFrame(loop);
}

// 入力イベント
const handleInput = (e) => {
    const t = e.touches ? e.touches[0] : e;
    touch.x = t.clientX; touch.y = t.clientY;
    if (e.type === 'mousedown' || e.type === 'touchstart') touch.down = true;
    if (e.type === 'mouseup' || e.type === 'touchend') touch.down = false;
};
window.addEventListener('mousemove', handleInput);
window.addEventListener('mousedown', handleInput);
window.addEventListener('mouseup', handleInput);
window.addEventListener('touchstart', handleInput, {passive: false});
window.addEventListener('touchend', handleInput);
window.addEventListener('touchmove', e => { e.preventDefault(); handleInput(e); }, {passive: false});
window.addEventListener('resize', resize);

// 画像ロード完了後に初期化
let loaded = 0;
const onImgLoad = () => { if(++loaded === 2) { init(); loop(); } };
atlasImg.onload = onImgLoad;
tyranoImg.onload = onImgLoad;

// エラーチェック用
atlasImg.onerror = () => console.error("jungle03.pngが見つかりません");
tyranoImg.onerror = () => console.error("Tyrano02.pngが見つかりません");

</script>
</body>
</html>
