<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO-CHASE DX: T-REX ESCAPE</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100dvh; image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
let W, H, VP;
const SCROLL_SPEED = 0.12;
let roadZ = 0, animFrame = 0;
let walls = [], effects = [];
let touch = { x: 0, y: 0, down: false };

const atlasImg = new Image();
atlasImg.src = 'img/jungle02.png';

const LEFT_WALL_RECTS = [
    { sx: 0, sy: 1024, sw: 512, sh: 1024 },
    { sx: 512, sy: 1024, sw: 512, sh: 1024 }
];
const RIGHT_WALL_RECTS = [
    { sx: 1024, sy: 1024, sw: 512, sh: 1024 },
    { sx: 1536, sy: 1024, sw: 512, sh: 1024 }
];

class Wall {
    constructor(side) {
        this.z = 10;
        this.side = side;
        this.rect = (side === 'left') ? 
            LEFT_WALL_RECTS[Math.floor(Math.random() * LEFT_WALL_RECTS.length)] : 
            RIGHT_WALL_RECTS[Math.floor(Math.random() * RIGHT_WALL_RECTS.length)];
        this.alive = true;
    }
    update() {
        this.z -= SCROLL_SPEED;
        if (this.z < 0.1) this.alive = false;
    }
    draw() {
        const scale = 1 / (this.z + 0.5);
        const w = 600 * scale;
        const h = 1200 * scale;
        const roadW = W * (0.1 + (1 / (this.z + 0.1)) * 0.1); // 簡易的な道路幅計算
        const x = (this.side === 'left') ? VP.x - roadW - w : VP.x + roadW;
        const y = VP.y + (H - VP.y) * (1 / (this.z + 1)) - h;

        ctx.save();
        ctx.globalAlpha = Math.min(1, (10 - this.z) / 3);
        ctx.drawImage(atlasImg, this.rect.sx, this.rect.sy, this.rect.sw, this.rect.sh, x, y, w, h);
        ctx.restore();
    }
}

class HitEffect {
    constructor(x, y) {
        this.x = x; this.y = y; this.life = 15;
    }
    draw() {
        this.life--;
        ctx.fillStyle = `rgba(255, ${100 + this.life * 10}, 0, ${this.life / 15})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, 20 - this.life, 0, Math.PI*2); ctx.fill();
    }
}

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    VP = { x: W / 2, y: H * 0.48 };
}

function drawBackground() {
    if (!atlasImg.complete) return;
    // 天井
    ctx.drawImage(atlasImg, 0, 0, 2048, 512, 0, 0, W, VP.y);
    // 遠景（中央）
    ctx.drawImage(atlasImg, 0, 512, 2048, 512, 0, VP.y - 100, W, 200);
}

function drawRoad() {
    const roadH = H - VP.y;
    for (let i = 0; i < roadH; i++) {
        const p = i / roadH;
        const z = 1 / (p + 0.1);
        let sy = 512 + ((z + roadZ) % 1) * 512;
        const dw = W * (0.1 + p * 2.5);
        ctx.drawImage(atlasImg, 0, sy, 2048, 1, VP.x - dw/2, VP.y + i, dw, 1.5);
    }
}

function loop() {
    animFrame++;
    roadZ += SCROLL_SPEED * 0.5;
    ctx.setTransform(1, 0, 0, 1, 0, Math.sin(animFrame * 0.8) * 2); // 走行振動

    drawBackground();
    if (Math.random() < 0.15) walls.push(new Wall('left'), new Wall('right'));
    walls.forEach(w => { w.update(); w.draw(); });
    walls = walls.filter(w => w.alive);
    drawRoad();

    // ティラノの当たり判定（消失点付近）
    if (touch.down) {
        const dist = Math.hypot(touch.x - VP.x, touch.y - VP.y);
        if (dist < 100) effects.push(new HitEffect(touch.x, touch.y));
    }
    effects = effects.filter(e => e.life > 0);
    effects.forEach(e => e.draw());

    // 照準
    ctx.setTransform(1,0,0,1,0,0);
    ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
    ctx.strokeRect(touch.x - 20, touch.y - 20, 40, 40);
    ctx.font = '80px serif'; ctx.textAlign = 'center';
    ctx.fillText('🚙', W/2, H - 50); // 手前のジープ

    requestAnimationFrame(loop);
}

window.addEventListener('mousemove', e => { touch.x = e.clientX; touch.y = e.clientY; });
window.addEventListener('mousedown', () => touch.down = true);
window.addEventListener('mouseup', () => touch.down = false);
window.addEventListener('resize', resize);
atlasImg.onload = () => { resize(); loop(); };
</script>
</body>
</html>
