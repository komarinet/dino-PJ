<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>きょうりゅうはっくつゲーム</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', sans-serif;
            background-color: #f4e8d3;
            text-align: center;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            overscroll-behavior: none;
        }
        
        /* 画面切り替え用のクラス */
        .screen {
            display: none;
            width: 100%;
            max-width: 500px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }
        .screen.active {
            display: flex;
        }

        /* 共通ボタンのスタイル */
        .btn {
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s, background-color 0.2s;
            margin: 10px;
            width: 80%;
            max-width: 250px;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 3px rgba(0,0,0,0.2);
        }
        .btn-primary { background-color: #d35400; color: white; }
        .btn-secondary { background-color: #f39c12; color: white; }
        .btn-skip { background-color: #bdc3c7; color: #333; width: auto; padding: 8px 15px; font-size: 14px; position: absolute; top: 10px; right: 10px; }

        /* タイトル画面 */
        #title-logo {
            width: 100%;
            max-width: 350px;
            height: auto;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background-color: #ccc; /* 画像がない時の仮背景 */
        }
        h1 {
            color: #d35400;
            font-size: 24px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* チュートリアル画面 */
        #tutorial-text-box {
            background-color: #fff;
            border: 3px solid #d35400;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            width: 90%;
            font-size: 16px;
            font-weight: bold;
            line-height: 1.8;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #tut-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            width: 200px;
            height: 200px;
            background-color: #8d6e63;
            padding: 5px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* ゲーム本編 */
        header { width: 100%; margin-bottom: 10px; }
        #top-image { max-width: 60px; height: auto; }
        h2 { color: #d35400; font-size: 18px; margin: 5px 0; }
        p#message { font-size: 14px; font-weight: bold; line-height: 1.6; margin-bottom: 10px; }
        
        #controls { display: flex; gap: 10px; margin-bottom: 10px; width: 100%; justify-content: center; }
        #controls .btn { width: auto; margin: 0; padding: 10px 15px; font-size: 14px; }
        #hint-btn { background-color: #f1c40f; color: #333; }
        #hint-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; color: #7f8c8d; }

        /* ゲーム盤スタイル */
        .board-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            background-color: #8d6e63;
            padding: 5px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            width: 100%;
            height: 100%;
        }
        .cell {
            background-color: #d7ccc8;
            border: 2px solid #a1887f;
            border-radius: 4px;
            font-size: 6vw;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.2s;
        }
        @media (min-width: 500px) { .cell { font-size: 30px; } }
        .cell.revealed {
            background-color: #efebe9;
            border: 1px solid #d7ccc8;
            cursor: default;
        }
        .bone-img { width: 80%; height: 80%; object-fit: contain; }

        /* 動画コンテナ */
        #video-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #video-container h3 { color: white; margin-bottom: 15px; font-size: 22px; }
        video { width: 100%; height: auto; max-height: 80vh; object-fit: contain; }
        #close-video-btn { margin-top: 20px; }
        
        ruby rt { font-size: 10px; color: #555; }
    </style>
</head>
<body>

    <div id="screen-title" class="screen active">
        <img id="title-logo" src="img/title.png" alt="タイトル画像" onerror="this.style.display='none'">
        <h1>きょうりゅう<br><ruby>発掘<rt>はっくつ</rt></ruby>ゲーム</h1>
        <button class="btn btn-secondary" onclick="startTutorial()">あそびかた</button>
        <button class="btn btn-primary" onclick="startGame()">すぐにあそぶ</button>
    </div>

    <div id="screen-tutorial" class="screen">
        <button class="btn btn-skip" onclick="startGame()">スキップ ➡</button>
        <div id="tutorial-text-box">
            <span id="tut-text"></span>
        </div>
        <div id="tut-board">
            <div class="cell" id="tut-cell-0"></div><div class="cell" id="tut-cell-1"></div><div class="cell" id="tut-cell-2"></div>
            <div class="cell" id="tut-cell-3"></div><div class="cell" id="tut-cell-4"></div><div class="cell" id="tut-cell-5"></div>
            <div class="cell" id="tut-cell-6"></div><div class="cell" id="tut-cell-7"></div><div class="cell" id="tut-cell-8"></div>
        </div>
        <button id="tut-next-btn" class="btn btn-primary" onclick="nextTutorial()">つぎへ</button>
    </div>

    <div id="screen-game" class="screen">
        <header>
            <img id="top-image" src="img/tyrano.png" alt="アイコン">
            <h2>きょうりゅう<ruby>発掘<rt>はっくつ</rt></ruby>ゲーム！</h2>
            <p id="message"><ruby>数字<rt>すうじ</rt></ruby>をヒントに、<ruby>化石<rt>かせき</rt></ruby>をよけて<ruby>土<rt>つち</rt></ruby>をほろう！<br>ぜんぶほれるとティラノサウルスが<ruby>復活<rt>ふっかつ</rt></ruby>するよ！</p>
        </header>

        <div id="controls">
            <button id="hint-btn" class="btn" onclick="useHint()">ヒント (あと１かい)</button>
            <button id="reset-btn" class="btn btn-primary" onclick="initGame()">やりなおす</button>
        </div>

        <div class="board-container">
            <div id="game-board"></div>
        </div>
    </div>

    <div id="video-container">
        <h3>ティラノサウルス <ruby>復活<rt>ふっかつ</rt></ruby>！！</h3>
        <video id="win-video" playsinline>
            <source src="img/tyrano01.mp4" type="video/mp4">
        </video>
        <button id="close-video-btn" class="btn btn-primary" onclick="closeVideo()">とじる</button>
    </div>

    <script>
        // --- 画面切り替えロジック ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // --- チュートリアルロジック ---
        let tutStep = 0;
        const tutTextElement = document.getElementById('tut-text');
        
        const tutorialSteps = [
            {
                text: "ここは きょうりゅうの<br><ruby>化石<rt>かせき</rt></ruby>が ねむる <ruby>場所<rt>ばしょ</rt></ruby>だよ。",
                action: () => { resetTutBoard(); }
            },
            {
                text: "まずは まん中の <ruby>土<rt>つち</rt></ruby>を<br>ほってみよう！",
                action: () => {
                    let c = document.getElementById('tut-cell-4');
                    c.classList.add('revealed');
                    c.style.color = '#0000FF';
                    c.textContent = '1';
                }
            },
            {
                text: "『１』が でたね！<br>まわりの どこかに １つだけ<br><ruby>化石<rt>かせき</rt></ruby>が かくれているよ。",
                action: () => {
                    for(let i=0; i<9; i++) {
                        if(i !== 4) document.getElementById('tut-cell-'+i).style.borderColor = '#e74c3c';
                    }
                }
            },
            {
                text: "<ruby>化石<rt>かせき</rt></ruby>は 左上(ひだりうえ)にあったよ！<br>これを ほると しっぱい だよ。",
                action: () => {
                    for(let i=0; i<9; i++) {
                        document.getElementById('tut-cell-'+i).style.borderColor = '#a1887f';
                    }
                    let bomb = document.getElementById('tut-cell-0');
                    bomb.classList.add('revealed');
                    bomb.innerHTML = '<img src="img/tyrano_born.png" class="bone-img">';
                    bomb.style.backgroundColor = '#ffcdd2';
                }
            },
            {
                text: "<ruby>化石<rt>かせき</rt></ruby>をよけて、<ruby>安全<rt>あんぜん</rt></ruby>な<br><ruby>土<rt>つち</rt></ruby>を ぜんぶほれば クリア！",
                action: () => {
                    [1,2,3,5,6,7,8].forEach(i => {
                        let c = document.getElementById('tut-cell-'+i);
                        c.classList.add('revealed');
                    });
                    document.getElementById('tut-next-btn').textContent = "あそぶ！";
                }
            }
        ];

        function startTutorial() {
            showScreen('screen-tutorial');
            tutStep = 0;
            document.getElementById('tut-next-btn').textContent = "つぎへ";
            playTutStep(tutStep);
        }

        function playTutStep(step) {
            tutTextElement.innerHTML = tutorialSteps[step].text;
            tutorialSteps[step].action();
        }

        function nextTutorial() {
            tutStep++;
            if (tutStep >= tutorialSteps.length) {
                startGame();
            } else {
                playTutStep(tutStep);
            }
        }

        function resetTutBoard() {
            for(let i=0; i<9; i++) {
                let c = document.getElementById('tut-cell-'+i);
                c.className = 'cell';
                c.innerHTML = '';
                c.style.borderColor = '#a1887f';
                c.style.backgroundColor = '#d7ccc8';
            }
        }

        // --- ゲーム本編ロジック ---
        const ROWS = 5;
        const COLS = 5;
        const MINES_COUNT = 4;
        let board = [];
        let revealedCount = 0;
        let gameOver = false;
        let hintsLeft = 1;

        const boardElement = document.getElementById('game-board');
        const videoContainer = document.getElementById('video-container');
        const winVideo = document.getElementById('win-video');
        const messageElement = document.getElementById('message');
        const hintBtn = document.getElementById('hint-btn');

        function startGame() {
            showScreen('screen-game');
            initGame();
        }

        function initGame() {
            board = [];
            revealedCount = 0;
            gameOver = false;
            hintsLeft = 1;

            videoContainer.style.display = 'none';
            winVideo.pause();
            winVideo.currentTime = 0;
            messageElement.innerHTML = "<ruby>数字<rt>すうじ</rt></ruby>をヒントに、<ruby>化石<rt>かせき</rt></ruby>をよけて<ruby>土<rt>つち</rt></ruby>をほろう！<br>ぜんぶほれるとティラノサウルスが<ruby>復活<rt>ふっかつ</rt></ruby>するよ！";
            updateHintButton();
            boardElement.innerHTML = '';

            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    row.push({ isMine: false, revealed: false, neighborMines: 0 });
                }
                board.push(row);
            }

            let placedMines = 0;
            while (placedMines < MINES_COUNT) {
                let r = Math.floor(Math.random() * ROWS);
                let c = Math.floor(Math.random() * COLS);
                if (!board[r][c].isMine) {
                    board[r][c].isMine = true;
                    placedMines++;
                }
            }

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (!board[r][c].isMine) {
                        let count = 0;
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                let nr = r + dr;
                                let nc = c + dc;
                                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc].isMine) {
                                    count++;
                                }
                            }
                        }
                        board[r][c].neighborMines = count;
                    }
                }
            }

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let cellDiv = document.createElement('div');
                    cellDiv.classList.add('cell');
                    cellDiv.dataset.r = r;
                    cellDiv.dataset.c = c;
                    cellDiv.addEventListener('click', () => handleCellClick(r, c));
                    boardElement.appendChild(cellDiv);
                }
            }
        }

        function handleCellClick(r, c) {
            if (gameOver || board[r][c].revealed) return;

            let cellData = board[r][c];
            cellData.revealed = true;
            revealedCount++;

            let cellDiv = boardElement.children[r * COLS + c];
            cellDiv.classList.add('revealed');

            if (cellData.isMine) {
                gameOver = true;
                cellDiv.innerHTML = '<img src="img/tyrano_born.png" class="bone-img" alt="化石">';
                cellDiv.style.backgroundColor = '#ffcdd2';
                messageElement.innerHTML = "<span style='color:red;'>あ！<ruby>化石<rt>かせき</rt></ruby>をこわしちゃった！<br>「やりなおす」をおしてね。</span>";
                revealAllMines();
                hintBtn.disabled = true;
            } else {
                if (cellData.neighborMines > 0) {
                    const colors = ["", "#0000FF", "#008000", "#FF0000", "#800080", "#800000", "#40E0D0", "#000000", "#808080"];
                    cellDiv.style.color = colors[cellData.neighborMines];
                    cellDiv.textContent = cellData.neighborMines;
                } else {
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            let nr = r + dr;
                            let nc = c + dc;
                            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                                handleCellClick(nr, nc);
                            }
                        }
                    }
                }
                checkWin();
            }
        }

        function revealAllMines() {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c].isMine) {
                        let cellDiv = boardElement.children[r * COLS + c];
                        if (!cellDiv.classList.contains('revealed')) {
                            cellDiv.classList.add('revealed');
                            cellDiv.innerHTML = '<img src="img/tyrano_born.png" class="bone-img" alt="化石">';
                        }
                    }
                }
            }
        }

        function useHint() {
            if (gameOver || hintsLeft <= 0) return;

            let safeCells = [];
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (!board[r][c].revealed && !board[r][c].isMine) {
                        safeCells.push({r, c});
                    }
                }
            }

            if (safeCells.length > 0) {
                let randomCell = safeCells[Math.floor(Math.random() * safeCells.length)];
                handleCellClick(randomCell.r, randomCell.c);
                hintsLeft--;
                updateHintButton();
                messageElement.innerHTML = "ここが<ruby>安全<rt>あんぜん</rt></ruby>だよ！";
            }
        }

        function updateHintButton() {
            if (hintsLeft > 0) {
                hintBtn.textContent = `ヒント (あと${hintsLeft}かい)`;
                hintBtn.disabled = false;
            } else {
                hintBtn.textContent = "ヒントはもうないよ";
                hintBtn.disabled = true;
            }
        }

        function checkWin() {
            const totalCells = ROWS * COLS;
            const targetSafeCells = totalCells - MINES_COUNT;
            
            if (revealedCount === targetSafeCells) {
                gameOver = true;
                hintBtn.disabled = true;
                messageElement.innerHTML = "<span style='color:#d35400; font-size:20px;'>はっくつ<ruby>大成功<rt>だいせいこう</rt></ruby>！！</span>";
                
                setTimeout(() => {
                    videoContainer.style.display = 'flex';
                    winVideo.muted = true;
                    winVideo.play().then(() => {
                         winVideo.muted = false;
                    }).catch(error => {
                        winVideo.muted = false;
                        winVideo.controls = true;
                    });
                }, 1000);
            }
        }

        function closeVideo() {
            winVideo.pause();
            winVideo.muted = false;
            videoContainer.style.display = 'none';
            initGame();
        }
    </script>
</body>
</html>
