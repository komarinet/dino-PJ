<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO-CHASE DX: PERFECT ESCAPE v5.7</title>
    <style>
        body { margin: 0; padding: 0; background-color: #050a05; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100dvh; image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
/**
 * DINO-CHASE DX - V5.7 Missing Code Fixed & Perfect Logic
 * 開発: 先生 & Gemini (AAA Graphics & Camera Plan Integration)
 */

const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
let W, H, hW, horizonY;

// --- エンジン定数（シネマティック・ローアングル設定） ---
const CAMERA_HEIGHT = 800; 
const CAMERA_DEPTH = 1.2; 
const RENDER_DISTANCE = 200; 
const SCROLL_SPEED = 0.8; 

let animTime = 0;
let travelDist = 0;
let cameraYaw = 0; 
let sprites = [];
let effects = [];
let touch = { x: 0, y: 0, down: false };

// --- 画像アセット ---
const roadImg = new Image(); roadImg.src = 'img/road03.png'; 
const backImg = new Image(); backImg.src = 'img/back01.png'; 
const tyranoImg = new Image(); tyranoImg.src = 'img/tyrano_ani01.png'; 
const plantImg = new Image(); plantImg.src = 'img/plant01.png'; 

const PLANT_DEFS = {
    'tall': [ { x: 0, y: 0, w: 256, h: 512 }, { x: 256, y: 0, w: 256, h: 512 }, { x: 512, y: 0, w: 256, h: 512 } ],
    'short': [ { x: 0, y: 512, w: 256, h: 256 }, { x: 256, y: 512, w: 256, h: 256 }, { x: 512, y: 512, w: 256, h: 256 } ],
    'ground': [ { x: 0, y: 768, w: 256, h: 256 }, { x: 256, y: 768, w: 256, h: 256 }, { x: 512, y: 768, w: 256, h: 256 } ]
};

class Sprite {
    constructor(type, xOffset, z) {
        this.type = type; 
        this.xOffset = xOffset; 
        this.z = z;
        this.screenX = 0;
        this.screenY = 0;
        
        if(type !== 'boss') {
            this.index = Math.floor(Math.random() * 3);
            this.def = PLANT_DEFS[type][this.index];
            this.w = this.def.w;
            this.h = this.def.h;
            // 木のサイズを少し落ち着かせる
            this.scaleBase = type === 'tall' ? 4.5 : type === 'short' ? 2.5 : 2.0;
        } else {
            this.w = 512; 
            this.h = 512; 
            // 【重要修正】はみ出さない適正な巨獣サイズ
            this.scaleBase = 7.5; 
        }
    }
}

class HitEffect {
    constructor(x, y) { this.x = x; this.y = y; this.life = 20; }
    draw() {
        this.life--;
        ctx.fillStyle = `rgba(255, ${150 + this.life * 5}, 50, ${this.life / 20})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, 60 - this.life * 2, 0, Math.PI*2); ctx.fill();
    }
}

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    hW = W / 2; 
    horizonY = H * 0.45; 
}

function init() {
    resize();
    animTime = 0; travelDist = 0; cameraYaw = 0;
    sprites = []; effects = [];

    // 木を消失点（奥）に配置
    for(let i = 0; i < 500; i++) {
        spawnPlant(RENDER_DISTANCE);
    }
    // ボス配置。Z=60 ±20 (Z=40〜80) で往復
    sprites.push(new Sprite('boss', 0, 60)); 
}

function spawnPlant(zPos) {
    const side = Math.random() > 0.5 ? 1 : -1;
    const xOffset = side * (1200 + Math.pow(Math.random(), 1.5) * 8000); 
    const r = Math.random();
    let type = 'ground';
    if (r > 0.65) type = 'tall';
    else if (r > 0.35) type = 'short';
    
    sprites.push(new Sprite(type, xOffset, zPos));
}

// 複合サイン波による「予測不能なロングカーブ」の生成
function getCurrentCurve() {
    // カーブの振幅（2.5, 1.8）と周波数（0.005, 0.003）を大きくしてダイナミックにする
    return Math.sin(travelDist * 0.005) * 2.5 + Math.cos(travelDist * 0.003) * 1.8;
}

function loop() {
    animTime++;
    travelDist += SCROLL_SPEED;
    const currentCurve = getCurrentCurve();
    cameraYaw += currentCurve * 0.6;

    ctx.fillStyle = '#050a05'; 
    ctx.fillRect(0, 0, W, H);

    // 1. 背景の鏡合わせループ
    if (backImg.complete && backImg.width > 0) {
        const bgScale = horizonY / backImg.height;
        const bgW = backImg.width * bgScale;
        
        let bgPan = cameraYaw % (bgW * 2);
        if (bgPan < 0) bgPan += (bgW * 2);

        let drawX1 = -bgPan;
        ctx.drawImage(backImg, 0, 0, backImg.width, backImg.height, drawX1, 0, bgW, horizonY + 2);

        let drawX2 = bgW - bgPan;
        ctx.save();
        ctx.translate(drawX2 + bgW, 0); 
        ctx.scale(-1, 1);
        ctx.drawImage(backImg, 0, 0, backImg.width, backImg.height, 0, 0, bgW, horizonY + 2);
        ctx.restore();
        
        let drawX3 = bgW * 2 - bgPan;
        if (drawX3 < W) {
            ctx.drawImage(backImg, 0, 0, backImg.width, backImg.height, drawX3, 0, bgW, horizonY + 2);
        }
    }

    // 2. 地面と道路・地表の描画 (Painter's Algorithm: 手前から奥へ)
    for (let i = 2; i <= RENDER_DISTANCE; i++) {
        const projScale = CAMERA_DEPTH / i;
        const y = horizonY + (CAMERA_HEIGHT * projScale);
        
        const prevProjScale = CAMERA_DEPTH / (i + 1);
        const prevY = horizonY + (CAMERA_HEIGHT * prevProjScale);
        const drawH = Math.ceil(y - prevY) + 1; // +1ピクセル余分に描いて隙間を撲滅

        if (y < 0) break; // 画面上部を過ぎたら終了

        const curveOffsetX = 0.5 * currentCurve * i * i * projScale;
        const x = hW + curveOffsetX;
        
        // 道路のベース幅
        const roadWidth = Math.floor(1500 * projScale);

        // --- 道路外側の地表の描画 ---
        if (roadImg.complete && roadImg.width > 0) {
            // スクロール方向: 奥から手前
            let texY = Math.floor(i * 12 + travelDist * 80) % roadImg.height;
            if (texY < 0) texY += roadImg.height;
            
            const atlasW = roadImg.width;
            const atlasH = 1; // 1px単位で描画
            const sx1 = 0; // 左側1/4
            const sx2 = atlasW * 0.75; // 右側1/4

            // 左側外
            ctx.drawImage(roadImg, sx1, texY, atlasW * 0.25, atlasH, 0, y - drawH, x - roadWidth/2, drawH);
            // 右側外
            ctx.drawImage(roadImg, sx2, texY, atlasW * 0.25, atlasH, x + roadWidth/2, y - drawH, W - (x + roadWidth/2), drawH);
        }

        // --- 中央の道路レイヤーの描画 (完全な平滑化アルゴリズム) ---
        if (roadImg.complete && roadImg.width > 0) {
            // スクロール方向: 奥から手前
            let texY = Math.floor(i * 12 + travelDist * 80) % roadImg.height;
            if (texY < 0) texY += roadImg.height;
            
            // 切り出し範囲
            const sx = roadImg.width * 0.25; // 中央2/4
            const sw = roadImg.width * 0.5;

            ctx.drawImage(roadImg, sx, texY, sw, 1, Math.floor(x - roadWidth/2), y - drawH, roadWidth, drawH);
        }
    }

    // 3. スプライト更新とZソート
    sprites.forEach(s => {
        if (s.type !== 'boss') {
            // スクロール方向: 奥から手前
            s.z -= SCROLL_SPEED;
            if (s.z < 1) { // カメラを過ぎたら奥に再配置
                s.z += RENDER_DISTANCE;
                const side = Math.random() > 0.5 ? 1 : -1; 
                s.xOffset = side * (1200 + Math.pow(Math.random(), 1.5) * 8000); 
            }
        } else {
            // 【重要修正: はみ出さない接近ロジック Z=60 ±20】
            s.xOffset = Math.sin(animTime * 0.04) * 120; // 迫りくる巨獣の横揺れ
            s.z = 60 + Math.sin(animTime * 0.02) * 20; 
        }
    });

    sprites.sort((a, b) => b.z - a.z);

    const TOTAL_FRAMES = 12;
    const FRAME_W = 512;
    const FRAME_H = 512;
    const SPRITE_COL = 4;
    const bossFrame = Math.floor(animTime * 0.35 * SCROLL_SPEED) % TOTAL_FRAMES;

    // 4. スプライト描画
    sprites.forEach(s => {
        const projScale = CAMERA_DEPTH / s.z;
        const curveOffsetX = 0.5 * currentCurve * s.z * s.z * projScale;
        const x = hW + (s.xOffset * projScale) + curveOffsetX;

        const drawW = s.w * projScale * s.scaleBase;
        const drawH = s.h * projScale * s.scaleBase;

        const drawX = Math.floor(x - drawW / 2);
        const drawY = Math.floor(horizonY + (CAMERA_HEIGHT * projScale) - drawH);

        s.screenX = x;
        s.screenY = drawY + drawH / 2; 

        if (s.type === 'boss') {
            if (tyranoImg.complete && tyranoImg.width > 0) {
                const sx = (bossFrame % SPRITE_COL) * FRAME_W;
                const sy = Math.floor(bossFrame / SPRITE_COL) * FRAME_H;
                ctx.drawImage(
                    tyranoImg, 
                    sx, sy, FRAME_W, FRAME_H,
                    drawX, drawY, Math.floor(drawW), Math.floor(drawH)
                );
            }
        } else {
            if (plantImg.complete && plantImg.width > 0) {
                ctx.drawImage(
                    plantImg, 
                    s.def.x, s.def.y, s.def.w, s.def.h, 
                    drawX, drawY, Math.floor(drawW), Math.floor(drawH)
                );
            }
        }
    });

    // 5. ヒット判定とUI
    if (touch.down) {
        const bossObj = sprites.find(s => s.type === 'boss');
        if (bossObj) {
            const dist = Math.hypot(touch.x - bossObj.screenX, touch.y - bossObj.screenY);
            if (dist < bossObj.w * (CAMERA_DEPTH/bossObj.z) * bossObj.scaleBase * 0.5) {
                effects.push(new HitEffect(touch.x, touch.y));
            }
        }
    }
    
    effects = effects.filter(e => e.life > 0);
    effects.forEach(e => e.draw());

    // 照準とプレイヤー機
    ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(touch.x, touch.y, 25, 0, Math.PI*2);
    ctx.moveTo(touch.x - 40, touch.y); ctx.lineTo(touch.x - 10, touch.y);
    ctx.moveTo(touch.x + 10, touch.y); ctx.lineTo(touch.x + 40, touch.y);
    ctx.moveTo(touch.x, touch.y - 40); ctx.lineTo(touch.x, touch.y - 10);
    ctx.moveTo(touch.x, touch.y + 10); ctx.lineTo(touch.x, touch.y + 40);
    ctx.stroke();

    ctx.font = '80px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('🚙', hW, H - 20); 

    requestAnimationFrame(loop);
}

// --- 入力制御 ---
const handleInput = (e) => {
    const t = e.touches ? e.touches[0] : e;
    touch.x = t.clientX; touch.y = t.clientY;
    if (e.type === 'mousedown' || e.type === 'touchstart') touch.down = true;
    if (e.type === 'mouseup' || e.type === 'touchend') touch.down = false;
};
window.addEventListener('mousemove', handleInput);
window.addEventListener('mousedown', handleInput);
window.addEventListener('mouseup', handleInput);
window.addEventListener('touchstart', handleInput, {passive: false});
window.addEventListener('touchend', handleInput);
window.addEventListener('touchmove', e => { e.preventDefault(); handleInput(e); }, {passive: false});
window.addEventListener('resize', resize);

init();
loop();

</script>
</body>
</html>
