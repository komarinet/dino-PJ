<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO-CHASE DX: TRUE SCANLINE v6.1</title>
    <style>
        body { margin: 0; padding: 0; background-color: #050a05; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100dvh; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
/**
 * DINO-CHASE DX - V6.1 True Scanline Rendering
 * 開発: 先生 & Gemini (Mode-7 style Rasterizer)
 */

const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
let W, H, hW, horizonY;

const CAMERA_HEIGHT = 800; 
const CAMERA_DEPTH = 1.2; 
const RENDER_DISTANCE = 200; 
const SCROLL_SPEED = 0.8; 

let animTime = 0;
let travelDist = 0;
let cameraYaw = 0; 
let sprites = [];
let effects = [];
let touch = { x: 0, y: 0, down: false };

const roadImg = new Image(); roadImg.src = 'img/road03.png'; 
const backImg = new Image(); backImg.src = 'img/back01.png'; 
const tyranoImg = new Image(); tyranoImg.src = 'img/tyrano_ani01.png'; 
const plantImg = new Image(); plantImg.src = 'img/plant01.png'; 

const PLANT_DEFS = {
    'tall': [ { x: 0, y: 0, w: 256, h: 512 }, { x: 256, y: 0, w: 256, h: 512 }, { x: 512, y: 0, w: 256, h: 512 } ],
    'short': [ { x: 0, y: 512, w: 256, h: 256 }, { x: 256, y: 512, w: 256, h: 256 }, { x: 512, y: 512, w: 256, h: 256 } ],
    'ground': [ { x: 0, y: 768, w: 256, h: 256 }, { x: 256, y: 768, w: 256, h: 256 }, { x: 512, y: 768, w: 256, h: 256 } ]
};

class Sprite {
    constructor(type, xOffset, z) {
        this.type = type; 
        this.xOffset = xOffset; 
        this.z = z;
        this.screenX = 0;
        this.screenY = 0;
        
        if(type !== 'boss') {
            this.index = Math.floor(Math.random() * 3);
            this.def = PLANT_DEFS[type][this.index];
            this.w = this.def.w;
            this.h = this.def.h;
            this.scaleBase = type === 'tall' ? 4.0 : type === 'short' ? 2.5 : 2.0;
        } else {
            this.w = 512; 
            this.h = 512; 
            this.scaleBase = 7.5; 
        }
    }
}

class HitEffect {
    constructor(x, y) { this.x = x; this.y = y; this.life = 20; }
    draw() {
        this.life--;
        ctx.fillStyle = `rgba(255, ${150 + this.life * 5}, 50, ${this.life / 20})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, 60 - this.life * 2, 0, Math.PI*2); ctx.fill();
    }
}

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    hW = W / 2; 
    horizonY = H * 0.45; 
}

function init() {
    resize();
    animTime = 0; travelDist = 0; cameraYaw = 0;
    sprites = []; effects = [];

    for(let i = 0; i < 800; i++) {
        spawnPlant(Math.random() * RENDER_DISTANCE);
    }
    sprites.push(new Sprite('boss', 0, 45)); 
}

function spawnPlant(zPos) {
    const side = Math.random() > 0.5 ? 1 : -1;
    const xOffset = side * (1200 + Math.pow(Math.random(), 2.0) * 10000); 
    const r = Math.random();
    let type = 'ground';
    if (r > 0.5) type = 'tall';
    else if (r > 0.2) type = 'short';
    
    sprites.push(new Sprite(type, xOffset, zPos));
}

function getCurrentCurve() {
    return Math.sin(travelDist * 0.005) * 2.8 + Math.cos(travelDist * 0.0025) * 1.5;
}

function loop() {
    animTime++;
    travelDist += SCROLL_SPEED;
    const currentCurve = getCurrentCurve();
    
    cameraYaw -= currentCurve * 0.4;

    ctx.fillStyle = '#050a05'; 
    ctx.fillRect(0, 0, W, H);

    // 1. 背景（つなぎ目の縦線を撲滅した完全シームレス）
    if (backImg.complete && backImg.width > 0) {
        const bgScale = horizonY / backImg.height;
        const bgW = Math.ceil(backImg.width * bgScale); // 整数化
        
        let bgPan = Math.floor(cameraYaw) % (bgW * 2);
        if (bgPan < 0) bgPan += (bgW * 2);

        let drawX1 = -bgPan;
        // 1px余分に描画して隙間を潰す
        ctx.drawImage(backImg, 0, 0, backImg.width, backImg.height, drawX1, 0, bgW + 1, horizonY + 2);

        let drawX2 = drawX1 + bgW;
        ctx.save();
        ctx.translate(drawX2 + bgW, 0); 
        ctx.scale(-1, 1);
        ctx.drawImage(backImg, 0, 0, backImg.width, backImg.height, 0, 0, bgW + 1, horizonY + 2);
        ctx.restore();
        
        let drawX3 = drawX2 + bgW;
        if (drawX3 < W) {
            ctx.drawImage(backImg, 0, 0, backImg.width, backImg.height, drawX3, 0, bgW + 1, horizonY + 2);
        }
    }

    // 2. 道路と地表の描画 【真・スキャンラインレンダラ】
    // Zベースではなく、画面のY座標（1pxごと）にループを回す！
    if (roadImg.complete && roadImg.width > 0) {
        const w = roadImg.width;
        
        for (let y = Math.floor(horizonY) + 1; y < H; y++) {
            // スクリーンY座標から、そのピクセルのZ深度を逆算
            const z = (CAMERA_HEIGHT * CAMERA_DEPTH) / (y - horizonY);

            const projScale = CAMERA_DEPTH / z;
            const curveOffsetX = 0.5 * currentCurve * z * z * projScale;
            const x = hW + curveOffsetX;
            const roadWidth = Math.floor(1800 * projScale);

            // Z深度と移動距離からテクスチャYを算出（バック視点）
            let texY = Math.floor(z * 15 - travelDist * 100) % roadImg.height;
            if (texY < 0) texY += roadImg.height;
            
            // 高さ1pxで描画（縦伸び・バーコード化を完全に防ぐ）
            // 左側地表
            ctx.drawImage(roadImg, 0, texY, w * 0.25, 1, 0, y, x - roadWidth/2, 1);
            // 中央道路
            ctx.drawImage(roadImg, w * 0.25, texY, w * 0.5, 1, x - roadWidth/2, y, roadWidth, 1);
            // 右側地表
            ctx.drawImage(roadImg, w * 0.75, texY, w * 0.25, 1, x + roadWidth/2, y, W - (x + roadWidth/2), 1);
        }
    }

    // 3. スプライト更新とZソート (バック視点)
    sprites.forEach(s => {
        if (s.type !== 'boss') {
            s.z += SCROLL_SPEED;
            if (s.z > RENDER_DISTANCE) { 
                s.z = 1;
                const side = Math.random() > 0.5 ? 1 : -1; 
                s.xOffset = side * (1200 + Math.pow(Math.random(), 2.0) * 10000); 
            }
        } else {
            s.xOffset = Math.sin(animTime * 0.04) * 150; 
            s.z = 45 + Math.sin(animTime * 0.02) * 15; 
        }
    });

    sprites.sort((a, b) => b.z - a.z);

    const TOTAL_FRAMES = 12;
    const FRAME_W = 512;
    const FRAME_H = 512;
    const SPRITE_COL = 4;
    const bossFrame = Math.floor(animTime * 0.35 * SCROLL_SPEED) % TOTAL_FRAMES;

    // 4. スプライト描画
    sprites.forEach(s => {
        // 描画限界より遠いものはスキップ
        if (s.z > RENDER_DISTANCE) return;

        const projScale = CAMERA_DEPTH / s.z;
        const curveOffsetX = 0.5 * currentCurve * s.z * s.z * projScale;
        const x = hW + (s.xOffset * projScale) + curveOffsetX;

        const drawW = s.w * projScale * s.scaleBase;
        const drawH = s.h * projScale * s.scaleBase;

        const drawX = Math.floor(x - drawW / 2);
        const drawY = Math.floor(horizonY + (CAMERA_HEIGHT * projScale) - drawH);

        s.screenX = x;
        s.screenY = drawY + drawH / 2; 

        if (s.type === 'boss') {
            if (tyranoImg.complete && tyranoImg.width > 0) {
                const sx = (bossFrame % SPRITE_COL) * FRAME_W;
                const sy = Math.floor(bossFrame / SPRITE_COL) * FRAME_H;
                ctx.drawImage(
                    tyranoImg, 
                    sx, sy, FRAME_W, FRAME_H,
                    drawX, drawY, Math.floor(drawW), Math.floor(drawH)
                );
            }
        } else {
            if (plantImg.complete && plantImg.width > 0) {
                ctx.drawImage(
                    plantImg, 
                    s.def.x, s.def.y, s.def.w, s.def.h, 
                    drawX, drawY, Math.floor(drawW), Math.floor(drawH)
                );
            }
        }
    });

    // 5. ヒット判定とUI
    if (touch.down) {
        const bossObj = sprites.find(s => s.type === 'boss');
        if (bossObj) {
            const dist = Math.hypot(touch.x - bossObj.screenX, touch.y - bossObj.screenY);
            if (dist < bossObj.w * (CAMERA_DEPTH/bossObj.z) * bossObj.scaleBase * 0.5) {
                effects.push(new HitEffect(touch.x, touch.y));
            }
        }
    }
    
    effects = effects.filter(e => e.life > 0);
    effects.forEach(e => e.draw());

    ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(touch.x, touch.y, 25, 0, Math.PI*2);
    ctx.moveTo(touch.x - 40, touch.y); ctx.lineTo(touch.x - 10, touch.y);
    ctx.moveTo(touch.x + 10, touch.y); ctx.lineTo(touch.x + 40, touch.y);
    ctx.moveTo(touch.x, touch.y - 40); ctx.lineTo(touch.x, touch.y - 10);
    ctx.moveTo(touch.x, touch.y + 10); ctx.lineTo(touch.x, touch.y + 40);
    ctx.stroke();

    ctx.font = '80px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('🚙', hW, H - 20); 

    requestAnimationFrame(loop);
}

const handleInput = (e) => {
    const t = e.touches ? e.touches[0] : e;
    touch.x = t.clientX; touch.y = t.clientY;
    if (e.type === 'mousedown' || e.type === 'touchstart') touch.down = true;
    if (e.type === 'mouseup' || e.type === 'touchend') touch.down = false;
};
window.addEventListener('mousemove', handleInput);
window.addEventListener('mousedown', handleInput);
window.addEventListener('mouseup', handleInput);
window.addEventListener('touchstart', handleInput, {passive: false});
window.addEventListener('touchend', handleInput);
window.addEventListener('touchmove', e => { e.preventDefault(); handleInput(e); }, {passive: false});
window.addEventListener('resize', resize);

init();
loop();

</script>
</body>
</html>
