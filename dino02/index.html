<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO-CHASE DX: THE FINAL ESCAPE (Rebuilt)</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0a140a; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100dvh; image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
/**
 * DINO-CHASE DX - V3.0 Rebuilt Engine
 * 開発: 先生 & Gemini (AAA Graphics & Logic Fix)
 */

const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
let W, H, hW, hH;

// --- エンジン定数 ---
const CAMERA_HEIGHT = 1500;
const CAMERA_DEPTH = 0.8; 
const RENDER_DISTANCE = 200; // 描画距離。奥の限界。
const SCROLL_SPEED = 0.8; // 木の流れ、地面の流れが自然に見える速度

let animTime = 0;
let travelDist = 0;
let sprites = [];
let effects = [];
let touch = { x: 0, y: 0, down: false };

// --- 画像アセット ---
// ※実際のパスに合わせてください。プレースホルダー的な挙動も内包。
const roadImg = new Image(); roadImg.src = 'img/road03.png'; // 復活
const bgImg = new Image(); bgImg.src = 'img/jungle03.png'; // 遠景＋地表統合アトラス
const tyranoImg = new Image(); tyranoImg.src = 'img/tyrano02.png';
const plantImg = new Image(); plantImg.src = 'img/plant01.png';

// --- 植物スプライトのUV定義 (1024x1024アトラス仕様) ---
const PLANT_DEFS = {
    'tall': [
        { x: 0, y: 0, w: 256, h: 512 },
        { x: 256, y: 0, w: 256, h: 512 },
        { x: 512, y: 0, w: 256, h: 512 }
    ],
    'short': [
        { x: 0, y: 512, w: 256, h: 256 },
        { x: 256, y: 512, w: 256, h: 256 },
        { x: 512, y: 512, w: 256, h: 256 }
    ],
    'ground': [
        { x: 0, y: 768, w: 256, h: 256 },
        { x: 256, y: 768, w: 256, h: 256 },
        { x: 512, y: 768, w: 256, h: 256 }
    ]
};

// --- スプライトクラス ---
class Sprite {
    constructor(type, xOffset, z) {
        this.type = type; 
        this.xOffset = xOffset; 
        this.z = z;
        this.screenX = 0;
        this.screenY = 0;

        if (type !== 'boss') {
            // 3種類の中からランダムにインデックスを選択
            this.index = Math.floor(Math.random() * 3);
            this.def = PLANT_DEFS[type][this.index];
            this.w = this.def.w;
            this.h = this.def.h;
            // 描画時のスケール調整（木の大きさを強調）
            this.scaleBase = type === 'tall' ? 5.0 : type === 'short' ? 3.0 : 2.5;
        } else {
            this.w = 800; 
            this.h = 800; 
            this.scaleBase = 1.2;
        }
    }
}

class HitEffect {
    constructor(x, y) { this.x = x; this.y = y; this.life = 20; }
    draw() {
        this.life--;
        ctx.fillStyle = `rgba(255, ${150 + this.life * 5}, 50, ${this.life / 20})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, 50 - this.life * 2, 0, Math.PI*2); ctx.fill();
    }
}

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    hW = W / 2; hH = H / 2;
}

function init() {
    resize();
    animTime = 0; travelDist = 0;
    sprites = []; effects = [];

    // ジャングルの初期生成（手前から奥までばらまく）
    // スクロール方向反転のため、手前から奥へ流れるように配置
    for(let i = 0; i < 200; i++) {
        spawnPlant(Math.random() * RENDER_DISTANCE);
    }
    // ボスを遠景固定Z位置に配置
    sprites.push(new Sprite('boss', 0, RENDER_DISTANCE - 10)); // 遠景奥
}

function spawnPlant(zPos) {
    const side = Math.random() > 0.5 ? 1 : -1;
    // 道路の外側にランダム配置 (Xオフセット)
    const xOffset = side * (600 + Math.random() * 2500); 
    const r = Math.random();
    let type = 'ground';
    if (r > 0.85) type = 'tall';
    else if (r > 0.5) type = 'short';
    
    sprites.push(new Sprite(type, xOffset, zPos));
}

// 予測不能なロングカーブの生成
function getCurrentCurve() {
    return Math.sin(travelDist * 0.004) * 1.5 + Math.cos(travelDist * 0.002) * 1.0;
}

function loop() {
    animTime++;
    travelDist += SCROLL_SPEED;
    const currentCurve = getCurrentCurve();

    ctx.fillStyle = '#0a140a'; // 奥の暗闇
    ctx.fillRect(0, 0, W, H);

    // 1. 背景（遠景）の描画（画面上部に固定）
    if (bgImg.complete && bgImg.width > 0) {
        // jungle03.pngの上半分(遠景)を固定描画
        ctx.drawImage(bgImg, 0, 0, bgImg.width, bgImg.height/2, 0, 0, W, hH);
    }

    // 2. 道路と地表のラスタースクロール (Painter's Algorithm: 奥から手前)
    for (let i = RENDER_DISTANCE; i > 1; i--) {
        const projScale = CAMERA_DEPTH / i;
        const y = hH + (CAMERA_HEIGHT * projScale);
        
        if (y > H) continue;

        const curveOffsetX = 0.5 * currentCurve * i * i * projScale;
        const x = hW + curveOffsetX;
        const roadWidth = 1200 * projScale;

        // --- 地表（泥・草）の描画 ---
        // jungle03.pngの下半分(地表アトラス)から地表パッチをばらまく
        const groundAtlasW = 512;
        const groundAtlasH = 512;
        const groundAtlasY = 512;

        const dw = roadWidth;
        const drawX = x;
        const roadW = dw;

        // 地表パッチの描画
        const p_ground = i / RENDER_DISTANCE;
        const z_ground = 1 / (p_ground + 0.1);
        const groundW = 1000 * projScale; // 地表パッチの幅
        const groundH = 1000 * projScale; // 地表パッチの高さ

        // 左側の地表パッチ
        ctx.save();
        ctx.globalAlpha = Math.min(1, (i) / 10); // 遠くほど薄く
        ctx.drawImage(
            bgImg, 
            Math.floor(animTime * 0.1 + i) % 4 * groundAtlasW, groundAtlasY, // アトラス切り出し
            groundAtlasW, groundAtlasH,
            drawX - roadW/2 - groundW, y - groundH, groundW, groundH // キャンバス描画
        );
        // 右側の地表パッチ
        ctx.drawImage(
            bgImg, 
            Math.floor(animTime * 0.1 - i + 2) % 4 * groundAtlasW, groundAtlasY, 
            groundAtlasW, groundAtlasH,
            drawX + roadW/2, y - groundH, groundW, groundH
        );
        ctx.restore();


        // --- 道路レイヤーの描画 ---
        if (roadImg.complete && roadImg.width > 0) {
            // スクロール方向反転: 手前から奥へ流れる
            let texY = ((i * 10 + travelDist * 50) % roadImg.height);
            if (texY < 0) texY += roadImg.height;
            ctx.drawImage(roadImg, 0, texY, roadImg.width, 2, x - roadWidth/2, y, roadWidth, 3);
        }
    }

    // 3. スプライトのZソートと描画
    sprites.forEach(s => {
        if (s.type !== 'boss') {
            // スクロール方向反転: 手前から奥へ流れる
            s.z += SCROLL_SPEED;
            if (s.z > RENDER_DISTANCE) { // カメラを過ぎたら手前へ再配置
                s.z -= RENDER_DISTANCE;
                s.xOffset = (Math.random() > 0.5 ? 1 : -1) * (600 + Math.random() * 2500);
            }
        } else {
            // ボスは遠景中央付近を維持
            s.xOffset = 0; 
        }
    });

    // Zソート (奥のものが先、手前のものが後)
    sprites.sort((a, b) => b.z - a.z);

    sprites.forEach(s => {
        const projScale = CAMERA_DEPTH / s.z;
        const y = hH + (CAMERA_HEIGHT * projScale);
        const curveOffsetX = 0.5 * currentCurve * s.z * s.z * projScale;
        const x = hW + (s.xOffset * projScale) + curveOffsetX;

        const drawW = s.w * projScale * s.scaleBase;
        const drawH = s.h * projScale * s.scaleBase;

        s.screenX = x;
        s.screenY = y - drawH / 2; // ヒット判定用の中心点

        if (s.type === 'boss') {
            if (tyranoImg.complete && tyranoImg.width > 0) {
                // 遠景固定ティラノのドスドスというバウンド
                const bounce = Math.abs(Math.sin(animTime * 0.15)) * 40 * projScale;
                ctx.drawImage(tyranoImg, x - drawW/2, y - drawH - bounce, drawW, drawH);
            }
        } else {
            if (plantImg.complete && plantImg.width > 0) {
                // plantImgから、正しいUV座標で切り出して描画
                ctx.drawImage(
                    plantImg, 
                    s.def.x, s.def.y, s.def.w, s.def.h, // 元画像の切り出し元
                    x - drawW / 2, y - drawH, drawW, drawH // キャンバスの描画先
                );
            }
        }
    });

    // 4. ヒットエフェクトとUI
    if (touch.down) {
        const bossObj = sprites.find(s => s.type === 'boss');
        if (bossObj) {
            const dist = Math.hypot(touch.x - bossObj.screenX, touch.y - bossObj.screenY);
            // 距離感に応じた当たり判定の広さ
            if (dist < bossObj.w * (CAMERA_DEPTH/bossObj.z) * 0.6) {
                effects.push(new HitEffect(touch.x, touch.y));
            }
        }
    }
    
    effects = effects.filter(e => e.life > 0);
    effects.forEach(e => e.draw());

    // UIレイヤー（レティクルとジープ）
    ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(touch.x, touch.y, 25, 0, Math.PI*2);
    ctx.moveTo(touch.x - 40, touch.y); ctx.lineTo(touch.x - 10, touch.y);
    ctx.moveTo(touch.x + 10, touch.y); ctx.lineTo(touch.x + 40, touch.y);
    ctx.moveTo(touch.x, touch.y - 40); ctx.lineTo(touch.x, touch.y - 10);
    ctx.moveTo(touch.x, touch.y + 10); ctx.lineTo(touch.x, touch.y + 40);
    ctx.stroke();

    ctx.font = '80px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('🚙', hW, H - 20); 

    requestAnimationFrame(loop);
}

// --- イベントリスナー ---
const handleInput = (e) => {
    const t = e.touches ? e.touches[0] : e;
    touch.x = t.clientX; touch.y = t.clientY;
    if (e.type === 'mousedown' || e.type === 'touchstart') touch.down = true;
    if (e.type === 'mouseup' || e.type === 'touchend') touch.down = false;
};
window.addEventListener('mousemove', handleInput);
window.addEventListener('mousedown', handleInput);
window.addEventListener('mouseup', handleInput);
window.addEventListener('touchstart', handleInput, {passive: false});
window.addEventListener('touchend', handleInput);
window.addEventListener('touchmove', e => { e.preventDefault(); handleInput(e); }, {passive: false});
window.addEventListener('resize', resize);

init();
loop();

</script>
</body>
</html>
