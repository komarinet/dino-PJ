<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO-CHASE DX: REBUILT ENGINE v3.0</title>
    <style>
        body { margin: 0; padding: 0; background-color: #051005; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100dvh; image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
/**
 * DINO-CHASE DX - V2.0 Pseudo-3D Engine
 * 開発: 先生 & Gemini (AAA Graphics Update)
 */

const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
let W, H, hW, hH;

// --- エンジン定数 ---
const CAMERA_HEIGHT = 1500;
const CAMERA_DEPTH = 0.8; 
const RENDER_DISTANCE = 200; // 奥の描画距離（Z値）
const SCROLL_SPEED = 0.8; 

let animTime = 0;
let travelDist = 0;
let sprites = [];
let effects = [];
let touch = { x: 0, y: 0, down: false };

// --- 画像アセット ---
// ※実際のパスに合わせてください。今回はプレースホルダー的な挙動も内包させています。
const roadImg = new Image(); roadImg.src = 'img/road03.png'; 
const bgImg = new Image(); bgImg.src = 'img/jungle03.png'; 
const tyranoImg = new Image(); tyranoImg.src = 'img/Tyrano_ani01.png'; // 修正
const plantImg = new Image(); plantImg.src = 'img/plant01.png'; // 新規追加

// --- 植物スプライトのUV定義 (1024x1024アトラス仕様) ---
const PLANT_DEFS = {
    'tall': [
        { x: 0, y: 0, w: 256, h: 512 },
        { x: 256, y: 0, w: 256, h: 512 },
        { x: 512, y: 0, w: 256, h: 512 }
    ],
    'short': [
        { x: 0, y: 512, w: 256, h: 256 },
        { x: 256, y: 512, w: 256, h: 256 },
        { x: 512, y: 512, w: 256, h: 256 }
    ],
    'ground': [
        { x: 0, y: 768, w: 256, h: 256 },
        { x: 256, y: 768, w: 256, h: 256 },
        { x: 512, y: 768, w: 256, h: 256 }
    ]
};

// --- スプライト（ビルボード）クラス ---
class Sprite {
    constructor(type, xOffset, z) {
        this.type = type; // 'tall', 'short', 'ground', 'boss'
        this.xOffset = xOffset; // 道路中心からの横ズレ
        this.z = z;
        
        // 仮のサイズ設定（本来はplant01.pngの切り出しサイズ）
        if(type === 'tall') { this.w = 600; this.h = 1200; this.uv = {x:0, y:0}; }
        else if(type === 'short') { this.w = 400; this.h = 400; this.uv = {x:0, y:1}; }
        else if(type === 'ground') { this.w = 200; this.h = 100; this.uv = {x:0, y:2}; }
        else if(type === 'boss') { this.w = 800; this.h = 800; }
    }
}

class HitEffect {
    constructor(x, y) { this.x = x; this.y = y; this.life = 20; }
    draw() {
        this.life--;
        ctx.fillStyle = `rgba(255, ${150 + this.life * 5}, 50, ${this.life / 20})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, 50 - this.life * 2, 0, Math.PI*2); ctx.fill();
    }
}

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    hW = W / 2; hH = H / 2;
}

function init() {
    resize();
    animTime = 0; travelDist = 0;
    sprites = []; effects = [];

    // 初期ジャングルの生成（道路の両脇にランダム配置）
    for(let i = 0; i < 150; i++) {
        spawnPlant(Math.random() * RENDER_DISTANCE);
    }
    // ボスを固定Z位置（プレイヤーに近い位置）に配置
    sprites.push(new Sprite('boss', 0, 30));
}

function spawnPlant(zPos) {
    const side = Math.random() > 0.5 ? 1 : -1;
    // 道幅より外側に配置
    const xOffset = side * (800 + Math.random() * 2000); 
    const r = Math.random();
    let type = 'ground';
    if (r > 0.8) type = 'tall';
    else if (r > 0.4) type = 'short';
    
    sprites.push(new Sprite(type, xOffset, zPos));
}

// 複合サイン波による「予測不能なロングカーブ」の生成
function getCurrentCurve() {
    // 複数の波を合成して、右へ左へ大きくうねるコースを作る
    return Math.sin(travelDist * 0.005) * 1.5 + Math.cos(travelDist * 0.003) * 1.0;
}

function loop() {
    animTime++;
    travelDist += SCROLL_SPEED;
    const currentCurve = getCurrentCurve();

    ctx.fillStyle = '#0a140a'; // ジャングルの奥の暗闇
    ctx.fillRect(0, 0, W, H);

    // 1. 背景の描画（カーブに合わせてカメラがパンする表現）
    if (bgImg.complete) {
        const bgPan = -(currentCurve * 100) % W;
        ctx.drawImage(bgImg, 0, 0, bgImg.width, bgImg.height/2, bgPan, 0, W*2, hH);
    }

    // 2. 道路と地表のラスタースクロール描画（奥から手前へ）
    for (let i = RENDER_DISTANCE; i > 1; i--) {
        // 3D投影計算
        const projScale = CAMERA_DEPTH / i;
        const y = hH + (CAMERA_HEIGHT * projScale);
        
        // 画面外（下部）ならスキップ
        if (y > H) continue;

        // カーブによるX軸のオフセット（物理の等加速度運動の公式 x = 1/2*a*t^2 を応用）
        const curveOffsetX = 0.5 * currentCurve * i * i * projScale;
        const x = hW + curveOffsetX;

        const roadWidth = 1200 * projScale;

        // --- 外側の地表（泥・草） ---
        ctx.fillStyle = (i + Math.floor(travelDist)) % 4 < 2 ? '#2a1a0a' : '#201005';
        ctx.fillRect(0, y, W, 3); // 画面幅いっぱいに地表を描画

        // --- 道路の描画 ---
        if (roadImg.complete) {
            // テクスチャのY座標（手前に流れる計算）
            let texY = ((i * 10 - travelDist * 50) % roadImg.height);
            if (texY < 0) texY += roadImg.height;
            
            ctx.drawImage(roadImg, 0, texY, roadImg.width, 2, x - roadWidth/2, y, roadWidth, 3);
        }
    }

    // 3. スプライトのZソートと描画（Painter's Algorithm: 奥から手前）
    sprites.forEach(s => {
        // ボス以外のオブジェクトはプレイヤーに向かってくる
        if (s.type !== 'boss') {
            s.z -= SCROLL_SPEED;
            if (s.z < 1) { // カメラを過ぎたら奥に再配置
                s.z += RENDER_DISTANCE;
                s.xOffset = (Math.random() > 0.5 ? 1 : -1) * (600 + Math.random() * 2500);
            }
        } else {
            // ボスは道の中央付近をキープ（カーブに追従しつつ少し揺れる）
            s.xOffset = Math.sin(animTime * 0.05) * 100;
        }
    });

    // Z値が大きい（奥にある）順にソート
    sprites.sort((a, b) => b.z - a.z);

    // ボスのアニメーションフレーム計算
    const TOTAL_FRAMES = 12;
    const FRAME_W = 512;
    const FRAME_H = 512;
    const SPRITE_COL = 4;
    // プレイヤーの速度(SCROLL_SPEED)に同期させる
    const bossFrame = Math.floor(animTime * 0.1 * SCROLL_SPEED) % TOTAL_FRAMES;

    sprites.forEach(s => {
        const projScale = CAMERA_DEPTH / s.z;
        const y = hH + (CAMERA_HEIGHT * projScale);
        const curveOffsetX = 0.5 * currentCurve * s.z * s.z * projScale;
        const x = hW + (s.xOffset * projScale) + curveOffsetX;

        // スケール調整（アトラスの512x512に合わせて巨大感を出す）
        const scaleBase = s.type === 'boss' ? 2.0 : 1.0; 
        const drawW = s.w * projScale * scaleBase;
        const drawH = s.h * projScale * scaleBase;

        s.screenX = x; s.screenY = y - drawH/2; 

        if (s.type === 'boss') {
            if (tyranoImg.complete) {
                // スプライトシートからの切り出し（UV）座標
                const sx = (bossFrame % SPRITE_COL) * FRAME_W;
                const sy = Math.floor(bossFrame / SPRITE_COL) * FRAME_H;

                ctx.drawImage(
                    tyranoImg, 
                    sx, sy, FRAME_W, FRAME_H, // 切り出し
                    x - drawW/2, y - drawH, drawW, drawH // 描画
                );
            }
        } else {
            // ... 植物の描画（変更なし） ...
        }
    });

    // ... ヒットエフェクトとUI（変更なし） ...
    ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3;
    ctx.strokeRect(touch.x - 25, touch.y - 25, 50, 50);
    ctx.font = '100px serif'; ctx.textAlign = 'center';
    ctx.fillText('🚙', W/2, H - 50); 

    requestAnimationFrame(loop);
}

// ... イベントリスナー ...
const handleInput = (e) => {
    const t = e.touches ? e.touches[0] : e;
    touch.x = t.clientX; touch.y = t.clientY;
    if (e.type === 'mousedown' || e.type === 'touchstart') touch.down = true;
    if (e.type === 'mouseup' || e.type === 'touchend') touch.down = false;
};
window.addEventListener('mousemove', handleInput);
window.addEventListener('mousedown', handleInput);
window.addEventListener('mouseup', handleInput);
window.addEventListener('touchstart', handleInput, {passive: false});
window.addEventListener('touchend', handleInput);
window.addEventListener('touchmove', e => { e.preventDefault(); handleInput(e); }, {passive: false});
window.addEventListener('resize', resize);

init();
loop();

</script>
</body>
</html>
