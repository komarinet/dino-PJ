<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>きょうりゅうはっくつゲーム - 大だっしゅつVer.</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', sans-serif;
            background-color: #f4e8d3;
            text-align: center;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            overscroll-behavior: none;
        }
        
        .screen {
            display: none;
            width: 100%;
            max-width: 500px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }
        .screen.active {
            display: flex;
        }

        .btn {
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s, background-color 0.2s;
            margin: 10px;
            width: 80%;
            max-width: 250px;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 3px rgba(0,0,0,0.2);
        }
        .btn-primary { background-color: #d35400; color: white; }
        .btn-secondary { background-color: #f39c12; color: white; }
        .btn-skip { background-color: #bdc3c7; color: #333; width: auto; padding: 8px 15px; font-size: 14px; position: absolute; top: 10px; right: 10px; }

        #title-logo {
            width: 100%;
            max-width: 350px;
            height: auto;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background-color: #ccc;
        }
        h1 {
            color: #d35400;
            font-size: 24px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        #tutorial-text-box {
            background-color: #fff;
            border: 3px solid #d35400;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            width: 90%;
            font-size: 16px;
            font-weight: bold;
            line-height: 1.8;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #tut-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            width: 180px;
            height: 180px;
            background-color: #8d6e63;
            padding: 5px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* ゲーム本編画面 - レイアウト変更 */
        #game-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        @media (min-width: 600px) {
            #game-layout {
                flex-direction: row;
                justify-content: space-around;
                align-items: flex-start;
                max-width: 800px;
            }
        }
        header { width: 100%; margin-bottom: 10px; flex-shrink: 0; }
        #top-image { max-width: 60px; height: auto; }
        h2 { color: #d35400; font-size: 18px; margin: 5px 0; }
        p#message { font-size: 14px; font-weight: bold; line-height: 1.6; margin-bottom: 10px; }
        
        #controls { display: flex; gap: 10px; margin-bottom: 10px; width: 100%; justify-content: center; }
        #controls .btn { width: auto; margin: 0; padding: 10px 15px; font-size: 14px; }

        .game-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }
        .board-container {
            width: 100%;
            max-width: 350px;
            aspect-ratio: 1 / 1;
            background-color: #8d6e63;
            padding: 5px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            width: 100%;
            height: 100%;
        }
        .cell {
            background-color: #d7ccc8;
            border: 2px solid #a1887f;
            border-radius: 4px;
            font-size: 6vw;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.2s, color 0.2s;
        }
        @media (min-width: 500px) { .cell { font-size: 30px; } }
        .cell.revealed {
            background-color: #efebe9;
            border: 1px solid #d7ccc8;
            cursor: default;
        }
        .bone-img { width: 80%; height: 80%; object-fit: contain; }

        /* 化石ディスプレイスペース */
        #fossil-display {
            width: 100%;
            max-width: 250px;
            background-color: #fff;
            border: 4px solid #8d6e63;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        #fossil-display img {
            width: 100%;
            height: auto;
            object-fit: contain;
            transition: transform 0.3s ease-out;
        }
        /* 化石が光る演出 */
        #fossil-display.flash img {
            transform: scale(1.1);
            filter: brightness(1.3) drop-shadow(0 0 10px #f1c40f);
        }
        #fossil-counter {
            font-size: 18px;
            font-weight: bold;
            color: #d35400;
            margin-top: 10px;
        }

        /* 復活シーンコンテナ */
        #revival-scene {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            z-index: 90;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        #revival-scene.active { display: flex; opacity: 1; }
        #revival-image {
            width: 100%;
            max-width: 400px;
            height: auto;
            opacity: 0;
            transition: opacity 2s ease-in-out, transform 0.5s ease;
        }
        #revival-image.show { opacity: 1; }
        
        /* 動画コンテナ */
        #video-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        video { width: 100%; height: auto; max-height: 85vh; object-fit: contain; }
        #close-video-btn { margin-top: 20px; }
        
        ruby rt { font-size: 10px; color: #555; }
    </style>
</head>
<body>

    <div id="screen-title" class="screen active">
        <img id="title-logo" src="img/title.png" alt="タイトル画像" onerror="this.style.display='none'">
        <h1>きょうりゅう<br><ruby>発掘<rt>はっくつ</rt></ruby>ゲーム</h1>
        <button class="btn btn-secondary" onclick="startTutorial()">あそびかた</button>
        <button class="btn btn-primary" onclick="startGame()">すぐにあそぶ</button>
    </div>

    <div id="screen-tutorial" class="screen">
        <button class="btn btn-skip" onclick="startGame()">スキップ ➡</button>
        <div id="tutorial-text-box">
            <span id="tut-text"></span>
        </div>
        <div id="tut-board">
            <div class="cell" id="tut-cell-0"></div><div class="cell" id="tut-cell-1"></div><div class="cell" id="tut-cell-2"></div>
            <div class="cell" id="tut-cell-3"></div><div class="cell" id="tut-cell-4"></div><div class="cell" id="tut-cell-5"></div>
            <div class="cell" id="tut-cell-6"></div><div class="cell" id="tut-cell-7"></div><div class="cell" id="tut-cell-8"></div>
        </div>
        <button id="tut-next-btn" class="btn btn-primary" onclick="nextTutorial()">つぎへ</button>
    </div>

    <div id="screen-game" class="screen">
        <div id="game-layout">
            <div id="fossil-display">
                <img id="large-fossil-img" src="img/tyrano_born.png" alt="大きな化石">
                <p id="fossil-counter"><ruby>見<rt>み</rt></ruby>つけたピース: 0 / 4</p>
            </div>
            
            <div class="game-main">
                <header>
                    <img id="top-image" src="img/tyrano.png" alt="アイコン">
                    <h2>きょうりゅう<ruby>発掘<rt>はっくつ</rt></ruby>ゲーム！</h2>
                    <p id="message"><ruby>数字<rt>すうじ</rt></ruby>は ヒントだよ。かくれている<br>４つの <ruby>化石<rt>かせき</rt></ruby>を ぜんぶみつけよう！</p>
                </header>
                <div id="controls">
                    <button id="reset-btn" class="btn btn-primary" onclick="initGame()">やりなおす</button>
                </div>
                <div class="board-container">
                    <div id="game-board"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="revival-scene">
        <img id="revival-image" src="img/tyrano.png" alt="復活したティラノサウルス">
    </div>

    <div id="video-container">
        <video id="win-video" playsinline>
            <source src="img/tyrano01.mp4" type="video/mp4">
        </video>
        <button id="close-video-btn" class="btn btn-primary" onclick="closeVideo()">とじる</button>
    </div>

    <script>
        // --- 画面切り替え ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // --- チュートリアル ---
        let tutStep = 0;
        const tutTextElement = document.getElementById('tut-text');
        
        const tutorialSteps = [
            {
                text: "土(つち)の 下(した)に ねむる<br><ruby>化石<rt>かせき</rt></ruby>を さがそう！",
                action: () => { resetTutBoard(); }
            },
            {
                text: "<ruby>土<rt>つち</rt></ruby>をほったら 『１』が でたよ。<br>これは ヒントだよ！",
                action: () => {
                    let c = document.getElementById('tut-cell-4');
                    c.classList.add('revealed');
                    c.style.color = '#0000FF';
                    c.textContent = '1';
                }
            },
            {
                text: "『１』の まわりの どこかに<br><ruby>化石<rt>かせき</rt></ruby>が １つあるよ。",
                action: () => {
                    for(let i=0; i<9; i++) {
                        if(i !== 4) document.getElementById('tut-cell-'+i).style.borderColor = '#e74c3c';
                    }
                }
            },
            {
                text: "あ！ここに <ruby>化石<rt>かせき</rt></ruby>があった！<br><ruby>大発見<rt>だいはっけん</rt></ruby>！",
                action: () => {
                    for(let i=0; i<9; i++) { document.getElementById('tut-cell-'+i).style.borderColor = '#a1887f'; }
                    let bomb = document.getElementById('tut-cell-0');
                    bomb.classList.add('revealed');
                    bomb.innerHTML = '<img src="img/tyrano_born.png" class="bone-img">';
                    bomb.style.backgroundColor = '#fff9c4'; // 発見した喜びの色
                }
            },
            {
                text: "４つの <ruby>化石<rt>かせき</rt></ruby>を ぜんぶあつめて<br>ティラノサウルスを 復活(ふっかつ)させよう！",
                action: () => { document.getElementById('tut-next-btn').textContent = "あそぶ！"; }
            }
        ];

        function startTutorial() {
            showScreen('screen-tutorial');
            tutStep = 0;
            document.getElementById('tut-next-btn').textContent = "つぎへ";
            playTutStep(tutStep);
        }

        function playTutStep(step) { tutTextElement.innerHTML = tutorialSteps[step].text; tutorialSteps[step].action(); }

        function nextTutorial() {
            tutStep++;
            if (tutStep >= tutorialSteps.length) { startGame(); } else { playTutStep(tutStep); }
        }

        function resetTutBoard() {
            for(let i=0; i<9; i++) {
                let c = document.getElementById('tut-cell-'+i);
                c.className = 'cell';
                c.innerHTML = '';
                c.style.borderColor = '#a1887f';
                c.style.backgroundColor = '#d7ccc8';
            }
        }

        // --- ゲーム本編 ---
        const ROWS = 5;
        const COLS = 5;
        const FOSSIL_COUNT = 4;
        let board = [];
        let fossilsFound = 0;
        let gameOver = false;

        const boardElement = document.getElementById('game-board');
        const fossilDisplay = document.getElementById('fossil-display');
        const fossilCounterElement = document.getElementById('fossil-counter');
        const revivalScene = document.getElementById('revival-scene');
        const revivalImage = document.getElementById('revival-image');
        const videoContainer = document.getElementById('video-container');
        const winVideo = document.getElementById('win-video');
        const messageElement = document.getElementById('message');

        function startGame() { showScreen('screen-game'); initGame(); }

        function initGame() {
            board = [];
            fossilsFound = 0;
            gameOver = false;

            videoContainer.style.display = 'none';
            revivalScene.classList.remove('active');
            revivalImage.classList.remove('show');
            winVideo.pause();
            winVideo.currentTime = 0;
            updateFossilCounter();
            boardElement.innerHTML = '';

            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    row.push({ isFossil: false, revealed: false, neighborFossils: 0 });
                }
                board.push(row);
            }

            let placedFossils = 0;
            while (placedFossils < FOSSIL_COUNT) {
                let r = Math.floor(Math.random() * ROWS);
                let c = Math.floor(Math.random() * COLS);
                if (!board[r][c].isFossil) {
                    board[r][c].isFossil = true;
                    placedFossils++;
                }
            }

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (!board[r][c].isFossil) {
                        let count = 0;
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                let nr = r + dr;
                                let nc = c + dc;
                                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc].isFossil) {
                                    count++;
                                }
                            }
                        }
                        board[r][c].neighborFossils = count;
                    }
                }
            }

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let cellDiv = document.createElement('div');
                    cellDiv.classList.add('cell');
                    cellDiv.dataset.r = r;
                    cellDiv.dataset.c = c;
                    cellDiv.addEventListener('click', () => handleCellClick(r, c));
                    boardElement.appendChild(cellDiv);
                }
            }
        }

        function handleCellClick(r, c) {
            if (gameOver || board[r][c].revealed) return;

            let cellData = board[r][c];
            cellData.revealed = true;

            let cellDiv = boardElement.children[r * COLS + c];
            cellDiv.classList.add('revealed');

            if (cellData.isFossil) {
                // 化石を発見！
                fossilsFound++;
                cellDiv.innerHTML = '<img src="img/tyrano_born.png" class="bone-img" alt="化石">';
                cellDiv.style.backgroundColor = '#fff9c4';
                flashFossilDisplay();
                updateFossilCounter();
                
                checkWin();
            } else {
                if (cellData.neighborFossils > 0) {
                    const colors = ["", "#0000FF", "#008000", "#FF0000", "#800080", "#800000", "#40E0D0", "#000000", "#808080"];
                    cellDiv.style.color = colors[cellData.neighborFossils];
                    cellDiv.textContent = cellData.neighborFossils;
                } else {
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            let nr = r + dr;
                            let nc = c + dc;
                            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                                handleCellClick(nr, nc);
                            }
                        }
                    }
                }
            }
        }

        // 化石ディスプレイスペースを光らせる演出
        function flashFossilDisplay() {
            fossilDisplay.classList.add('flash');
            setTimeout(() => fossilDisplay.classList.remove('flash'), 300);
        }

        function updateFossilCounter() {
            fossilCounterElement.innerHTML = `<ruby>見<rt>み</rt></ruby>つけたピース: ${fossilsFound} / ${FOSSIL_COUNT}`;
        }

        // 勝利判定
        function checkWin() {
            if (fossilsFound === FOSSIL_COUNT) {
                gameOver = true;
                
                // 1.5秒待ってから復活シーンを開始
                setTimeout(startRevivalSequence, 1500);
            }
        }

        // 復活シーケンス
        function startRevivalSequence() {
            revivalScene.classList.add('active'); // 黒画面フェードイン
            
            setTimeout(() => {
                revivalImage.classList.add('show'); // 本体画像ふんわり表示
            }, 1000);

            // 本体画像が表示されて2秒後に、ガオー！と動画へ
            setTimeout(() => {
                // ちょっと振動させる演出
                revivalImage.style.transform = "scale(1.1) rotate(5deg)";
                setTimeout(() => revivalImage.style.transform = "scale(1) rotate(0deg)", 200);

                setTimeout(() => {
                    videoContainer.style.display = 'flex';
                    revivalScene.classList.remove('active'); // 復活シーンは消す
                    winVideo.muted = true;
                    winVideo.play().then(() => winVideo.muted = false)
                                  .catch(error => { winVideo.muted = false; winVideo.controls = true; });
                }, 500);

            }, 3000);
        }

        function closeVideo() {
            winVideo.pause();
            winVideo.muted = false;
            videoContainer.style.display = 'none';
            initGame();
        }
    </script>
</body>
</html>
