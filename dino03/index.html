<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ちびっこティラノ：タクティクス (v3.0.0)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: sans-serif; touch-action: none; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        /* 邪魔にならない折りたたみ式カメラUI */
        #camera-ui {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0, 0, 139, 0.85); border: 2px solid white; border-radius: 10px;
            color: white; padding: 10px; width: 220px;
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        #camera-ui.collapsed { transform: translateY(calc(100% - 40px)); }
        #ui-header { font-weight: bold; text-align: center; cursor: pointer; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.3); margin-bottom: 10px;}
        .ui-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; text-align: center; }
        .ui-btn { background: #eee; border: none; border-radius: 5px; padding: 10px 5px; font-weight: bold; cursor: pointer; box-shadow: 0 2px #999; }
        .ui-btn:active { transform: translateY(2px); box-shadow: 0 0 #999; }
        
        /* メッセージ用UI */
        #msg-ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 10px 20px;
            border-radius: 10px; border: 2px solid white; font-size: 1.1rem; pointer-events: none;
        }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

<div id="canvas-container"></div>

<div id="msg-ui">緑のマス（6歩以内）をタップ！</div>

<div id="camera-ui">
    <div id="ui-header" onclick="toggleUI()">📷 カメラ操作 (開閉)</div>
    <div class="ui-grid">
        <div></div><button class="ui-btn" onclick="panCamera(0, -1)">上</button><div></div>
        <button class="ui-btn" onclick="panCamera(-1, 0)">左</button>
        <button class="ui-btn" onclick="centerCamera()">中心</button>
        <button class="ui-btn" onclick="panCamera(1, 0)">右</button>
        <div></div><button class="ui-btn" onclick="panCamera(0, 1)">下</button><div></div>
    </div>
    <div class="ui-grid" style="margin-top: 10px; grid-template-columns: 1fr 1fr;">
        <button class="ui-btn" onclick="zoomCamera(-50)">＋ 寄る</button>
        <button class="ui-btn" onclick="zoomCamera(50)">－ 引く</button>
    </div>
</div>

<script>
// --- 設定・グローバル変数 ---
const MAP_W = 20;
const MAP_D = 40;
const TILE_SIZE = 60;
const H_STEP = 30;
const MAX_MOVE = 6;  // 移動可能距離
const MAX_JUMP = 2;  // 登り降りできる最大段差

let scene, camera, renderer, controls, dinoSprite;
let mapData = []; // [z][x] = { h, type }
let tilesMeshMap = {}; // "x,z" -> mesh
let walkableTiles = [];
let dinoPos = { x: 10, z: 20, h: 0 }; // 初期位置
let isMoving = false;

const sheetImg = new Image();
sheetImg.src = 'img/plate01.png';
sheetImg.onload = init;

// UIの開閉
function toggleUI() {
    document.getElementById('camera-ui').classList.toggle('collapsed');
}

// --- マップ生成（なだらかな段差を作るアルゴリズム） ---
function generateMapData() {
    for (let z = 0; z < MAP_D; z++) {
        mapData[z] = [];
        for (let x = 0; x < MAP_W; x++) {
            // 中心が高い山のような地形をざっくり生成
            const distFromCenter = Math.sqrt(Math.pow(x - 10, 2) + Math.pow(z - 20, 2));
            let h = Math.max(1, Math.floor(8 - (distFromCenter * 0.4) + (Math.random() * 2)));
            let type = (h >= 6) ? 3 : (h >= 4) ? 2 : (h >= 2) ? 1 : 0; // 高さに応じてテクスチャ変更
            mapData[z][x] = { h, type };
        }
    }
    dinoPos.h = mapData[dinoPos.z][dinoPos.x].h;
}

// --- Three.js 初期化 ---
function init() {
    const container = document.getElementById('canvas-container');
    const w = container.clientWidth; const h = container.clientHeight;

    scene = new THREE.Scene();
    generateMapData();

    // 平行投影カメラ
    const aspect = w / h;
    const d = 500;
    camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 4000);
    
    renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(w, h);
    renderer.setClearColor(0x1a1a1a);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(500, 1000, 500);
    scene.add(dirLight);

    buildMapMeshes();

    // 恐竜スプライト
    const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d'); ctx.font = '100px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('🦖', 64, 64);
    dinoSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
    dinoSprite.scale.set(TILE_SIZE * 1.5, TILE_SIZE * 1.5, 1);
    scene.add(dinoSprite);
    updateDinoPosInstantly();

    // カメラコントロール (OrbitControls)
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableRotate = true;
    controls.enableZoom = true;
    controls.enablePan = true;
    
    // カメラの初期位置（ティラノにフォーカス）
    centerCamera();

    renderer.domElement.addEventListener('pointerdown', onPointerDown);
    
    // 初回の移動可能範囲ハイライト
    highlightWalkable();

    animate();
}

function createMaterial(tx, ty, tw, th) {
    const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64;
    const ctx = canvas.getContext('2d'); ctx.drawImage(sheetImg, tx, ty, tw, th, 0, 0, 64, 64);
    const tex = new THREE.CanvasTexture(canvas); tex.magFilter = THREE.NearestFilter;
    return new THREE.MeshLambertMaterial({ map: tex });
}

// --- マップメッシュ構築 ---
const interactableTiles = [];
function buildMapMeshes() {
    const geometry = new THREE.BoxGeometry(TILE_SIZE, H_STEP, TILE_SIZE);
    const matSets = [];
    for(let type=0; type<4; type++) {
        const tx = type * 256;
        matSets.push({
            top: createMaterial(tx, 0, 256, 256),
            sideTop: createMaterial(tx, 256, 256, 64),
            sideBottom: createMaterial(tx, 320, 256, 64)
        });
    }

    const offsetX = (MAP_W * TILE_SIZE) / 2;
    const offsetZ = (MAP_D * TILE_SIZE) / 2;

    for (let z = 0; z < MAP_D; z++) {
        for (let x = 0; x < MAP_W; x++) {
            const tileData = mapData[z][x];
            const mats = matSets[tileData.type];
            const h = tileData.h;

            // 負荷軽減：最上段と、その下1段（土台）だけを描画
            for (let i = Math.max(0, h - 2); i < h; i++) {
                let blockMats = (i === h - 1) 
                    ? [mats.sideTop, mats.sideTop, mats.top, mats.sideBottom, mats.sideTop, mats.sideTop]
                    : [mats.sideBottom, mats.sideBottom, mats.sideBottom, mats.sideBottom, mats.sideBottom, mats.sideBottom];

                const cube = new THREE.Mesh(geometry, blockMats);
                cube.position.set((x * TILE_SIZE) - offsetX, (i * H_STEP) + (H_STEP / 2), (z * TILE_SIZE) - offsetZ);
                scene.add(cube);

                if (i === h - 1) {
                    cube.userData = { x, z, h };
                    interactableTiles.push(cube);
                    tilesMeshMap[`${x},${z}`] = cube;
                }
            }
        }
    }
}

// --- 高低差対応の経路探索アルゴリズム (BFS) ---
function getWalkableNodes(startX, startZ) {
    let queue = [{ x: startX, z: startZ, dist: 0, path: [] }];
    let visited = new Set([`${startX},${startZ}`]);
    let walkable = [];

    const dirs = [[0,1], [1,0], [0,-1], [-1,0]];

    while(queue.length > 0) {
        let curr = queue.shift();
        if(curr.dist > 0) walkable.push(curr);

        if(curr.dist >= MAX_MOVE) continue;

        let currH = mapData[curr.z][curr.x].h;

        for(let d of dirs) {
            let nx = curr.x + d[0];
            let nz = curr.z + d[1];
            let key = `${nx},${nz}`;

            if(nx >= 0 && nx < MAP_W && nz >= 0 && nz < MAP_D && !visited.has(key)) {
                let nextH = mapData[nz][nx].h;
                // 段差制限のチェック (2段までOK)
                if(Math.abs(currH - nextH) <= MAX_JUMP) {
                    visited.add(key);
                    queue.push({ x: nx, z: nz, dist: curr.dist + 1, path: [...curr.path, {x: nx, z: nz, h: nextH}] });
                }
            }
        }
    }
    return walkable;
}

// --- ハイライト処理 ---
function highlightWalkable() {
    // リセット
    interactableTiles.forEach(t => t.material[2].color.setHex(0xffffff));
    walkableTiles = getWalkableNodes(dinoPos.x, dinoPos.z);
    
    // 移動可能マスを緑色にハイライト
    walkableTiles.forEach(node => {
        let mesh = tilesMeshMap[`${node.x},${node.z}`];
        if(mesh) mesh.material[2].color.setHex(0x88ff88);
    });
}

// --- タップ移動処理 (GSAPアニメーション) ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onPointerDown(event) {
    if (isMoving) return;
    
    // UIクリック時は反応しない
    if(event.target.closest('#camera-ui')) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    const intersects = raycaster.intersectObjects(interactableTiles);
    if (intersects.length > 0) {
        const target = intersects[0].object.userData;
        
        // 移動可能範囲かチェック
        const route = walkableTiles.find(n => n.x === target.x && n.z === target.z);
        if (route) {
            executeMovement(route.path);
        }
    }
}

// --- GSAPを使った1マスずつのジャンプ移動 ---
function executeMovement(path) {
    isMoving = true;
    interactableTiles.forEach(t => t.material[2].color.setHex(0xffffff)); // ハイライト消去

    const offsetX = (MAP_W * TILE_SIZE) / 2;
    const offsetZ = (MAP_D * TILE_SIZE) / 2;
    
    // GSAPタイムラインを作成（順番にアニメーション）
    const tl = gsap.timeline({
        onComplete: () => {
            isMoving = false;
            // 移動後に新しくハイライト
            highlightWalkable();
        }
    });

    path.forEach((step, index) => {
        const targetX = (step.x * TILE_SIZE) - offsetX;
        const targetZ = (step.z * TILE_SIZE) - offsetZ;
        const targetY = (step.h * H_STEP) + (TILE_SIZE * 0.5);

        // 1マスのジャンプアニメーション
        tl.to(dinoSprite.position, {
            x: targetX, z: targetZ, duration: 0.25, ease: "power1.inOut",
            onUpdate: () => {
                // カメラもティラノを追従
                controls.target.copy(dinoSprite.position);
            }
        }, "+=0"); // すぐ次へ

        // 同時にY軸をピョンと跳ねさせる
        tl.to(dinoSprite.position, {
            y: Math.max(dinoSprite.position.y, targetY) + 30, // ジャンプの高さ
            duration: 0.125, ease: "power1.out", yoyo: true, repeat: 1
        }, "<"); // X,Z移動と同時開始
        
        // 着地地点のYを最終的に合わせる
        tl.set(dinoSprite.position, { y: targetY });
    });

    // 最終位置を更新
    const finalStep = path[path.length - 1];
    dinoPos = { x: finalStep.x, z: finalStep.z, h: finalStep.h };
}

function updateDinoPosInstantly() {
    const offsetX = (MAP_W * TILE_SIZE) / 2;
    const offsetZ = (MAP_D * TILE_SIZE) / 2;
    dinoSprite.position.set(
        (dinoPos.x * TILE_SIZE) - offsetX,
        (dinoPos.h * H_STEP) + (TILE_SIZE * 0.5),
        (dinoPos.z * TILE_SIZE) - offsetZ
    );
}

// --- カメラ操作関数 (UIボタン用・GSAPで滑らかに) ---
function centerCamera() {
    const rad = 45 * (Math.PI / 180);
    const radius = 800;
    
    // コントロールのターゲットをティラノに合わせる
    gsap.to(controls.target, { x: dinoSprite.position.x, y: dinoSprite.position.y, z: dinoSprite.position.z, duration: 1 });
    
    // カメラ位置を斜め上に
    gsap.to(camera.position, {
        x: dinoSprite.position.x + Math.sin(rad) * radius,
        y: dinoSprite.position.y + 600,
        z: dinoSprite.position.z + Math.cos(rad) * radius,
        duration: 1, ease: "power2.out"
    });
}

function panCamera(dx, dy) {
    const panAmount = 150;
    // 斜め見下ろしの座標系に合わせてパン方向を計算
    gsap.to(camera.position, {
        x: camera.position.x + (dx * panAmount) + (dy * panAmount),
        z: camera.position.z + (dy * panAmount) - (dx * panAmount),
        duration: 0.3
    });
    gsap.to(controls.target, {
        x: controls.target.x + (dx * panAmount) + (dy * panAmount),
        z: controls.target.z + (dy * panAmount) - (dx * panAmount),
        duration: 0.3
    });
}

function zoomCamera(amount) {
    camera.zoom = Math.max(0.5, camera.zoom + (amount > 0 ? -0.2 : 0.2));
    camera.updateProjectionMatrix();
}

function animate() {
    requestAnimationFrame(animate);
    controls.update(); // 慣性等の計算
    renderer.render(scene, camera);
}
</script>
</body>
</html>
