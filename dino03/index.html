<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ちびっこティラノ：タクティクス (v8.15.1)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        #error-log { position: fixed; top: 0; left: 0; width: 100%; background: #ff0000; color: #fff; z-index: 10000; font-family: monospace; padding: 15px; display: none; white-space: pre-wrap; font-weight: bold; border-bottom: 5px solid #fff; }
    </style>
</head>
<body>
<div id="error-log"></div>
<div id="loading-screen"><div class="loader-text">Now Loading...</div></div>
<div id="version-display">v8.15.1 (Fixed Scenario Path)</div>

<div id="canvas-container"></div>
<div id="msg-ui" class="rpg-window"></div>
<div id="event-ui" class="rpg-window">
    <div class="ev-left"><div id="ev-portrait"></div><div id="ev-name-plate"></div></div>
    <div class="ev-right"><div id="ev-text-area"><p id="ev-text"></p></div><div id="ev-click-hint">▲</div></div>
</div>

<div id="status-ui" class="rpg-window">
    <div id="st-name" class="unit-name"></div>
    <div class="stat-row" style="border:none; margin-bottom:0;"><span>🌟 Lv</span><span id="st-lv"></span></div>
    <div style="font-size:0.8rem;"><ruby>体力<rt>たいりょく</rt></ruby> (HP): <span id="st-hp"></span></div>
    <div class="bar-bg"><div id="st-hp-bar" class="hp-bar"></div></div>
    <div style="font-size:0.8rem;"><ruby>恐竜力<rt>きょうりゅうりょく</rt></ruby> (MP): <span id="st-mp"></span></div>
    <div class="bar-bg"><div id="st-mp-bar" class="mp-bar"></div></div>
    <button class="btn-detail" id="btn-toggle-detail"><ruby>詳細<rt>しょうさい</rt></ruby>を見る ▼</button>
</div>

<div id="detail-ui" class="rpg-window">
    <div class="unit-name"><ruby>能力値<rt>のうりょくち</rt></ruby></div>
    <div class="stat-row"><span>💪 <ruby>力<rt>ちから</rt></ruby></span><span id="dt-str"></span></div>
    <div class="stat-row"><span>🛡️ <ruby>防御<rt>ぼうぎょ</rt></ruby></span><span id="dt-def"></span></div>
    <div class="stat-row"><span>👟 <ruby>速度<rt>そくど</rt></ruby></span><span id="dt-spd"></span></div>
    <div class="stat-row"><span>✨ <ruby>恐竜力<rt>きょうりゅうりょく</rt></ruby></span><span id="dt-mag"></span></div>
</div>

<div id="command-ui" class="rpg-window">
    <button id="cmd-move" class="cmd-btn">🚶 <ruby>移動<rt>いどう</rt></ruby></button>
    <button id="cmd-attack" class="cmd-btn">⚔️ <ruby>攻撃<rt>こうげき</rt></ruby></button>
    <button id="cmd-wait" class="cmd-btn">⏳ <ruby>待機<rt>たいき</rt></ruby></button>
    <button id="cmd-cancel" class="cmd-btn" style="color:#ff8888; border-top:1px dashed #555;">↩ <ruby>戻<rt>もど</rt></ruby>る</button>
</div>

<div id="target-ui" class="rpg-window">
    <div id="target-list"></div>
    <button class="cmd-btn" id="btn-cancel-attack">❌ キャンセル</button>
</div>

<div id="confirm-ui" class="rpg-window">
    <p id="confirm-text"></p>
    <div class="confirm-btns"><button class="btn-yes">はい</button><button class="btn-no">いいえ</button></div>
</div>

<div id="camera-ui" class="rpg-window collapsed">
    <div id="ui-header">📷 カメラ操作</div>
    <div class="ui-grid">
        <button class="ui-btn" data-cam="rotate-left">◀</button><button class="ui-btn" data-cam="pan-up">▲</button><button class="ui-btn" data-cam="rotate-right">▶</button>
        <button class="ui-btn" data-cam="pan-left">◀</button><button class="ui-btn" data-cam="center">●</button><button class="ui-btn" data-cam="pan-right">▶</button>
        <button class="ui-btn" data-cam="zoom-in">＋</button><button class="ui-btn" data-cam="pan-down">▼</button><button class="ui-btn" data-cam="zoom-out">ー</button>
    </div>
</div>

<div id="stage-overlay" class="big-text-overlay">
    <div id="chapter-num" class="cool-text"></div>
    <div id="stage-title" class="cool-text"></div>
</div>
<div id="battle-start-overlay" class="big-text-overlay"><div class="battle-text">BATTLE START！</div></div>
<div id="episode-clear-overlay" class="big-text-overlay"><div class="clear-text">第1話 クリア</div></div>

<script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
        const log = document.getElementById('error-log');
        log.style.display = 'block';
        log.innerHTML = `【致命的エラー】\n内容: ${msg}\n場所: ${url}\n\n※「data/stage01.js」がないか、キャッシュが古い可能性があります。`;
        return false;
    };
</script>
<script type="module" src="main.js?v=8151"></script>
</body>
</html>
