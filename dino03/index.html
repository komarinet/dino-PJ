<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ちびっこティラノ：タクティクス (v8.15.4)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

<div id="boot-screen" style="position:fixed; inset:0; background:#111; color:#fff; z-index:20000; padding:20px; font-family:monospace; display:flex; flex-direction:column;">
    <h2 style="color:#0f0; border-bottom:1px solid #333;">SYSTEM DIAGNOSTICS</h2>
    <div id="ver-list" style="flex:1; overflow-y:auto; margin:10px 0; font-size:14px; line-height:1.6;"></div>
    <div style="display:flex; gap:10px;">
        <button id="btn-clear-data" style="flex:1; padding:15px; background:#444; color:#fff; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">データオールクリア</button>
        <button id="btn-start-game" style="flex:1; padding:15px; background:#0066cc; color:#fff; border:none; border-radius:4px; font-weight:bold; display:none; cursor:pointer;">続ける</button>
    </div>
</div>

<div id="error-log" style="position:fixed; top:0; left:0; width:100%; background:#f00; color:#fff; z-index:30000; padding:10px; display:none; white-space:pre-wrap;"></div>
<div id="loading-screen" style="display:none;"><div class="loader-text">Now Loading...</div></div>
<div id="version-display">v8.15.4 (Loose Version Check)</div>

<div id="canvas-container"></div>
<div id="msg-ui" class="rpg-window"></div>
<div id="event-ui" class="rpg-window">
    <div class="ev-left"><div id="ev-portrait"></div><div id="ev-name-plate"></div></div>
    <div class="ev-right"><div id="ev-text-area"><p id="ev-text"></p></div><div id="ev-click-hint">▲</div></div>
</div>

<div id="status-ui" class="rpg-window">
    <div id="st-name" class="unit-name"></div>
    <div class="stat-row"><span>🌟 Lv</span><span id="st-lv"></span></div>
    <div style="font-size:0.8rem;">体力 (HP): <span id="st-hp"></span></div>
    <div class="bar-bg"><div id="st-hp-bar" class="hp-bar"></div></div>
    <button class="btn-detail" id="btn-toggle-detail">詳細表示 ▼</button>
</div>

<div id="detail-ui" class="rpg-window">
    <div class="unit-name">能力値</div>
    <div id="detail-stats"></div>
</div>

<div id="command-ui" class="rpg-window">
    <button id="cmd-move" class="cmd-btn">🚶 移動</button>
    <button id="cmd-attack" class="cmd-btn">⚔️ 攻撃</button>
    <button id="cmd-wait" class="cmd-btn">⏳ 待機</button>
    <button id="cmd-cancel" class="cmd-btn" style="color:#ff8888;">↩ 戻る</button>
</div>

<div id="target-ui" class="rpg-window">
    <div id="target-list"></div>
    <button class="cmd-btn" id="btn-cancel-attack">❌ キャンセル</button>
</div>

<div id="confirm-ui" class="rpg-window">
    <p id="confirm-text"></p>
    <div class="confirm-btns"><button class="btn-yes">はい</button><button class="btn-no">いいえ</button></div>
</div>

<div id="camera-ui" class="rpg-window collapsed">
    <div id="ui-header">📷 カメラ操作</div>
    <div class="ui-grid">
        <button class="ui-btn" data-cam="rotate-left">◀</button><button class="ui-btn" data-cam="pan-up">▲</button><button class="ui-btn" data-cam="rotate-right">▶</button>
        <button class="ui-btn" data-cam="pan-left">◀</button><button class="ui-btn" data-cam="center">●</button><button class="ui-btn" data-cam="pan-right">▶</button>
        <button class="ui-btn" data-cam="zoom-in">＋</button><button class="ui-btn" data-cam="pan-down">▼</button><button class="ui-btn" data-cam="zoom-out">ー</button>
    </div>
</div>

<div id="stage-overlay" class="big-text-overlay">
    <div id="chapter-num" class="cool-text"></div>
    <div id="stage-title" class="cool-text"></div>
</div>
<div id="battle-start-overlay" class="big-text-overlay"><div class="battle-text">BATTLE START！</div></div>
<div id="episode-clear-overlay" class="big-text-overlay"><div class="clear-text">第1話 クリア</div></div>

<script type="module" src="main.js?v=8154"></script>
</body>
</html>
