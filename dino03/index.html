<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ちびっこティラノ：タクティクス (v6.0.0 ベースキャンプ)</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

<div id="canvas-container"></div>

<div id="msg-ui" class="rpg-window">マップを読み込み中...</div>

<div id="status-ui" class="rpg-window">
    <div id="st-name" class="unit-name">🦖 ティラノ</div>
    <div style="font-size:0.9rem;">HP: <span id="st-hp">30/30</span></div>
    <div class="bar-bg"><div id="st-hp-bar" class="hp-bar" style="width:100%"></div></div>
    <div style="font-size:0.9rem;">MP: <span id="st-mp">10/10</span></div>
    <div class="bar-bg"><div id="st-mp-bar" class="mp-bar" style="width:100%"></div></div>
    <button class="btn-detail" onclick="toggleDetail()">詳細を見る ▼</button>
</div>

<div id="detail-ui" class="rpg-window">
    <div class="unit-name">パラメータ</div>
    <div class="stat-row"><span>💪 力</span><span id="dt-str">15</span></div>
    <div class="stat-row"><span>🛡️ 防御</span><span id="dt-def">10</span></div>
    <div class="stat-row"><span>👟 速度</span><span id="dt-spd">5</span></div>
    <div class="stat-row"><span>✨ 恐竜力</span><span id="dt-mag">8</span></div>
</div>

<div id="command-ui" class="rpg-window">
    <button id="cmd-move" class="cmd-btn" onclick="execCommand('move')">🚶 移動</button>
    <button id="cmd-attack" class="cmd-btn" onclick="execCommand('attack')">⚔️ 攻撃</button>
    <button id="cmd-wait" class="cmd-btn" onclick="execCommand('wait')">⏳ 待機</button>
</div>

<div id="confirm-ui" class="rpg-window">
    <p id="confirm-text">行動しますか？</p>
    <div class="confirm-btns">
        <button class="btn-yes" onclick="answerConfirm(true)">はい</button>
        <button class="btn-no" onclick="answerConfirm(false)">いいえ</button>
    </div>
</div>

<div id="camera-ui" class="rpg-window collapsed">
    <div id="ui-header" onclick="document.getElementById('camera-ui').classList.toggle('collapsed');">📷 カメラ操作</div>
    <div class="ui-grid">
        <button class="ui-btn" onclick="rotateCam(-90)">◀ 回す</button>
        <button class="ui-btn" onclick="panCamera(0, -1)">上</button>
        <button class="ui-btn" onclick="rotateCam(90)">回す ▶</button>
        <button class="ui-btn" onclick="panCamera(-1, 0)">左</button>
        <button class="ui-btn" onclick="centerCamera()">中心</button>
        <button class="ui-btn" onclick="panCamera(1, 0)">右</button>
        <button class="ui-btn" onclick="zoomCamera(-50)">＋ 寄る</button>
        <button class="ui-btn" onclick="panCamera(0, 1)">下</button>
        <button class="ui-btn" onclick="zoomCamera(50)">－ 引く</button>
    </div>
</div>

<script src="units.js"></script>
<script src="map.js"></script>
<script src="main.js"></script>

</body>
</html>
