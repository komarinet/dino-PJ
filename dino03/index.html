<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ちびっこティラノ：Three.js版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; }
        canvas { display: block; }
    </style>
</head>
<body>

<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.156.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.156.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
// マウスでカメラを回せるようにするライブラリ
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ==========================================
// 1. 基礎設定（シーン、カメラ、レンダラー）
// ==========================================

// 1.1 シーン（舞台）
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);

// 1.2 カメラ（平行投影：タクティクスオウガ風）
const aspect = window.innerWidth / window.innerHeight;
const d = 5; // カメラの表示範囲の広さ
const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);

// カメラの位置と向き（斜め上から見下ろす）
camera.position.set(20, 20, 20); 
camera.lookAt(0, 0, 0); // 中心を見る

// 1.3 レンダラー（描画実行）
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true; // 影を有効にする
document.body.appendChild(renderer.domElement);

// マウス操作を有効にする
const controls = new OrbitControls(camera, renderer.domElement);

// ==========================================
// 2. 照明（ライト）
// ==========================================
const ambientLight = new THREE.AmbientLight(0xffxffx, 0.6); // 全体を明るく
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0); // 太陽光のような光
directionalLight.position.set(10, 20, 10);
directionalLight.castShadow = true; // 影を落とす
scene.add(directionalLight);

// ==========================================
// 3. マップ生成 (mapData から)
// ==========================================

// 元の mapData
const mapData = [
    [1, 2, 3, 4, 5, 6, 7],
    [2, 3, 4, 5, 6, 7, 6],
    [3, 4, 5, 6, 7, 6, 5],
    [4, 5, 6, 8, 6, 5, 4],
    [5, 6, 7, 6, 5, 4, 3],
    [6, 7, 6, 5, 4, 3, 2],
    [7, 6, 5, 4, 3, 2, 1]
];

const tileSize = 1;
const heightStep = 0.5; // 1段の高さ

// テクスチャ読み込み（今回は仮の色。画像があればここを書き換える）
// const textureLoader = new THREE.TextureLoader();
// const mapTexture = textureLoader.load('img/plate01.png');

for (let y = 0; y < mapData.length; y++) {
    for (let x = 0; x < mapData[y].length; x++) {
        const height = mapData[y][x] * heightStep;

        // 【Three.js のポイント】
        // 幾何学（形）と材質（テクスチャ）を定義する

        // 立方体の形を作る (幅, 高さ, 奥行き)
        const geometry = new THREE.BoxGeometry(tileSize, height, tileSize);

        // 材質を作る（色や影の設定）
        const material = new THREE.MeshStandardMaterial({
            color: new THREE.Color(`hsl(120, 40%, ${30 + mapData[y][x] * 5}%)`), // 高さで色を変える
            // map: mapTexture, // 画像を使う場合はここをコメント解除
        });

        // 3Dオブジェクト（メッシュ）を作成
        const box = new THREE.Mesh(geometry, material);

        // 位置を設定（デフォルトの中心が(0,0,0)なので、地面に接するように調整）
        box.position.x = x * tileSize - (mapData[y].length * tileSize) / 2;
        box.position.y = height / 2; // 地面から浮かせる
        box.position.z = y * tileSize - (mapData.length * tileSize) / 2;

        box.castShadow = true; // 影を落とす
        box.receiveShadow = true; // 影を受け止める

        scene.add(box); // シーンに追加
    }
}

// ==========================================
// 4. キャラクター（仮）
// ==========================================
const unitGeometry = new THREE.SphereGeometry(0.4, 32, 32);
const unitMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
const unit = new THREE.Mesh(unitGeometry, unitMaterial);
unit.position.set(0, mapData[3][3] * heightStep + 0.4, 0); // マップ中央の高さに配置
unit.castShadow = true;
scene.add(unit);


// ==========================================
// 5. アニメーション（描画ループ）
// ==========================================
function animate() {
    requestAnimationFrame(animate);
    controls.update(); // マウス操作の更新
    renderer.render(scene, camera); // 描画
}
animate();

// 画面サイズが変わったときの調整
window.addEventListener('resize', onWindowResize, false);
function onWindowResize() {
    const aspect = window.innerWidth / window.innerHeight;
    camera.left = -d * aspect;
    camera.right = d * aspect;
    camera.top = d;
    camera.bottom = -d;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

</script>
</body>
</html>
