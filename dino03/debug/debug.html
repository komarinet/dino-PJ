<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage Viewer | dino3</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #58a6ff; --text: #c9d1d9; --border: #30363d; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: var(--panel); padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .main { flex: 1; position: relative; overflow: hidden; cursor: grab; }
        .main:active { cursor: grabbing; }

        /* サイドバー：情報表示 */
        .info-panel {
            position: absolute; top: 20px; right: 20px; width: 240px;
            background: rgba(22, 27, 34, 0.9); border: 1px solid var(--border);
            padding: 15px; border-radius: 8px; pointer-events: none;
        }
        .legend { font-size: 12px; margin-top: 10px; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }

        .controls { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px; }
        button { background: var(--panel); color: white; border: 1px solid var(--border); padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #21262d; }

        canvas { display: block; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold;">dino3 ステージビューア</div>
    <div>
        <input type="file" id="mapLoader" style="display:none;">
        <button onclick="document.getElementById('mapLoader').click()">データ読込</button>
    </div>
</header>

<div class="main" id="viewport">
    <canvas id="mapCanvas"></canvas>
    
    <div class="info-panel">
        <h4 style="margin:0 0 10px 0; font-size:14px; color:var(--accent);">ステージ情報</h4>
        <div id="stageStats" style="font-size:12px;">データ未読込</div>
        <hr style="border:0; border-top:1px solid var(--border); margin:10px 0;">
        <div class="legend">
            <div class="legend-item"><span class="dot" style="background:#f00;"></span> 敵 (Enemy)</div>
            <div class="legend-item"><span class="dot" style="background:#ff0;"></span> アイテム (Item)</div>
            <div class="legend-item"><span class="dot" style="background:#0f0;"></span> 中間地点 (Point)</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="adjustZoom(0.1)">＋</button>
        <button onclick="adjustZoom(-0.1)">－</button>
        <button onclick="resetView()">リセット</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    const viewport = document.getElementById('viewport');

    let mapData = {
        width: 100, height: 20, // タイル単位
        tileSize: 32,
        layers: [], // 地形データ
        enemies: [] // 敵データ [{x, y, type}]
    };

    let scale = 1.0;
    let offsetX = 0;
    let offsetY = 0;

    // 仮のダミーデータ生成（dino3のデータ構造に合わせて後で書き換えます）
    function createDummyData() {
        mapData.layers = Array(mapData.width * mapData.height).fill(0).map(() => Math.random() > 0.8 ? 1 : 0);
        mapData.enemies = [
            {x: 5, y: 15, type: 'dino'}, {x: 20, y: 12, type: 'bird'},
            {x: 45, y: 15, type: 'boss'}, {x: 80, y: 10, type: 'dino'}
        ];
        render();
    }

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        const tw = mapData.tileSize;

        // 1. 地形の描画
        ctx.fillStyle = "#21262d";
        for (let y = 0; y < mapData.height; y++) {
            for (let x = 0; x < mapData.width; x++) {
                if (mapData.layers[y * mapData.width + x] === 1) {
                    ctx.fillRect(x * tw, y * tw, tw - 1, tw - 1);
                }
            }
        }

        // 2. グリッドの描画 (薄く)
        ctx.strokeStyle = "rgba(48, 54, 61, 0.5)";
        ctx.beginPath();
        for (let x = 0; i <= mapData.width; i++) {
            ctx.moveTo(i * tw, 0); ctx.lineTo(i * tw, mapData.height * tw);
        }
        for (let j = 0; j <= mapData.height; j++) {
            ctx.moveTo(0, j * tw); ctx.lineTo(mapData.width * tw, j * tw);
        }
        ctx.stroke();

        // 3. 敵の描画
        mapData.enemies.forEach(en => {
            ctx.fillStyle = "#f00";
            ctx.beginPath();
            ctx.arc(en.x * tw + tw/2, en.y * tw + tw/2, tw/3, 0, Math.PI * 2);
            ctx.fill();
        });

        ctx.restore();

        document.getElementById('stageStats').innerHTML = `
            サイズ: ${mapData.width} x ${mapData.height}<br>
            敵の数: ${mapData.enemies.length}<br>
            総距離: ${mapData.width * mapData.tileSize} px
        `;
    }

    // 操作系
    let isDragging = false;
    let startX, startY;

    viewport.onmousedown = (e) => { isDragging = true; startX = e.clientX - offsetX; startY = e.clientY - offsetY; };
    window.onmousemove = (e) => {
        if (!isDragging) return;
        offsetX = e.clientX - startX;
        offsetY = e.clientY - startY;
        render();
    };
    window.onmouseup = () => isDragging = false;
    viewport.onwheel = (e) => {
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        scale *= delta;
        render();
    };

    function adjustZoom(val) { scale += val; render(); }
    function resetView() { scale = 1.0; offsetX = 50; offsetY = 100; render(); }

    window.onresize = render;
    resetView();
    createDummyData();

</script>
</body>
</html>
