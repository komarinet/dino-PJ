<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Dino3 Map & Enemy Debugger</title>
    <style>
        body { background: #333; color: white; font-family: sans-serif; }
        canvas { border: 2px solid #fff; background: #000; }
        .controls { margin-bottom: 10px; padding: 10px; background: #444; }
    </style>
</head>
<body>
    <div class="controls">
        <label>Stage Select: </label>
        <select id="stageSelect" onchange="drawDebug()"></select>
        <span id="info"></span>
    </div>
    <canvas id="debugCanvas"></canvas>

    <script src="../js/constants.js"></script>
    <script src="../js/mapData.js"></script>
    <script src="../js/enemyData.js"></script>

    <script>
        const canvas = document.getElementById('debugCanvas');
        const ctx = canvas.getContext('2d');
        const TILE_SIZE = 8; // デバッグ用に小さく表示

        function init() {
            // ステージ選択肢の生成（mapDataのキーを取得）
            const select = document.getElementById('stageSelect');
            Object.keys(mapData).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = `Stage: ${key}`;
                select.appendChild(opt);
            });
            drawDebug();
        }

        function drawDebug() {
            const stageKey = document.getElementById('stageSelect').value;
            const currentMap = mapData[stageKey];
            const currentEnemies = enemyData[stageKey];

            // キャンバスサイズをマップに合わせて調整
            canvas.width = currentMap[0].length * TILE_SIZE;
            canvas.height = currentMap.length * TILE_SIZE;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. マップの描画
            for (let y = 0; y < currentMap.length; y++) {
                for (let x = 0; x < currentMap[y].length; x++) {
                    const tile = currentMap[y][x];
                    if (tile === 1) { // 壁
                        ctx.fillStyle = '#666';
                    } else if (tile === 2) { // トラップ
                        ctx.fillStyle = '#f00';
                    } else { // 通路
                        ctx.fillStyle = '#222';
                    }
                    ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE - 1, TILE_SIZE - 1);
                }
            }

            // 2. 敵配置の描画
            if (currentEnemies) {
                currentEnemies.forEach(enemy => {
                    ctx.fillStyle = 'yellow';
                    ctx.beginPath();
                    // 敵の座標 (enemy.x, enemy.y) をタイル座標として描画
                    ctx.arc(
                        enemy.x * TILE_SIZE + TILE_SIZE/2, 
                        enemy.y * TILE_SIZE + TILE_SIZE/2, 
                        TILE_SIZE/3, 0, Math.PI * 2
                    );
                    ctx.fill();
                });
            }

            document.getElementById('info').textContent = 
                ` | Size: ${currentMap[0].length}x${currentMap.length} | Enemies: ${currentEnemies ? currentEnemies.length : 0}`;
        }

        window.onload = init;
    </script>
</body>
</html>
