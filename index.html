<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワクワク！だいぼうけんゲームひろば</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f3e9;
            --main-brown: #5d4037;
            --accent-orange: #ff8c00;
            --jungle-green: #2e7d32;
            --card-bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(#d7ccc8 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--main-brown);
            font-family: 'M PLUS Rounded 1c', sans-serif;
            text-align: center;
        }

        header {
            background: linear-gradient(var(--jungle-green), #1b5e20);
            padding: 40px 20px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }

        h1 {
            font-size: 36px;
            margin: 0;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        .hero-message {
            font-size: 18px;
            margin-top: 10px;
            opacity: 0.9;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            font-size: 28px;
            border-bottom: 4px dashed var(--accent-orange);
            display: inline-block;
            margin-bottom: 30px;
        }

        /* ゲームカードのスタイル */
        .game-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            justify-content: center;
        }

        .game-card {
            background: var(--card-bg);
            border: 4px solid var(--main-brown);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            position: relative;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: scale(1.05) rotate(1deg);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            border-color: var(--accent-orange);
        }

        .game-thumbnail {
            width: 100%;
            height: 180px;
            background-color: #333;
            background-image: url('img/tyrano_hero.png'); /* 恐竜のイメージ画像 */
            background-size: cover;
            background-position: center;
            border-bottom: 4px solid var(--main-brown);
        }

        .game-info {
            padding: 20px;
            background: white;
        }

        .game-title {
            font-size: 22px;
            margin-bottom: 10px;
            color: var(--jungle-green);
        }

        .game-desc {
            font-size: 14px;
            line-height: 1.6;
            color: #666;
        }

        .play-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background-color: var(--accent-orange);
            color: white;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 0 #cc7000;
        }

        footer {
            margin-top: 100px;
            padding: 40px;
            font-size: 12px;
            color: #999;
        }

        ruby rt {
            font-size: 0.6em;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <h1><ruby>自作<rt>じさく</rt></ruby>ゲーム <ruby>広場<rt>ひろば</rt></ruby>！</h1>
    <div class="hero-message"><ruby>冒険<rt>ぼうけん</rt></ruby>の <ruby>世界<rt>せかい</rt></ruby>へ <ruby>飛<rt>と</rt></ruby>びこもう！</div>
</header>

<div class="container">
    <h2><ruby>遊<rt>あそ</rt></ruby>べる ゲーム</h2>
    
    <div class="game-list">
        <a href="./dino01/" class="game-card">
            <div class="game-thumbnail"></div>
            <div class="game-info">
                <div class="game-title">DINO-ROGUE DX</div>
                <div class="game-desc">
                    <ruby>最強<rt>さいきょう</rt></ruby>の <ruby>肉食<rt>にくしょく</rt></ruby><ruby>恐竜<rt>きょうりゅう</rt></ruby> ティラノを <ruby>操<rt>あやつ</rt></ruby>り、<br>
                    <ruby>危険<rt>きけん</rt></ruby>な ダンジョンを <ruby>攻略<rt>こうりゃく</rt></ruby>せよ！
                </div>
                <div class="play-btn"><ruby>遊<rt>あそ</rt></ruby>びに行く！</div>
            </div>
        </a>

        <div class="game-card" style="opacity: 0.7; border-style: dashed; filter: grayscale(1);">
            <div class="game-thumbnail" style="background: #ccc; display: flex; align-items: center; justify-content: center; font-size: 40px;">？</div>
            <div class="game-info">
                <div class="game-title">？？？</div>
                <div class="game-desc">
                    <ruby>次<rt>つぎ</rt></ruby>の ゲームは なんだろう？<br>
                    ただいま <ruby>準備中<rt>じゅんびちゅう</rt></ruby>だよ！
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 <ruby>自作<rt>じさく</rt></ruby>ゲーム <ruby>開発<rt>かいはつ</rt></ruby>チーム
</footer>

</body>
</html>
