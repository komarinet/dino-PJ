<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワクワク！だいぼうけんゲームひろば</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f3e9; /* 紙のような色 */
            --main-brown: #5d4037; /* 木のような茶色 */
            --accent-orange: #ff8c00; /* 夕日のようなオレンジ */
            --jungle-green: #2e7d32; /* ジャングルのような緑 */
            --card-bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(#d7ccc8 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--main-brown);
            font-family: 'M PLUS Rounded 1c', sans-serif;
            text-align: center;
        }

        /* ヘッダー: ジャングルの入り口 */
        header {
            background: linear-gradient(var(--jungle-green), #1b5e20);
            padding: 40px 20px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); /* ナナメカット */
        }

        h1 {
            font-size: 32px;
            margin: 0;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .hero-message {
            font-size: 16px;
            margin-top: 10px;
            opacity: 0.9;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        h2 {
            font-size: 24px;
            border-bottom: 4px dashed var(--accent-orange);
            display: inline-block;
            margin-bottom: 25px;
            padding-bottom: 5px;
        }

        /* ゲームリストのグリッド配置 */
        .game-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            justify-content: center;
        }

        /* ゲームカード全体のスタイル */
        .game-card {
            background: var(--card-bg);
            border: 4px solid var(--main-brown);
            border-radius: 20px;
            overflow: hidden;
            /* 動きの滑らかさを指定 */
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            position: relative;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 0 var(--main-brown);
        }

        /* カードを触った時の動き */
        .game-card:hover {
            transform: translateY(-5px) scale(1.03) rotate(1deg); /* 上に浮いて少し大きくなって傾く */
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            border-color: var(--accent-orange);
        }

        /* ★改良点: 画像エリアのスタイル */
        .game-thumbnail {
            width: 100%;
            /* ★重要: アスペクト比を固定。これで画像がトリミングされず全体が表示される */
            aspect-ratio: 4 / 3; /* 元画像に合わせて4:3に固定 */
            background-color: #333;
            /* ★ユーザー様指定の画像ファイルを背景として適用 (img/top01.jpg) */
            background-image: url('img/top01.jpg'); 
            background-size: cover; /* エリア全体を覆うように拡大縮小 */
            background-position: center; /* 中央を基準に配置 */
            border-bottom: 4px solid var(--main-brown);
        }

        /* ゲーム情報エリア */
        .game-info {
            padding: 15px 20px 20px;
            background: white;
            flex: 1; /* 残りの高さを埋める */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .game-title {
            font-size: 20px;
            margin-bottom: 8px;
            color: var(--jungle-green);
            font-weight: 800;
        }

        .game-desc {
            font-size: 13px;
            line-height: 1.6;
            color: #555;
            text-align: left; /* 説明文は左寄せ */
            margin-bottom: 15px;
        }

        /* 遊びに行くボタン */
        .play-btn {
            display: inline-block;
            padding: 10px 25px;
            background-color: var(--accent-orange);
            color: white;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 0 #cc7000;
            transition: background-color 0.2s;
        }
        
        .game-card:hover .play-btn {
            background-color: #ffa500;
        }

        /* フッター */
        footer {
            margin-top: 80px;
            padding: 30px;
            font-size: 11px;
            color: #999;
            background-color: #eee;
            border-top: 1px solid #ddd;
        }

        ruby rt {
            font-size: 0.6em;
            color: #888;
            font-weight: normal;
        }
    </style>
</head>
<body>

<header>
    <h1><ruby>自作<rt>じさく</rt></ruby>ゲーム <ruby>広場<rt>ひろば</rt></ruby>！</h1>
    <div class="hero-message"><ruby>冒険<rt>ぼうけん</rt></ruby>の <ruby>世界<rt>せかい</rt></ruby>へ <ruby>飛<rt>と</rt></ruby>びこもう！</div>
</header>

<div class="container">
    <h2><ruby>遊<rt>あそ</rt></ruby>べる ゲーム</h2>
    
    <div class="game-list">
        <a href="./dino01/" class="game-card">
            <div class="game-thumbnail"></div>
            <div class="game-info">
                <div>
                    <div class="game-title">DINO-ROGUE DX</div>
                    <div class="game-desc">
                        <ruby>最強<rt>さいきょう</rt></ruby>の <ruby>肉食<rt>にくしょく</rt></ruby><ruby>恐竜<rt>きょうりゅう</rt></ruby> ティラノを <ruby>操<rt>あやつ</rt></ruby>り、<br>
                        <ruby>危険<rt>きけん</rt></ruby>な ダンジョンを <ruby>攻略<rt>こうりゃく</rt></ruby>せよ！
                    </div>
                </div>
                <div>
                    <div class="play-btn"><ruby>遊<rt>あそ</rt></ruby>びに行く！</div>
                </div>
            </div>
        </a>

        <div class="game-card" style="opacity: 0.6; border-style: dashed; filter: grayscale(1); box-shadow: none;">
            <div class="game-thumbnail" style="background: #ccc; background-image: none; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #999;">？</div>
            <div class="game-info">
                <div>
                    <div class="game-title">？？？</div>
                    <div class="game-desc">
                        <ruby>次<rt>つぎ</rt></ruby>の ゲームは なんだろう？<br>
                        ただいま <ruby>準備中<rt>じゅんびちゅう</rt></ruby>だよ！
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 <ruby>自作<rt>じさく</rt></ruby>ゲーム <ruby>開発<rt>かいはつ</rt></ruby>チーム
</footer>

</body>
</html>
